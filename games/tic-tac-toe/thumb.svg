<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Tic-tac-toe">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c2a" />
      <stop offset="100%" stop-color="#0a0a14" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)" />
  <g stroke="#2a2a3a" stroke-width="3">
    <line x1="135" y1="40" x2="135" y2="170" />
    <line x1="185" y1="40" x2="185" y2="170" />
    <line x1="100" y1="80" x2="220" y2="80" />
    <line x1="100" y1="125" x2="220" y2="125" />
  </g>
  <g font-family="ui-sans-serif, system-ui" font-size="34" font-weight="700" text-anchor="middle">
    <text x="117" y="72" fill="#06b6d4">X</text>
    <text x="160" y="117" fill="#f43f5e">O</text>
    <text x="203" y="162" fill="#06b6d4">X</text>
  </g>
  <text x="20" y="36" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4e4ed">XOX</text>
</svg>
