<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>XOX</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="stage">
      <header class="hud">
        <div id="status" class="hud__status">Sıra: Sen (X)</div>
        <button id="restart" class="hud__btn" type="button">Yeniden başla</button>
      </header>
      <div id="board" class="board" role="grid" aria-label="Tic-tac-toe tahtası">
        <button class="cell" data-i="0" type="button" aria-label="1. kare"></button>
        <button class="cell" data-i="1" type="button" aria-label="2. kare"></button>
        <button class="cell" data-i="2" type="button" aria-label="3. kare"></button>
        <button class="cell" data-i="3" type="button" aria-label="4. kare"></button>
        <button class="cell" data-i="4" type="button" aria-label="5. kare"></button>
        <button class="cell" data-i="5" type="button" aria-label="6. kare"></button>
        <button class="cell" data-i="6" type="button" aria-label="7. kare"></button>
        <button class="cell" data-i="7" type="button" aria-label="8. kare"></button>
        <button class="cell" data-i="8" type="button" aria-label="9. kare"></button>
      </div>
      <div class="score">
        <div>Sen <span id="score-x">0</span></div>
        <div>Berabere <span id="score-d">0</span></div>
        <div>Bilgisayar <span id="score-o">0</span></div>
      </div>
    </main>
    <script type="module" src="./game.ts"></script>
  </body>
</html>
