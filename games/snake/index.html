<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Snake</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="stage">
      <header class="hud">
        <div class="hud__score">Skor<span id="score">0</span></div>
        <div class="hud__best">En iyi<span id="best">0</span></div>
        <button id="restart" class="hud__btn" type="button">Yeniden başla</button>
      </header>
      <div class="board-wrap">
        <canvas id="board" width="480" height="480" aria-label="Snake oyun alanı"></canvas>
        <div id="overlay" class="overlay">
          <div class="overlay__inner">
            <h2 id="overlay-title">Snake</h2>
            <p id="overlay-msg">Başlamak için bir yön tuşuna bas.</p>
          </div>
        </div>
      </div>
      <p class="hint">Ok tuşları veya WASD · Boşluk: duraklat · R: yeniden başla</p>
      <div class="touch" aria-hidden="true">
        <button class="touch__btn" data-dir="up" type="button">▲</button>
        <div class="touch__row">
          <button class="touch__btn" data-dir="left" type="button">◀</button>
          <button class="touch__btn" data-dir="down" type="button">▼</button>
          <button class="touch__btn" data-dir="right" type="button">▶</button>
        </div>
      </div>
    </main>
    <script type="module" src="./game.ts"></script>
  </body>
</html>
