<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Yahtzee">
  <defs>
    <linearGradient id="yz-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1a24" />
      <stop offset="100%" stop-color="#0a0b14" />
    </linearGradient>
    <linearGradient id="yz-die" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
    <linearGradient id="yz-die-h" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#yz-bg)" />

  <g font-family="ui-sans-serif, system-ui">
    <text x="20" y="40" font-size="22" font-weight="800" fill="#f5f6f8">Yahtzee</text>
    <text x="20" y="62" font-size="11" font-weight="500" fill="#98a0ad">5 zar · 13 kategori · klasik</text>
  </g>

  <!-- 5 dice in a row -->
  <g transform="translate(20,90)">
    <!-- Die 1: face 5, held -->
    <g transform="translate(0,0)">
      <rect width="42" height="42" rx="7" fill="url(#yz-die-h)" stroke="#d97706" stroke-width="1.6" />
      <g fill="#1f2937">
        <circle cx="11" cy="11" r="3.2" />
        <circle cx="31" cy="11" r="3.2" />
        <circle cx="21" cy="21" r="3.2" />
        <circle cx="11" cy="31" r="3.2" />
        <circle cx="31" cy="31" r="3.2" />
      </g>
    </g>
    <!-- Die 2: face 5, held -->
    <g transform="translate(52,0)">
      <rect width="42" height="42" rx="7" fill="url(#yz-die-h)" stroke="#d97706" stroke-width="1.6" />
      <g fill="#1f2937">
        <circle cx="11" cy="11" r="3.2" />
        <circle cx="31" cy="11" r="3.2" />
        <circle cx="21" cy="21" r="3.2" />
        <circle cx="11" cy="31" r="3.2" />
        <circle cx="31" cy="31" r="3.2" />
      </g>
    </g>
    <!-- Die 3: face 5, held (Yahtzee illustration: 5x5) -->
    <g transform="translate(104,0)">
      <rect width="42" height="42" rx="7" fill="url(#yz-die-h)" stroke="#d97706" stroke-width="1.6" />
      <g fill="#1f2937">
        <circle cx="11" cy="11" r="3.2" />
        <circle cx="31" cy="11" r="3.2" />
        <circle cx="21" cy="21" r="3.2" />
        <circle cx="11" cy="31" r="3.2" />
        <circle cx="31" cy="31" r="3.2" />
      </g>
    </g>
    <!-- Die 4: face 5, not held -->
    <g transform="translate(156,0)">
      <rect width="42" height="42" rx="7" fill="url(#yz-die)" stroke="#cbd5e1" stroke-width="1.6" />
      <g fill="#1f2937">
        <circle cx="11" cy="11" r="3.2" />
        <circle cx="31" cy="11" r="3.2" />
        <circle cx="21" cy="21" r="3.2" />
        <circle cx="11" cy="31" r="3.2" />
        <circle cx="31" cy="31" r="3.2" />
      </g>
    </g>
    <!-- Die 5: face 5, not held -->
    <g transform="translate(208,0)">
      <rect width="42" height="42" rx="7" fill="url(#yz-die)" stroke="#cbd5e1" stroke-width="1.6" />
      <g fill="#1f2937">
        <circle cx="11" cy="11" r="3.2" />
        <circle cx="31" cy="11" r="3.2" />
        <circle cx="21" cy="21" r="3.2" />
        <circle cx="11" cy="31" r="3.2" />
        <circle cx="31" cy="31" r="3.2" />
      </g>
    </g>
  </g>

  <!-- Score badge -->
  <g transform="translate(20,150)">
    <rect width="84" height="30" rx="7" fill="#1c2236" stroke="#818cf8" stroke-width="1.2" />
    <text x="12" y="18" font-family="ui-sans-serif, system-ui" font-size="9" font-weight="600" fill="#98a0ad">YAHTZEE</text>
    <text x="12" y="28" font-family="ui-sans-serif, system-ui" font-size="9" font-weight="700" fill="#818cf8">+50 puan</text>
  </g>

  <g transform="translate(118,150)" font-family="ui-sans-serif, system-ui" fill="#5a6473" font-size="9" font-weight="500">
    <text x="0" y="14">Bonus 35 puan · 13 tur</text>
    <text x="0" y="28">Tut/bırak · 3 atış</text>
  </g>
</svg>
