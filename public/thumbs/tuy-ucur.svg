<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Tüy Uçur">
  <defs>
    <linearGradient id="tu-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c2a" />
      <stop offset="100%" stop-color="#0a0a14" />
    </linearGradient>
    <linearGradient id="tu-feather" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="55%" stop-color="#ff79c6" />
      <stop offset="100%" stop-color="#b15cff" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#tu-bg)" />

  <!-- Gap-walls scrolling up: drawn as horizontal bars with a colored gap -->
  <g>
    <!-- Top wall: gap on the right -->
    <rect x="0" y="56" width="180" height="10" fill="#342e6a" />
    <rect x="0" y="56" width="180" height="2" fill="#ff79c6" />
    <rect x="240" y="56" width="80" height="10" fill="#342e6a" />
    <rect x="240" y="56" width="80" height="2" fill="#ff79c6" />

    <!-- Middle wall: gap on the left -->
    <rect x="0" y="118" width="60" height="10" fill="#342e6a" />
    <rect x="0" y="118" width="60" height="2" fill="#34d2ff" />
    <rect x="130" y="118" width="190" height="10" fill="#342e6a" />
    <rect x="130" y="118" width="190" height="2" fill="#34d2ff" />

    <!-- Bottom wall: gap centered -->
    <rect x="0" y="176" width="120" height="10" fill="#342e6a" />
    <rect x="0" y="176" width="120" height="2" fill="#34e89e" />
    <rect x="200" y="176" width="120" height="10" fill="#342e6a" />
    <rect x="200" y="176" width="120" height="2" fill="#34e89e" />
  </g>

  <!-- Puff rings around the feather to show the puff mechanic -->
  <circle cx="100" cy="100" r="28" fill="none" stroke="#34d2ff" stroke-width="1.5" stroke-opacity="0.65" />
  <circle cx="100" cy="100" r="40" fill="none" stroke="#34d2ff" stroke-width="1" stroke-opacity="0.35" />

  <!-- Feather: quill + plume (rotated slightly toward the right gap) -->
  <g transform="translate(208 92) rotate(18)">
    <line x1="0" y1="20" x2="0" y2="-26" stroke="#bcb4e6" stroke-width="1.6" />
    <path d="M 0 -24 C -12 -16 -10 12 0 18 C 10 12 12 -16 0 -24 Z" fill="url(#tu-feather)" />
    <line x1="0" y1="-20" x2="0" y2="14" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1" />
  </g>

  <text x="20" y="32" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4e4ed">Tüy Uçur</text>
</svg>
