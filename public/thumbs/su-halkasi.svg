<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <radialGradient id="pond" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#1d4d72"/>
      <stop offset="55%" stop-color="#103651"/>
      <stop offset="100%" stop-color="#06182c"/>
    </radialGradient>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="rgba(120,200,240,0)"/>
      <stop offset="100%" stop-color="rgba(200,235,255,0.55)"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#pond)"/>

  <!-- Faint sparkles -->
  <g fill="#cfe8ff" opacity="0.35">
    <circle cx="30" cy="40" r="1"/>
    <circle cx="285" cy="55" r="1"/>
    <circle cx="50" cy="170" r="1"/>
    <circle cx="240" cy="180" r="1"/>
    <circle cx="170" cy="30" r="1"/>
  </g>

  <!-- Outer ripples around the impact -->
  <g fill="none" stroke="#bfe6ff">
    <circle cx="160" cy="100" r="78" stroke-width="1.2" opacity="0.22"/>
    <circle cx="160" cy="100" r="55" stroke-width="1.4" opacity="0.42"/>
    <circle cx="160" cy="100" r="32" stroke-width="1.6" opacity="0.75"/>
  </g>
  <circle cx="160" cy="100" r="32" fill="url(#ringGlow)"/>

  <!-- Lily pads -->
  <g>
    <!-- ignited pad at impact -->
    <circle cx="160" cy="100" r="11" fill="#9be09f" stroke="#3e8c4d" stroke-width="1.3"/>
    <path d="M160 100 L171 100 L168 105 Z" fill="#06182c"/>

    <!-- nearby pad just being touched -->
    <circle cx="195" cy="80" r="12" fill="#7dc78c" stroke="#2d6a3a" stroke-width="1.3"/>
    <path d="M195 80 L195 68 L200 70 Z" fill="#06182c"/>

    <circle cx="120" cy="135" r="11" fill="#56a064" stroke="#234d2c" stroke-width="1.2"/>
    <path d="M120 135 L108 135 L112 130 Z" fill="#06182c"/>

    <circle cx="60" cy="80" r="10" fill="#4f9659" stroke="#1d4426" stroke-width="1.2"/>
    <path d="M60 80 L60 70 L65 73 Z" fill="#06182c"/>

    <circle cx="250" cy="135" r="12" fill="#5fae6d" stroke="#26572f" stroke-width="1.2"/>
    <path d="M250 135 L262 135 L259 130 Z" fill="#06182c"/>

    <circle cx="220" cy="160" r="10" fill="#4f9659" stroke="#1d4426" stroke-width="1.2"/>
    <path d="M220 160 L210 160 L213 165 Z" fill="#06182c"/>

    <circle cx="85" cy="160" r="9" fill="#56a064" stroke="#234d2c" stroke-width="1.2"/>
    <path d="M85 160 L85 170 L80 168 Z" fill="#06182c"/>
  </g>
</svg>
