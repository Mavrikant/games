<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1219"/>
      <stop offset="1" stop-color="#1a2230"/>
    </linearGradient>
    <linearGradient id="eggA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7e7c8"/>
      <stop offset="1" stop-color="#c9a972"/>
    </linearGradient>
    <linearGradient id="eggB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde6c6"/>
      <stop offset="1" stop-color="#deaa6b"/>
    </linearGradient>
    <linearGradient id="eggC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d6ecfb"/>
      <stop offset="1" stop-color="#a8c5db"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)"/>

  <!-- subtle ground -->
  <line x1="0" y1="180" x2="320" y2="180" stroke="#23283b" stroke-width="1"/>

  <!-- warmth halo behind central egg -->
  <ellipse cx="160" cy="110" rx="120" ry="60" fill="url(#glow)"/>

  <!-- left egg (warm) -->
  <g transform="translate(40,60)">
    <path d="M40,8 C60,8 70,42 70,64 C70,86 58,100 40,100 C22,100 10,86 10,64 C10,42 20,8 40,8 Z" fill="url(#eggA)" stroke="rgba(0,0,0,.4)" stroke-width="1.5"/>
    <!-- thermometer -->
    <rect x="-20" y="14" width="14" height="86" rx="7" fill="#0f141c" stroke="#23283b"/>
    <rect x="-20" y="46" width="14" height="32" fill="rgba(34,197,94,0.34)"/>
    <rect x="-24" y="56" width="22" height="3" rx="1.5" fill="#22c55e"/>
  </g>

  <!-- center egg (hot, cracking) -->
  <g transform="translate(132,40)">
    <path d="M28,4 C50,4 62,42 62,68 C62,94 48,112 28,112 C8,112 -6,94 -6,68 C-6,42 6,4 28,4 Z" fill="url(#eggB)" stroke="rgba(0,0,0,.45)" stroke-width="1.6"/>
    <path d="M28,40 L22,56 L34,68 L20,82 L36,96" fill="none" stroke="#2a1d05" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- thermometer -->
    <rect x="-32" y="6" width="16" height="106" rx="8" fill="#0f141c" stroke="#23283b"/>
    <rect x="-32" y="44" width="16" height="36" fill="rgba(34,197,94,0.34)"/>
    <rect x="-36" y="70" width="24" height="3.4" rx="1.7" fill="#f97316"/>
  </g>

  <!-- right egg (cold) -->
  <g transform="translate(232,68)">
    <path d="M38,8 C56,8 66,40 66,60 C66,80 54,92 38,92 C22,92 10,80 10,60 C10,40 20,8 38,8 Z" fill="url(#eggC)" stroke="rgba(0,0,0,.4)" stroke-width="1.5"/>
    <!-- thermometer -->
    <rect x="-18" y="14" width="14" height="80" rx="7" fill="#0f141c" stroke="#23283b"/>
    <rect x="-18" y="40" width="14" height="30" fill="rgba(34,197,94,0.34)"/>
    <rect x="-22" y="80" width="22" height="3" rx="1.5" fill="#38bdf8"/>
  </g>

  <!-- title -->
  <text x="160" y="186" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#e5e7eb" letter-spacing="0.5">
    KULUÇKA
  </text>
</svg>
