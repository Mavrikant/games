<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Çoban">
  <defs>
    <radialGradient id="cb-grass" cx="0.5" cy="0.3" r="0.9">
      <stop offset="0%" stop-color="#2a3a2a" />
      <stop offset="100%" stop-color="#13201a" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="#0a0b0e" />
  <rect x="10" y="10" width="300" height="180" rx="14" fill="url(#cb-grass)" />

  <!-- grass tufts -->
  <g fill="#3a4a3a" opacity="0.6">
    <circle cx="40" cy="50" r="1.5" />
    <circle cx="80" cy="120" r="1.5" />
    <circle cx="120" cy="70" r="1.5" />
    <circle cx="60" cy="160" r="1.5" />
    <circle cx="160" cy="140" r="1.5" />
    <circle cx="100" cy="40" r="1.5" />
    <circle cx="180" cy="90" r="1.5" />
    <circle cx="44" cy="100" r="1.5" />
    <circle cx="140" cy="170" r="1.5" />
    <circle cx="90" cy="90" r="1.5" />
  </g>

  <!-- Pen (right side) -->
  <g stroke="#a87a3c" stroke-width="2.5" fill="rgba(168,122,60,0.08)">
    <!-- top -->
    <line x1="220" y1="60" x2="290" y2="60" />
    <!-- bottom -->
    <line x1="220" y1="160" x2="290" y2="160" />
    <!-- right -->
    <line x1="290" y1="60" x2="290" y2="160" />
    <!-- left: split for gate -->
    <line x1="220" y1="60" x2="220" y2="92" />
    <line x1="220" y1="128" x2="220" y2="160" />
  </g>
  <rect x="218" y="92" width="4" height="36" fill="rgba(110,231,183,0.45)" />
  <rect x="220" y="60" width="70" height="100" fill="rgba(168,122,60,0.05)" />

  <!-- Sheep inside pen -->
  <g>
    <circle cx="248" cy="100" r="7" fill="#d4d4d8" />
    <circle cx="252" cy="99" r="2.5" fill="#27272a" />
    <circle cx="266" cy="125" r="7" fill="#d4d4d8" />
    <circle cx="270" cy="124" r="2.5" fill="#27272a" />
    <circle cx="245" cy="135" r="7" fill="#d4d4d8" />
    <circle cx="249" cy="134" r="2.5" fill="#27272a" />
  </g>

  <!-- Sheep outside (fleeing) -->
  <g>
    <circle cx="120" cy="100" r="8" fill="#f4f4f5" />
    <circle cx="126" cy="99" r="3" fill="#27272a" />
    <circle cx="155" cy="130" r="8" fill="#f4f4f5" />
    <circle cx="161" cy="129" r="3" fill="#27272a" />
    <circle cx="170" cy="80" r="8" fill="#f4f4f5" />
    <circle cx="176" cy="79" r="3" fill="#27272a" />
  </g>

  <!-- Dog -->
  <g>
    <circle cx="80" cy="110" r="11" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
    <circle cx="80" cy="110" r="4" fill="#f59e0b" />
    <!-- scare radius -->
    <circle cx="80" cy="110" r="40" fill="none" stroke="rgba(248,113,113,0.35)" stroke-width="1" stroke-dasharray="2 3" />
  </g>

  <!-- Title -->
  <text x="20" y="36" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4e4ed">Çoban</text>
</svg>
