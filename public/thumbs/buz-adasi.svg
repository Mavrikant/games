<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Buz Adası">
  <defs>
    <linearGradient id="bz-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a" />
      <stop offset="100%" stop-color="#10324a" />
    </linearGradient>
    <linearGradient id="bz-ice" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eaf3ff" />
      <stop offset="60%" stop-color="#c5d8ec" />
      <stop offset="100%" stop-color="#94a8c0" />
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="320" height="135" fill="#0d1b2a" />
  <!-- water -->
  <rect y="135" width="320" height="65" fill="#10324a" />
  <!-- wave lines -->
  <g stroke="rgba(255,255,255,0.10)" stroke-width="1.5" fill="none">
    <path d="M0 148 Q40 145 80 148 T160 148 T240 148 T320 148" />
    <path d="M0 162 Q40 159 80 162 T160 162 T240 162 T320 162" />
    <path d="M0 178 Q40 175 80 178 T160 178 T240 178 T320 178" />
  </g>

  <!-- stars + moon -->
  <g fill="rgba(255,255,255,0.7)">
    <circle cx="38" cy="24" r="1.4" />
    <circle cx="100" cy="44" r="1" />
    <circle cx="74" cy="80" r="0.9" />
    <circle cx="178" cy="22" r="1.1" />
    <circle cx="288" cy="68" r="1.3" />
  </g>
  <circle cx="262" cy="42" r="14" fill="rgba(245,240,220,0.88)" />
  <circle cx="256" cy="38" r="14" fill="#0d1b2a" />

  <!-- iceberg tilted slightly right (positive angle) -->
  <g transform="translate(160 145) rotate(-7)">
    <!-- belly -->
    <path d="M -90 22 L 90 22 L 60 60 L -60 60 Z" fill="rgba(180,210,230,0.35)" />
    <!-- slab -->
    <path d="M -108 -22 L 108 -22 L 90 22 L -90 22 Z" fill="url(#bz-ice)" stroke="rgba(20,30,50,0.35)" stroke-width="1.2" />
    <!-- top highlight -->
    <line x1="-100" y1="-19" x2="100" y2="-19" stroke="rgba(255,255,255,0.7)" stroke-width="2" />

    <!-- penguin: scaled and translated bodies -->
    <g transform="translate(-60 -42)">
      <ellipse cx="0" cy="0" rx="11" ry="14" fill="#0c1320" />
      <ellipse cx="0" cy="3" rx="6" ry="11" fill="#f5f9ff" />
      <polygon points="3,-2 9,-1 3,2" fill="#f7b733" />
      <circle cx="3" cy="-5" r="2.4" fill="#f5f9ff" />
      <circle cx="4" cy="-5" r="1.2" fill="#0c1320" />
    </g>
    <g transform="translate(0 -44)">
      <ellipse cx="0" cy="0" rx="11" ry="14" fill="#0c1320" />
      <ellipse cx="0" cy="3" rx="6" ry="11" fill="#f5f9ff" />
      <polygon points="-3,-2 -9,-1 -3,2" fill="#f7b733" />
      <circle cx="-3" cy="-5" r="2.4" fill="#f5f9ff" />
      <circle cx="-4" cy="-5" r="1.2" fill="#0c1320" />
    </g>
    <g transform="translate(58 -42)">
      <ellipse cx="0" cy="0" rx="11" ry="14" fill="#0c1320" />
      <ellipse cx="0" cy="3" rx="6" ry="11" fill="#f5f9ff" />
      <polygon points="3,-2 9,-1 3,2" fill="#f7b733" />
      <circle cx="3" cy="-5" r="2.4" fill="#f5f9ff" />
      <circle cx="4" cy="-5" r="1.2" fill="#0c1320" />
      <!-- recall halo over the rightmost (the one being centred) -->
      <circle cx="0" cy="0" r="18" fill="none" stroke="rgba(60,220,120,0.85)" stroke-width="2" />
    </g>

    <!-- centre mark -->
    <circle cx="0" cy="-23" r="2.5" fill="rgba(60,220,120,0.85)" />
  </g>

  <!-- title -->
  <text x="20" y="192" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="700" fill="#e4e4ed">Buz Adası</text>
</svg>
