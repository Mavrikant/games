<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Cezve">
  <defs>
    <linearGradient id="cz-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1108" />
      <stop offset="100%" stop-color="#070403" />
    </linearGradient>
    <linearGradient id="cz-body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3e2818" />
      <stop offset="50%" stop-color="#b07e44" />
      <stop offset="100%" stop-color="#2f1d10" />
    </linearGradient>
    <linearGradient id="cz-foam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6dba8" />
      <stop offset="55%" stop-color="#d8a560" />
      <stop offset="100%" stop-color="#7e4523" />
    </linearGradient>
    <radialGradient id="cz-flame" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffd252" stop-opacity="0.95" />
      <stop offset="35%" stop-color="#f57828" stop-opacity="0.7" />
      <stop offset="75%" stop-color="#b42814" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#140804" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="320" height="200" fill="url(#cz-bg)" />

  <!-- flame halo -->
  <ellipse cx="160" cy="172" rx="86" ry="32" fill="url(#cz-flame)" />

  <!-- stove -->
  <rect x="60" y="170" width="200" height="14" fill="#1d150f" />
  <rect x="60" y="170" width="200" height="3" fill="#2b1f17" />
  <rect x="72" y="178" width="176" height="5" fill="#0a0604" />

  <!-- flame tongues -->
  <g opacity="0.7">
    <ellipse cx="130" cy="165" rx="5" ry="14" fill="#ffe79e" />
    <ellipse cx="148" cy="160" rx="6" ry="18" fill="#ffe79e" />
    <ellipse cx="172" cy="160" rx="6" ry="18" fill="#ffe79e" />
    <ellipse cx="190" cy="165" rx="5" ry="14" fill="#ffe79e" />
  </g>

  <!-- handle -->
  <path d="M 200 80 Q 250 70 270 64" stroke="#6a3d20" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M 200 80 Q 250 70 270 64" stroke="#a26737" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- cezve body (trapezoidal: narrow at top? actually narrow at neck) -->
  <!-- Body: wide top (rim), tapering down -->
  <path d="M 116 70 L 204 70 L 196 168 L 124 168 Z" fill="url(#cz-body)" />

  <!-- neck (thin band at top of body) -->
  <path d="M 124 58 L 196 58 L 204 70 L 116 70 Z" fill="#3a2a1c" />
  <line x1="124" y1="58" x2="196" y2="58" stroke="#d3a06d" stroke-width="2"/>

  <!-- inner coffee + foam (clipped roughly inside body) -->
  <clipPath id="cz-inside">
    <path d="M 122 68 L 198 68 L 192 166 L 128 166 Z" />
  </clipPath>
  <g clip-path="url(#cz-inside)">
    <rect x="100" y="60" width="120" height="120" fill="#1e0d05" />
    <!-- foam (rises to ~80% — sweet spot illustration) -->
    <path d="M 100 90
             Q 130 87 160 90
             T 220 90
             L 220 180 L 100 180 Z" fill="url(#cz-foam)" />
    <!-- bubbles -->
    <circle cx="138" cy="100" r="3" fill="rgba(255,236,200,0.85)" />
    <circle cx="158" cy="96" r="2" fill="rgba(255,236,200,0.85)" />
    <circle cx="178" cy="102" r="2.5" fill="rgba(255,236,200,0.85)" />
    <circle cx="148" cy="112" r="2" fill="rgba(255,236,200,0.7)" />
  </g>

  <!-- shine on body -->
  <path d="M 128 76 L 132 162" stroke="rgba(255,235,200,0.15)" stroke-width="2" fill="none"/>

  <!-- markers (right) -->
  <line x1="232" y1="80" x2="232" y2="160" stroke="rgba(150,140,130,0.4)" stroke-width="2"/>
  <rect x="224" y="84" width="16" height="20" fill="rgba(120,220,130,0.25)" />
  <line x1="220" y1="84" x2="244" y2="84" stroke="rgba(140,230,150,0.95)" stroke-width="2"/>
  <line x1="220" y1="104" x2="244" y2="104" stroke="rgba(140,230,150,0.95)" stroke-width="2"/>
  <line x1="218" y1="74" x2="246" y2="74" stroke="rgba(245,90,70,0.95)" stroke-width="2" stroke-dasharray="5,4"/>

  <!-- steam wisps -->
  <g opacity="0.55">
    <path d="M 150 50 q 6 -12 -3 -22" stroke="rgba(220,210,200,0.7)" stroke-width="2" fill="none"/>
    <path d="M 165 50 q -5 -14 6 -24" stroke="rgba(220,210,200,0.55)" stroke-width="2" fill="none"/>
    <path d="M 178 50 q 4 -12 -2 -22" stroke="rgba(220,210,200,0.5)" stroke-width="2" fill="none"/>
  </g>
</svg>
