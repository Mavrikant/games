<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Renk Karıştır">
  <defs>
    <linearGradient id="rk-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d28" />
      <stop offset="100%" stop-color="#0a0a14" />
    </linearGradient>
  </defs>

  <rect width="320" height="200" fill="url(#rk-bg)" />

  <!-- Subtractive CMY pigment circles, multiply-blended to show mixing -->
  <g style="mix-blend-mode: screen" opacity="0.92">
    <circle cx="135" cy="78" r="58" fill="#00b3c8" />
    <circle cx="185" cy="78" r="58" fill="#e0398a" />
    <circle cx="160" cy="122" r="58" fill="#e8c020" />
  </g>

  <!-- Target vs mix swatch hint at the bottom corners -->
  <g>
    <rect x="22" y="150" width="48" height="30" rx="6" fill="#3fc7b0" stroke="#2f3540" />
    <rect x="250" y="150" width="48" height="30" rx="6" fill="#7fa8e6" stroke="#2f3540" />
  </g>
</svg>
