<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Reversi">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c2a" />
      <stop offset="100%" stop-color="#0a0a14" />
    </linearGradient>
    <linearGradient id="felt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22744a" />
      <stop offset="100%" stop-color="#13502d" />
    </linearGradient>
    <radialGradient id="black" cx="0.35" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#4a525d" />
      <stop offset="70%" stop-color="#111418" />
    </radialGradient>
    <radialGradient id="white" cx="0.35" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="70%" stop-color="#dde0e6" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)" />
  <!-- Felt board -->
  <rect x="92" y="20" width="160" height="160" rx="10" fill="url(#felt)" stroke="#0a2f1a" stroke-width="2" />
  <!-- Grid lines -->
  <g stroke="rgba(0,0,0,0.42)" stroke-width="1">
    <line x1="92" y1="40" x2="252" y2="40" />
    <line x1="92" y1="60" x2="252" y2="60" />
    <line x1="92" y1="80" x2="252" y2="80" />
    <line x1="92" y1="100" x2="252" y2="100" />
    <line x1="92" y1="120" x2="252" y2="120" />
    <line x1="92" y1="140" x2="252" y2="140" />
    <line x1="92" y1="160" x2="252" y2="160" />
    <line x1="112" y1="20" x2="112" y2="180" />
    <line x1="132" y1="20" x2="132" y2="180" />
    <line x1="152" y1="20" x2="152" y2="180" />
    <line x1="172" y1="20" x2="172" y2="180" />
    <line x1="192" y1="20" x2="192" y2="180" />
    <line x1="212" y1="20" x2="212" y2="180" />
    <line x1="232" y1="20" x2="232" y2="180" />
  </g>
  <!-- Discs: standard opening position (4 center) plus a few -->
  <g>
    <circle cx="162" cy="90" r="8" fill="url(#white)" />
    <circle cx="182" cy="90" r="8" fill="url(#black)" />
    <circle cx="162" cy="110" r="8" fill="url(#black)" />
    <circle cx="182" cy="110" r="8" fill="url(#white)" />
    <!-- A few extra to show capture mid-game -->
    <circle cx="142" cy="110" r="8" fill="url(#black)" />
    <circle cx="202" cy="110" r="8" fill="url(#white)" />
    <circle cx="142" cy="130" r="8" fill="url(#white)" />
    <circle cx="202" cy="70" r="8" fill="url(#black)" />
    <!-- Corner-grab (gold square) -->
    <circle cx="102" cy="30" r="8" fill="url(#black)" />
    <circle cx="242" cy="170" r="8" fill="url(#white)" />
  </g>
  <text x="20" y="36" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4e4ed">Reversi</text>
  <text x="20" y="56" font-family="ui-sans-serif, system-ui" font-size="11" fill="#98a0ad">Çevir &amp; hakim ol</text>
</svg>
