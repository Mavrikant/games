<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Sapan">
  <defs>
    <linearGradient id="sp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1726" />
      <stop offset="60%" stop-color="#1a2940" />
      <stop offset="100%" stop-color="#0f1623" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#sp-bg)" />
  <!-- Stars -->
  <g fill="#ffffff" fill-opacity="0.25">
    <rect x="42" y="28" width="1.5" height="1.5" />
    <rect x="92" y="58" width="1.5" height="1.5" />
    <rect x="174" y="36" width="1.5" height="1.5" />
    <rect x="244" y="72" width="1.5" height="1.5" />
    <rect x="288" y="46" width="1.5" height="1.5" />
    <rect x="130" y="84" width="1.5" height="1.5" />
  </g>
  <!-- Ground -->
  <rect x="0" y="170" width="320" height="30" fill="#0a1015" />
  <rect x="0" y="170" width="320" height="1" fill="#2a313d" />
  <!-- Trajectory dots -->
  <g fill="#ffffff" fill-opacity="0.45">
    <circle cx="98" cy="140" r="1.8" />
    <circle cx="118" cy="118" r="1.8" />
    <circle cx="142" cy="100" r="1.8" />
    <circle cx="168" cy="88" r="1.8" />
    <circle cx="196" cy="82" r="1.8" />
    <circle cx="224" cy="86" r="1.8" />
  </g>
  <!-- Balloons -->
  <g>
    <ellipse cx="244" cy="90" rx="13" ry="15" fill="#e5e7eb" />
    <ellipse cx="240" cy="84" rx="3.5" ry="5" fill="#ffffff" fill-opacity="0.55" />
    <line x1="244" y1="106" x2="246" y2="138" stroke="#6b7280" stroke-width="1" />
  </g>
  <g>
    <ellipse cx="200" cy="56" rx="10" ry="12" fill="#fbbf24" />
    <ellipse cx="197" cy="51" rx="2.5" ry="4" fill="#fef3c7" fill-opacity="0.6" />
    <line x1="200" y1="68" x2="202" y2="98" stroke="#92400e" stroke-width="1" />
  </g>
  <g>
    <ellipse cx="278" cy="120" rx="10" ry="12" fill="#1f2937" />
    <line x1="275" y1="106" x2="271" y2="98" stroke="#9aa0aa" stroke-width="1.5" />
    <circle cx="271" cy="98" r="2.4" fill="#fbbf24" />
    <line x1="278" y1="132" x2="280" y2="160" stroke="#ef4444" stroke-width="1" />
  </g>
  <!-- Slingshot -->
  <g transform="translate(70 150)">
    <!-- base -->
    <rect x="-18" y="20" width="36" height="6" fill="#2a313d" />
    <!-- post -->
    <rect x="-4" y="-6" width="8" height="26" fill="#7c5024" />
    <!-- left fork -->
    <g transform="rotate(-28)">
      <rect x="-4" y="-32" width="8" height="28" fill="#7c5024" />
    </g>
    <!-- right fork -->
    <g transform="rotate(28)">
      <rect x="-4" y="-32" width="8" height="28" fill="#7c5024" />
    </g>
    <!-- bands stretched back to pouch (down-left) -->
    <line x1="-12" y1="-32" x2="-22" y2="-4" stroke="#a16a3a" stroke-width="2.5" />
    <line x1="12" y1="-32" x2="-22" y2="-4" stroke="#a16a3a" stroke-width="2.5" />
    <!-- stone -->
    <circle cx="-22" cy="-4" r="5" fill="#cbd5e1" />
  </g>
  <!-- Wind indicator (small) -->
  <g transform="translate(160 18)">
    <rect x="-40" y="-6" width="80" height="12" fill="#10141c" stroke="#2a313d" />
    <rect x="-0.5" y="-6" width="1" height="12" fill="#2a313d" />
    <line x1="0" y1="0" x2="22" y2="0" stroke="#60a5fa" stroke-width="2.5" />
    <polygon points="22,0 17,-3 17,3" fill="#60a5fa" />
  </g>
  <text x="14" y="34" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4e4ed">Sapan</text>
</svg>
