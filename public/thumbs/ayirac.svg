<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Ayıraç">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c2a" />
      <stop offset="100%" stop-color="#0a0a14" />
    </linearGradient>
    <radialGradient id="hub" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#1a1c24" />
      <stop offset="100%" stop-color="#0a0b0e" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)" />
  <g transform="translate(160 110) rotate(-20)">
    <!-- 4 colored sectors (90 deg each) -->
    <path d="M0 0 L66 0 A66 66 0 0 1 0 66 Z" fill="#ef4444" />
    <path d="M0 0 L0 66 A66 66 0 0 1 -66 0 Z" fill="#22c55e" />
    <path d="M0 0 L-66 0 A66 66 0 0 1 0 -66 Z" fill="#3b82f6" />
    <path d="M0 0 L0 -66 A66 66 0 0 1 66 0 Z" fill="#facc15" />
    <circle r="66" fill="none" stroke="#0a0b0e" stroke-width="3" />
    <circle r="18" fill="url(#hub)" stroke="#334" stroke-width="2" />
  </g>
  <!-- incoming particles with trails -->
  <g stroke-linecap="round" fill="none">
    <line x1="36" y1="58" x2="60" y2="80" stroke="#ef4444aa" stroke-width="3" />
    <line x1="282" y1="40" x2="252" y2="62" stroke="#22c55eaa" stroke-width="3" />
    <line x1="290" y1="170" x2="252" y2="146" stroke="#facc15aa" stroke-width="3" />
  </g>
  <g>
    <circle cx="60" cy="80" r="7" fill="#ef4444" stroke="#0a0b0e" stroke-width="1.5" />
    <circle cx="252" cy="62" r="7" fill="#22c55e" stroke="#0a0b0e" stroke-width="1.5" />
    <circle cx="252" cy="146" r="7" fill="#facc15" stroke="#0a0b0e" stroke-width="1.5" />
  </g>
  <text x="20" y="32" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4e4ed">Ayıraç</text>
</svg>
