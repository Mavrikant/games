<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Karahindiba">
  <defs>
    <linearGradient id="kh-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b2a4a" />
      <stop offset="55%" stop-color="#3b5ea0" />
      <stop offset="100%" stop-color="#a3c9ef" />
    </linearGradient>
    <radialGradient id="kh-puff" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="70%" stop-color="#f1f5f9" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#cbd5e1" stop-opacity="0.0" />
    </radialGradient>
    <radialGradient id="kh-soil" cx="0.45" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#7a5736" />
      <stop offset="100%" stop-color="#3a2415" />
    </radialGradient>
  </defs>

  <rect width="320" height="200" fill="url(#kh-sky)" />

  <!-- Hills -->
  <path d="M0,150 Q80,128 160,142 T320,138 L320,200 L0,200 Z"
        fill="rgba(40,60,90,0.55)" />
  <path d="M0,168 Q100,150 200,162 T320,158 L320,200 L0,200 Z"
        fill="rgba(60,100,80,0.65)" />

  <!-- Ground band -->
  <rect x="0" y="178" width="320" height="22" fill="#2a4a1e" />
  <rect x="0" y="176" width="320" height="3" fill="#4d7a3a" />

  <!-- Flower beds (colored rings on soil) -->
  <g>
    <circle cx="48"  cy="125" r="14" fill="url(#kh-soil)" stroke="#f59e0b" stroke-width="3" />
    <circle cx="48"  cy="118" r="2.4" fill="#f59e0b" />
    <circle cx="55"  cy="129" r="2.4" fill="rgba(255,255,255,0.25)" />
    <circle cx="41"  cy="129" r="2.4" fill="rgba(255,255,255,0.25)" />

    <circle cx="105" cy="100" r="14" fill="url(#kh-soil)" stroke="#ec4899" stroke-width="3" />
    <circle cx="105" cy="93"  r="2.4" fill="#ec4899" />
    <circle cx="112" cy="104" r="2.4" fill="#ec4899" />
    <circle cx="98"  cy="104" r="2.4" fill="rgba(255,255,255,0.25)" />

    <circle cx="208" cy="135" r="14" fill="url(#kh-soil)" stroke="#22d3ee" stroke-width="3" />
    <circle cx="208" cy="128" r="2.4" fill="#22d3ee" />
    <circle cx="215" cy="139" r="2.4" fill="rgba(255,255,255,0.25)" />
    <circle cx="201" cy="139" r="2.4" fill="rgba(255,255,255,0.25)" />

    <!-- Bloomed flower (violet) -->
    <g transform="translate(265 95)">
      <g fill="#a855f7" stroke="rgba(255,255,255,0.4)" stroke-width="0.5">
        <ellipse cx="0"  cy="-10" rx="6" ry="4" />
        <ellipse cx="9"  cy="-3"  rx="6" ry="4" transform="rotate(60 9 -3)" />
        <ellipse cx="6"  cy="8"   rx="6" ry="4" transform="rotate(120 6 8)" />
        <ellipse cx="-6" cy="8"   rx="6" ry="4" transform="rotate(-120 -6 8)" />
        <ellipse cx="-9" cy="-3"  rx="6" ry="4" transform="rotate(-60 -9 -3)" />
      </g>
      <circle cx="0" cy="0" r="3" fill="#fde68a" stroke="#a16207" stroke-width="0.7" />
    </g>
  </g>

  <!-- Wind streaks -->
  <g stroke="rgba(255,255,255,0.55)" stroke-width="1.4" stroke-linecap="round">
    <line x1="20"  y1="55" x2="50"  y2="55" />
    <line x1="70"  y1="40" x2="105" y2="40" />
    <line x1="130" y1="68" x2="165" y2="68" />
    <line x1="195" y1="48" x2="225" y2="48" />
  </g>

  <!-- Stem + leaves -->
  <g transform="translate(160 180)">
    <path d="M0,0 Q4,-22 2,-50" stroke="#3d6a2a" stroke-width="3" fill="none" stroke-linecap="round" />
    <ellipse cx="-8" cy="-7"  rx="7" ry="2.5" fill="#558a3b" transform="rotate(-30 -8 -7)" />
    <ellipse cx="9"  cy="-12" rx="7" ry="2.5" fill="#558a3b" transform="rotate(30 9 -12)" />

    <!-- Puff head -->
    <circle cx="2" cy="-58" r="22" fill="url(#kh-puff)" />
    <g stroke="rgba(255,255,255,0.8)" stroke-width="0.8" stroke-linecap="round" fill="none">
      <line x1="2"   y1="-58" x2="-8"  y2="-72" />
      <line x1="2"   y1="-58" x2="2"   y2="-78" />
      <line x1="2"   y1="-58" x2="14"  y2="-72" />
      <line x1="2"   y1="-58" x2="-16" y2="-60" />
      <line x1="2"   y1="-58" x2="22"  y2="-58" />
      <line x1="2"   y1="-58" x2="-12" y2="-46" />
      <line x1="2"   y1="-58" x2="14"  y2="-46" />
    </g>
  </g>

  <!-- Drifting seeds in flight (decorative) -->
  <g transform="translate(0 0)" fill="rgba(255,255,255,0.95)" stroke="rgba(255,255,255,0.9)" stroke-width="0.7" stroke-linecap="round">
    <g transform="translate(120 80)">
      <line x1="0" y1="0" x2="4" y2="-4" />
      <line x1="0" y1="0" x2="-4" y2="-4" />
      <line x1="0" y1="0" x2="0" y2="-6" />
      <line x1="0" y1="0" x2="5" y2="0" />
      <line x1="0" y1="0" x2="-5" y2="0" />
      <circle cx="0" cy="0" r="0.9" fill="#6b4a2a" />
    </g>
    <g transform="translate(155 60)">
      <line x1="0" y1="0" x2="4" y2="-4" />
      <line x1="0" y1="0" x2="-4" y2="-4" />
      <line x1="0" y1="0" x2="0" y2="-6" />
      <line x1="0" y1="0" x2="5" y2="0" />
      <line x1="0" y1="0" x2="-5" y2="0" />
      <circle cx="0" cy="0" r="0.9" fill="#6b4a2a" />
    </g>
    <g transform="translate(190 88)">
      <line x1="0" y1="0" x2="4" y2="-4" />
      <line x1="0" y1="0" x2="-4" y2="-4" />
      <line x1="0" y1="0" x2="0" y2="-6" />
      <line x1="0" y1="0" x2="5" y2="0" />
      <line x1="0" y1="0" x2="-5" y2="0" />
      <circle cx="0" cy="0" r="0.9" fill="#6b4a2a" />
    </g>
  </g>
</svg>
