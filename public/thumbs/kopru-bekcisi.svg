<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Köprü Bekçisi">
  <defs>
    <linearGradient id="kbk-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2a3a" />
      <stop offset="100%" stop-color="#0a0b0e" />
    </linearGradient>
    <linearGradient id="kbk-water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b3a52" />
      <stop offset="100%" stop-color="#10223a" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#kbk-bg)" />

  <!-- Road approaches -->
  <rect x="0" y="48" width="120" height="36" fill="#3d3f48" />
  <rect x="200" y="48" width="120" height="36" fill="#3d3f48" />
  <line x1="0" y1="66" x2="118" y2="66" stroke="#f0d97a" stroke-width="2" stroke-dasharray="8 6" />
  <line x1="202" y1="66" x2="320" y2="66" stroke="#f0d97a" stroke-width="2" stroke-dasharray="8 6" />

  <!-- Banks -->
  <rect x="0" y="84" width="320" height="18" fill="#2a3528" />

  <!-- River -->
  <rect x="0" y="102" width="320" height="68" fill="url(#kbk-water)" />
  <path d="M0 122 Q 20 119 40 122 T 80 122 T 120 122 T 160 122 T 200 122 T 240 122 T 280 122 T 320 122" stroke="rgba(160,200,230,0.35)" stroke-width="1" fill="none" />
  <path d="M0 144 Q 22 141 44 144 T 88 144 T 132 144 T 176 144 T 220 144 T 264 144 T 308 144 L 320 144" stroke="rgba(160,200,230,0.3)" stroke-width="1" fill="none" />

  <!-- Bottom bank -->
  <rect x="0" y="170" width="320" height="30" fill="#2a3528" />

  <!-- Pillars -->
  <rect x="118" y="42" width="8" height="132" fill="#5b6068" stroke="#2e3137" />
  <rect x="194" y="42" width="8" height="132" fill="#5b6068" stroke="#2e3137" />
  <rect x="115" y="40" width="14" height="4" fill="#767c84" />
  <rect x="191" y="40" width="14" height="4" fill="#767c84" />

  <!-- Bridge halves: open (raised) -->
  <g transform="translate(126 66) rotate(-72)">
    <rect x="0" y="-18" width="34" height="36" fill="#3d3f48" stroke="#1f2128" />
    <rect x="0" y="-18" width="34" height="3" fill="#2a2c33" />
    <rect x="0" y="15" width="34" height="3" fill="#2a2c33" />
    <line x1="11" y1="-14" x2="11" y2="14" stroke="rgba(0,0,0,0.4)" />
    <line x1="22" y1="-14" x2="22" y2="14" stroke="rgba(0,0,0,0.4)" />
    <rect x="31" y="-18" width="3" height="36" fill="#c87a3a" />
  </g>
  <g transform="translate(194 66) rotate(72)">
    <rect x="-34" y="-18" width="34" height="36" fill="#3d3f48" stroke="#1f2128" />
    <rect x="-34" y="-18" width="34" height="3" fill="#2a2c33" />
    <rect x="-34" y="15" width="34" height="3" fill="#2a2c33" />
    <line x1="-11" y1="-14" x2="-11" y2="14" stroke="rgba(0,0,0,0.4)" />
    <line x1="-22" y1="-14" x2="-22" y2="14" stroke="rgba(0,0,0,0.4)" />
    <rect x="-34" y="-18" width="3" height="36" fill="#c87a3a" />
  </g>

  <!-- A boat passing under -->
  <g transform="translate(160 136)">
    <polygon points="-26,0 -18,9 18,9 26,0" fill="#e2e8f0" />
    <rect x="-26" y="-2" width="52" height="2" fill="#1f2937" />
    <rect x="-13" y="-13" width="26" height="13" rx="2" fill="#4b5563" />
    <rect x="-10" y="-10" width="20" height="6" fill="rgba(220,235,255,0.7)" />
    <line x1="0" y1="-13" x2="0" y2="-23" stroke="#3a3a45" stroke-width="1.5" />
    <polygon points="0,-23 8,-20 0,-17" fill="#f87171" />
  </g>

  <!-- A waiting car on left approach -->
  <g transform="translate(70 60)">
    <rect x="-15" y="-7" width="30" height="14" rx="3" fill="#ef4444" />
    <rect x="3" y="-5" width="9" height="10" rx="1" fill="rgba(220,235,255,0.7)" />
    <rect x="-11" y="5" width="6" height="3" fill="#15161b" />
    <rect x="6" y="5" width="6" height="3" fill="#15161b" />
  </g>

  <!-- A car on right approach -->
  <g transform="translate(260 72)">
    <rect x="-15" y="-7" width="30" height="14" rx="3" fill="#facc15" />
    <rect x="-12" y="-5" width="9" height="10" rx="1" fill="rgba(220,235,255,0.7)" />
    <rect x="-11" y="5" width="6" height="3" fill="#15161b" />
    <rect x="6" y="5" width="6" height="3" fill="#15161b" />
  </g>
</svg>
