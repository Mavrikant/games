<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Misk">
  <defs>
    <linearGradient id="misk-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f1430" />
      <stop offset="100%" stop-color="#0a0b0e" />
    </linearGradient>
    <linearGradient id="misk-liq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <radialGradient id="misk-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#misk-bg)" />
  <circle cx="200" cy="108" r="80" fill="url(#misk-glow)" />

  <!-- bottle -->
  <g transform="translate(176 50)">
    <rect x="14" y="0" width="14" height="14" rx="2" fill="#2a2030" stroke="#4a3a5a" stroke-width="2" />
    <rect x="0" y="14" width="42" height="86" rx="10" fill="#231a30" stroke="#5a4570" stroke-width="2.5" />
    <rect x="3" y="48" width="36" height="49" rx="7" fill="url(#misk-liq)" />
    <ellipse cx="21" cy="48" rx="18" ry="3" fill="#e9d5ff" opacity="0.6" />
  </g>

  <!-- three axis bars -->
  <g transform="translate(28 70)">
    <rect x="0" y="0" width="120" height="10" rx="5" fill="#232024" />
    <rect x="0" y="0" width="74" height="10" rx="5" fill="#ec4899" />
    <rect x="64" y="-3" width="22" height="16" rx="3" fill="none" stroke="#34d399" stroke-dasharray="3 2" stroke-width="1.2" />

    <rect x="0" y="22" width="120" height="10" rx="5" fill="#232024" />
    <rect x="0" y="22" width="52" height="10" rx="5" fill="#a16207" />
    <rect x="46" y="19" width="22" height="16" rx="3" fill="none" stroke="#34d399" stroke-dasharray="3 2" stroke-width="1.2" />

    <rect x="0" y="44" width="120" height="10" rx="5" fill="#232024" />
    <rect x="0" y="44" width="92" height="10" rx="5" fill="#fbbf24" />
    <rect x="80" y="41" width="22" height="16" rx="3" fill="none" stroke="#34d399" stroke-dasharray="3 2" stroke-width="1.2" />
  </g>

  <!-- droplets -->
  <g opacity="0.85">
    <circle cx="200" cy="36" r="3.2" fill="#c084fc" />
    <circle cx="208" cy="44" r="2.4" fill="#c084fc" />
  </g>

  <text x="20" y="36" font-family="ui-sans-serif, system-ui" font-size="22" font-weight="700" fill="#f5f6f8">Misk</text>
  <text x="262" y="178" font-family="ui-sans-serif, system-ui" font-size="22" fill="#fbbf24">★★★</text>
</svg>
