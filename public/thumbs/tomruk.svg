<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Tomruk">
  <defs>
    <linearGradient id="tm-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="55%" stop-color="#1e3a5f" />
      <stop offset="100%" stop-color="#2d4d6e" />
    </linearGradient>
    <linearGradient id="tm-water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b2e4c" />
      <stop offset="100%" stop-color="#06192c" />
    </linearGradient>
    <radialGradient id="tm-log" cx="0.42" cy="0.38" r="0.7">
      <stop offset="0%" stop-color="#d6a96b" />
      <stop offset="70%" stop-color="#9a6a36" />
      <stop offset="100%" stop-color="#5a3a1a" />
    </radialGradient>
  </defs>

  <!-- Sky + water -->
  <rect width="320" height="140" fill="url(#tm-sky)" />
  <rect y="140" width="320" height="60" fill="url(#tm-water)" />

  <!-- Distant moon -->
  <circle cx="58" cy="48" r="14" fill="#fef3c7" opacity="0.22" />

  <!-- Title -->
  <text x="20" y="32" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e6efff">Tomruk</text>
  <text x="20" y="50" font-family="ui-sans-serif, system-ui" font-size="10" font-weight="600" fill="#fbbf24" letter-spacing="2">DENGEDE KAL</text>

  <!-- Water ripples -->
  <g stroke="rgba(148,197,230,0.22)" stroke-width="1.2" fill="none">
    <path d="M 0 155 Q 20 150 40 155 T 80 155 T 120 155 T 160 155 T 200 155 T 240 155 T 280 155 T 320 155" />
    <path d="M 0 170 Q 20 166 40 170 T 80 170 T 120 170 T 160 170 T 200 170 T 240 170 T 280 170 T 320 170" />
    <path d="M 0 185 Q 20 180 40 185 T 80 185 T 120 185 T 160 185 T 200 185 T 240 185 T 280 185 T 320 185" />
  </g>

  <!-- Wave warning (left side swell) -->
  <path d="M 0 138 Q 22 118 50 138 L 50 200 L 0 200 Z" fill="rgba(248,113,113,0.32)" />
  <g stroke="#fde2e2" fill="#fde2e2" stroke-width="2.4" stroke-linecap="round">
    <line x1="10" y1="116" x2="46" y2="116" />
    <polygon points="46,116 38,111 38,121" />
  </g>

  <!-- Reflection -->
  <ellipse cx="200" cy="156" rx="58" ry="4" fill="rgba(15,32,50,0.55)" />

  <!-- Log -->
  <g transform="translate(200 130) rotate(18)">
    <circle r="44" fill="url(#tm-log)" stroke="#3e2812" stroke-width="2.5" />
    <g fill="none" stroke="rgba(64,38,18,0.55)" stroke-width="0.7">
      <circle r="34" />
      <circle r="24" />
      <circle r="14" />
    </g>
    <circle r="4" fill="#6b3f1a" />
    <path d="M -8 -42 A 44 44 0 0 1 8 -42" fill="none" stroke="#3e2812" stroke-width="3" />
  </g>

  <!-- Crown highlight on top of log -->
  <circle cx="200" cy="86" r="6" fill="rgba(110,231,183,0.7)" />

  <!-- Lumberjack standing on top of log -->
  <g transform="translate(200 86)">
    <!-- boots -->
    <rect x="-10" y="-2" width="7" height="6" fill="#2b1b0c" />
    <rect x="3" y="-2" width="7" height="6" fill="#2b1b0c" />
    <!-- legs -->
    <rect x="-9" y="-20" width="6" height="18" fill="#1e3a8a" />
    <rect x="3" y="-20" width="6" height="18" fill="#1e3a8a" />
    <!-- belt -->
    <rect x="-11" y="-22" width="22" height="3" fill="#3a2410" />
    <!-- torso (red flannel) -->
    <polygon points="-11,-22 11,-22 10,-44 -10,-44" fill="#dc2626" />
    <g stroke="rgba(0,0,0,0.25)" stroke-width="0.7" fill="none">
      <line x1="-11" y1="-30" x2="11" y2="-30" />
      <line x1="-11" y1="-37" x2="11" y2="-37" />
      <line x1="-5" y1="-44" x2="-5" y2="-22" />
      <line x1="5" y1="-44" x2="5" y2="-22" />
    </g>
    <!-- arms outstretched -->
    <rect x="-26" y="-42" width="16" height="5" fill="#dc2626" />
    <rect x="10" y="-42" width="16" height="5" fill="#dc2626" />
    <!-- hands -->
    <circle cx="-28" cy="-39.5" r="3" fill="#e6c5a3" />
    <circle cx="28" cy="-39.5" r="3" fill="#e6c5a3" />
    <!-- neck -->
    <rect x="-3" y="-48" width="6" height="4" fill="#e6c5a3" />
    <!-- head -->
    <circle cx="0" cy="-54" r="6.5" fill="#e6c5a3" />
    <!-- beard -->
    <path d="M -6 -52 A 6 6 0 0 0 6 -52" fill="#3b2418" />
    <!-- cap -->
    <polygon points="-6,-55 6,-55 5,-62 -5,-62" fill="#0f766e" />
    <circle cx="0" cy="-64" r="2.2" fill="#fef3c7" />
  </g>

  <!-- Balance bar at bottom -->
  <rect x="40" y="182" width="240" height="6" rx="3" fill="rgba(255,255,255,0.08)" />
  <rect x="40" y="182" width="120" height="6" rx="3" fill="rgba(255,255,255,0.0)" />
  <rect x="120" y="182" width="40" height="6" rx="3" fill="#34d399" />
  <rect x="159" y="180" width="2" height="10" fill="rgba(255,255,255,0.5)" />
</svg>
