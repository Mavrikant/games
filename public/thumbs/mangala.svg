<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Mangala">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c2a" />
      <stop offset="100%" stop-color="#0a0a14" />
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7a3f1c" />
      <stop offset="100%" stop-color="#3c1c0c" />
    </linearGradient>
    <radialGradient id="pit" cx="0.4" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#8a4b22" />
      <stop offset="80%" stop-color="#3c1c0c" />
    </radialGradient>
    <radialGradient id="stone" cx="0.4" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#fffaf0" />
      <stop offset="80%" stop-color="#d4c39c" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)" />
  <!-- Board -->
  <rect x="22" y="38" width="276" height="128" rx="22" fill="url(#wood)" stroke="#1a0d05" stroke-width="2" />
  <!-- Left store (AI) -->
  <ellipse cx="50" cy="102" rx="18" ry="40" fill="url(#pit)" stroke="#1a0d05" stroke-width="1.5" />
  <!-- Right store (YOU) -->
  <ellipse cx="270" cy="102" rx="18" ry="40" fill="url(#pit)" stroke="#1a0d05" stroke-width="1.5" />
  <!-- Top row (AI pits) -->
  <g>
    <circle cx="92"  cy="74" r="14" fill="url(#pit)" stroke="#1a0d05" stroke-width="1.5" />
    <circle cx="124" cy="74" r="14" fill="url(#pit)" stroke="#1a0d05" stroke-width="1.5" />
    <circle cx="156" cy="74" r="14" fill="url(#pit)" stroke="#1a0d05" stroke-width="1.5" />
    <circle cx="188" cy="74" r="14" fill="url(#pit)" stroke="#1a0d05" stroke-width="1.5" />
    <circle cx="220" cy="74" r="14" fill="url(#pit)" stroke="#1a0d05" stroke-width="1.5" />
    <circle cx="252" cy="74" r="14" fill="url(#pit)" stroke="#1a0d05" stroke-width="1.5" />
  </g>
  <!-- Bottom row (YOU pits) -->
  <g>
    <circle cx="92"  cy="130" r="14" fill="url(#pit)" stroke="#1a0d05" stroke-width="1.5" />
    <circle cx="124" cy="130" r="14" fill="url(#pit)" stroke="#1a0d05" stroke-width="1.5" />
    <circle cx="156" cy="130" r="14" fill="url(#pit)" stroke="#1a0d05" stroke-width="1.5" />
    <circle cx="188" cy="130" r="14" fill="url(#pit)" stroke="#1a0d05" stroke-width="1.5" />
    <circle cx="220" cy="130" r="14" fill="url(#pit)" stroke="#1a0d05" stroke-width="1.5" />
    <circle cx="252" cy="130" r="14" fill="url(#pit)" stroke="#1a0d05" stroke-width="1.5" />
  </g>
  <!-- Sample stones to indicate scattered taşlar -->
  <g fill="url(#stone)" stroke="#7d6a3e" stroke-width="0.6">
    <circle cx="89" cy="71" r="3" />
    <circle cx="96" cy="76" r="3" />
    <circle cx="121" cy="72" r="3" />
    <circle cx="127" cy="76" r="3" />
    <circle cx="124" cy="78" r="3" />
    <circle cx="153" cy="72" r="3" />
    <circle cx="158" cy="77" r="3" />
    <circle cx="186" cy="73" r="3" />
    <circle cx="191" cy="77" r="3" />
    <circle cx="219" cy="73" r="3" />
    <circle cx="222" cy="77" r="3" />
    <circle cx="250" cy="73" r="3" />
    <circle cx="253" cy="77" r="3" />

    <circle cx="89" cy="127" r="3" />
    <circle cx="96" cy="132" r="3" />
    <circle cx="121" cy="128" r="3" />
    <circle cx="127" cy="132" r="3" />
    <circle cx="156" cy="128" r="3" />
    <circle cx="153" cy="133" r="3" />
    <circle cx="186" cy="129" r="3" />
    <circle cx="191" cy="133" r="3" />
    <circle cx="219" cy="129" r="3" />
    <circle cx="222" cy="133" r="3" />
    <circle cx="250" cy="129" r="3" />
    <circle cx="253" cy="133" r="3" />

    <!-- A handful in player store (right) -->
    <circle cx="268" cy="90" r="3" />
    <circle cx="272" cy="96" r="3" />
    <circle cx="268" cy="104" r="3" />
    <circle cx="273" cy="112" r="3" />
    <circle cx="268" cy="118" r="3" />
  </g>
  <text x="20" y="28" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4e4ed">Mangala</text>
  <text x="20" y="178" font-family="ui-sans-serif, system-ui" font-size="11" fill="#98a0ad">Türk mancala — strateji</text>
</svg>
