<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Bal Süzme">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d1305"/>
      <stop offset="1" stop-color="#0b0703"/>
    </linearGradient>
    <linearGradient id="honey" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffcc4a"/>
      <stop offset="1" stop-color="#b87a0a"/>
    </linearGradient>
    <radialGradient id="hub" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffb84a"/>
      <stop offset="1" stop-color="#5d4310"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)"/>
  <!-- drum shadow -->
  <ellipse cx="160" cy="178" rx="76" ry="8" fill="#000" opacity="0.45"/>
  <!-- drum outer -->
  <circle cx="160" cy="100" r="86" fill="#3a3a44"/>
  <circle cx="160" cy="100" r="80" fill="#23232a"/>
  <circle cx="160" cy="100" r="60" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>
  <circle cx="160" cy="100" r="40" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>
  <!-- 4 frames -->
  <g>
    <!-- top -->
    <g transform="translate(160 50)">
      <rect x="-15" y="-19" width="30" height="38" rx="4" fill="#1a1208" stroke="#544020" stroke-width="1.4"/>
      <rect x="-13" y="-9" width="26" height="26" fill="url(#honey)"/>
    </g>
    <!-- right -->
    <g transform="translate(218 100) rotate(90)">
      <rect x="-15" y="-19" width="30" height="38" rx="4" fill="#1a1208" stroke="#544020" stroke-width="1.4"/>
      <rect x="-13" y="-6" width="26" height="23" fill="url(#honey)"/>
    </g>
    <!-- bottom -->
    <g transform="translate(160 150) rotate(180)">
      <rect x="-15" y="-19" width="30" height="38" rx="4" fill="#1a1208" stroke="#544020" stroke-width="1.4"/>
      <rect x="-13" y="-11" width="26" height="28" fill="url(#honey)"/>
    </g>
    <!-- left -->
    <g transform="translate(102 100) rotate(-90)">
      <rect x="-15" y="-19" width="30" height="38" rx="4" fill="#1a1208" stroke="#544020" stroke-width="1.4"/>
      <rect x="-13" y="-4" width="26" height="21" fill="url(#honey)"/>
    </g>
  </g>
  <!-- spinning hub -->
  <g transform="translate(160 100)">
    <circle r="22" fill="url(#hub)"/>
    <g fill="#ffb84a">
      <path d="M0 0 L0 -18 A18 18 0 0 1 9 -15 Z"/>
      <path d="M0 0 L15 -9 A18 18 0 0 1 18 0 Z"/>
      <path d="M0 0 L15 9 A18 18 0 0 1 9 15 Z"/>
      <path d="M0 0 L0 18 A18 18 0 0 1 -9 15 Z"/>
      <path d="M0 0 L-15 9 A18 18 0 0 1 -18 0 Z"/>
      <path d="M0 0 L-15 -9 A18 18 0 0 1 -9 -15 Z"/>
    </g>
    <circle r="4" fill="#2a1a05"/>
  </g>
  <!-- subtle vibration arc -->
  <path d="M 160 14 A 86 86 0 0 1 233 60" fill="none" stroke="#ffaa33" stroke-opacity="0.6" stroke-width="3"/>
  <!-- title -->
  <text x="160" y="194" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffd870" opacity="0.7">BAL SÜZME</text>
</svg>
