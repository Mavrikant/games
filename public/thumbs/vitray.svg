<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Vitray">
  <defs>
    <linearGradient id="vt-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c2a" />
      <stop offset="100%" stop-color="#0a0a14" />
    </linearGradient>
    <radialGradient id="vt-shine" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.30)" />
      <stop offset="55%" stop-color="rgba(255,255,255,0)" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#vt-bg)" />

  <!-- 4x4 stained-glass grid centered, 24px cells with 4px gap, total 108px -->
  <g transform="translate(106, 32)">
    <!-- Lead frame -->
    <rect x="-6" y="-6" width="120" height="120" rx="10" fill="#1f2330" stroke="#2a2f3d" stroke-width="1" />

    <!-- Row 1 -->
    <rect x="0"  y="0"  width="24" height="24" rx="4" fill="#ef4444" />
    <rect x="28" y="0"  width="24" height="24" rx="4" fill="#eab308" />
    <rect x="56" y="0"  width="24" height="24" rx="4" fill="#14171f" />
    <rect x="84" y="0"  width="24" height="24" rx="4" fill="#22c55e" />
    <!-- Row 2 -->
    <rect x="0"  y="28" width="24" height="24" rx="4" fill="#d946ef" />
    <rect x="28" y="28" width="24" height="24" rx="4" fill="#f3f4f6" />
    <rect x="56" y="28" width="24" height="24" rx="4" fill="#22c55e" />
    <rect x="84" y="28" width="24" height="24" rx="4" fill="#06b6d4" />
    <!-- Row 3 -->
    <rect x="0"  y="56" width="24" height="24" rx="4" fill="#14171f" />
    <rect x="28" y="56" width="24" height="24" rx="4" fill="#3b82f6" />
    <rect x="56" y="56" width="24" height="24" rx="4" fill="#d946ef" />
    <rect x="84" y="56" width="24" height="24" rx="4" fill="#14171f" />
    <!-- Row 4 -->
    <rect x="0"  y="84" width="24" height="24" rx="4" fill="#06b6d4" />
    <rect x="28" y="84" width="24" height="24" rx="4" fill="#14171f" />
    <rect x="56" y="84" width="24" height="24" rx="4" fill="#eab308" />
    <rect x="84" y="84" width="24" height="24" rx="4" fill="#ef4444" />

    <!-- Overall glass shine -->
    <rect x="0" y="0" width="108" height="108" rx="4" fill="url(#vt-shine)" />
  </g>

  <text x="20" y="34" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4e4ed">Vitray</text>
  <text x="20" y="184" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="500" fill="#98a0ad" letter-spacing="0.06em">STACK · MIX · MATCH</text>
</svg>
