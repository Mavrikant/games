<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Sırık Atla">
  <defs>
    <linearGradient id="sa-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0b0e" />
      <stop offset="100%" stop-color="#1c2030" />
    </linearGradient>
    <radialGradient id="sa-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="320" height="200" fill="url(#sa-bg)" />

  <!-- Stadium silhouette -->
  <g fill="rgba(255,255,255,0.04)">
    <rect x="0"   y="148" width="32" height="14" />
    <rect x="40"  y="146" width="32" height="16" />
    <rect x="80"  y="150" width="32" height="12" />
    <rect x="120" y="144" width="32" height="18" />
    <rect x="160" y="148" width="32" height="14" />
    <rect x="200" y="146" width="32" height="16" />
    <rect x="240" y="150" width="32" height="12" />
    <rect x="280" y="148" width="32" height="14" />
  </g>

  <!-- Ground -->
  <rect x="0" y="162" width="320" height="38" fill="#2a2e3a" />
  <line x1="0" y1="162" x2="320" y2="162" stroke="#525a6c" stroke-width="1" />

  <!-- Take-off box -->
  <rect x="100" y="158" width="28" height="6" fill="#3b82f6" stroke="#60a5fa" stroke-width="1" />

  <!-- Landing pit -->
  <rect x="180" y="162" width="100" height="38" fill="#374151" />
  <rect x="180" y="162" width="100" height="3" fill="rgba(255,255,255,0.08)" />

  <!-- Uprights -->
  <line x1="190" y1="162" x2="190" y2="60" stroke="#94a3b8" stroke-width="3" />
  <line x1="270" y1="162" x2="270" y2="60" stroke="#94a3b8" stroke-width="3" />

  <!-- Crossbar -->
  <line x1="190" y1="60" x2="270" y2="60" stroke="#fbbf24" stroke-width="4" />

  <!-- Apex glow above bar -->
  <circle cx="230" cy="36" r="42" fill="url(#sa-glow)" />

  <!-- Athlete arc trail -->
  <path d="M 120 158 Q 175 -10 220 38" stroke="#fbbf24" stroke-width="1.5"
        stroke-dasharray="3 4" fill="none" opacity="0.55" />

  <!-- Athlete at apex -->
  <g fill="#e6ebf2">
    <circle cx="220" cy="38" r="5" />
    <rect x="217" y="44" width="6" height="10" />
    <rect x="213" y="54" width="4" height="4" />
    <rect x="223" y="54" width="4" height="4" />
  </g>

  <!-- Pole left in box, leaning -->
  <line x1="114" y1="158" x2="92" y2="120" stroke="#fbbf24" stroke-width="2"
        stroke-linecap="round" />

  <!-- Title -->
  <g font-family="ui-sans-serif, system-ui" font-weight="700">
    <text x="16" y="32" font-size="20" fill="#fbbf24">Sırık Atla</text>
    <text x="16" y="50" font-size="11" fill="rgba(255,255,255,0.6)">
      Ritimle koş — zirvede bırak
    </text>
  </g>
</svg>
