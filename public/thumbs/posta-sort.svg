<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Posta Sort">
  <defs>
    <linearGradient id="ps-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d24" />
      <stop offset="100%" stop-color="#0a0b0e" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ps-bg)" />

  <!-- Conveyor belt (vertical lane) -->
  <rect x="130" y="0" width="60" height="140" fill="#1c2027" stroke="#2f3540" />
  <line x1="130" y1="30" x2="190" y2="30" stroke="#1f242c" stroke-width="1" />
  <line x1="130" y1="60" x2="190" y2="60" stroke="#1f242c" stroke-width="1" />
  <line x1="130" y1="90" x2="190" y2="90" stroke="#1f242c" stroke-width="1" />
  <line x1="130" y1="120" x2="190" y2="120" stroke="#1f242c" stroke-width="1" />

  <!-- Parcel falling -->
  <rect x="140" y="56" width="40" height="40" fill="#caa17b" stroke="#a07b5a" />
  <rect x="140" y="74" width="40" height="6" fill="#a07b5a" />
  <rect x="148" y="60" width="24" height="12" fill="#fef3c7" stroke="#92400e" stroke-width="0.6" />
  <text x="160" y="69" font-family="ui-monospace, monospace" font-size="8" font-weight="700" fill="#3f1d04" text-anchor="middle">IZM</text>

  <!-- Bays at bottom -->
  <g>
    <rect x="8"   y="148" width="56" height="44" fill="none" stroke="#fb7185" stroke-width="2" />
    <text x="36"  y="170" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#fb7185" text-anchor="middle">IST</text>
    <text x="36"  y="184" font-family="ui-monospace, monospace" font-size="9" fill="#5a6473" text-anchor="middle">[1]</text>

    <rect x="68"  y="148" width="56" height="44" fill="none" stroke="#34d399" stroke-width="2" />
    <text x="96"  y="170" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#34d399" text-anchor="middle">ANK</text>
    <text x="96"  y="184" font-family="ui-monospace, monospace" font-size="9" fill="#5a6473" text-anchor="middle">[2]</text>

    <rect x="128" y="148" width="56" height="44" fill="#34d39933" stroke="#60a5fa" stroke-width="2" />
    <text x="156" y="170" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#60a5fa" text-anchor="middle">IZM</text>
    <text x="156" y="184" font-family="ui-monospace, monospace" font-size="9" fill="#5a6473" text-anchor="middle">[3]</text>

    <rect x="188" y="148" width="56" height="44" fill="none" stroke="#c084fc" stroke-width="2" />
    <text x="216" y="170" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#c084fc" text-anchor="middle">BUR</text>
    <text x="216" y="184" font-family="ui-monospace, monospace" font-size="9" fill="#5a6473" text-anchor="middle">[4]</text>

    <rect x="248" y="148" width="56" height="44" fill="none" stroke="#f59e0b" stroke-width="2" />
    <text x="276" y="170" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#f59e0b" text-anchor="middle">ADA</text>
    <text x="276" y="184" font-family="ui-monospace, monospace" font-size="9" fill="#5a6473" text-anchor="middle">[5]</text>
  </g>

  <!-- Title -->
  <text x="16" y="22" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#e4e4ed">Posta Sort</text>
</svg>
