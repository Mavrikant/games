<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0b0e"/>
      <stop offset="1" stop-color="#11141c"/>
    </linearGradient>
    <linearGradient id="fence" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0891b2" stop-opacity="0.35"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)"/>

  <!-- field with grid -->
  <rect x="20" y="20" width="280" height="160" fill="#0d1018"/>
  <g stroke="#1a2030" stroke-width="1">
    <path d="M40,20 V180 M60,20 V180 M80,20 V180 M100,20 V180 M120,20 V180 M140,20 V180 M160,20 V180 M180,20 V180 M200,20 V180 M220,20 V180 M240,20 V180 M260,20 V180 M280,20 V180"/>
    <path d="M20,40 H300 M20,60 H300 M20,80 H300 M20,100 H300 M20,120 H300 M20,140 H300 M20,160 H300"/>
  </g>

  <!-- perimeter (stone) -->
  <rect x="20" y="20" width="280" height="160" fill="none" stroke="#404856" stroke-width="6"/>

  <!-- captured fence area (cyan) -->
  <path d="M20,20 H160 V100 H100 V140 H20 Z" fill="url(#fence)"/>

  <!-- active trail (orange) -->
  <polyline points="160,20 160,40 180,40 180,80 220,80 220,140 280,140" fill="none" stroke="#f59e0b" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- player (yellow dot) -->
  <circle cx="280" cy="140" r="7" fill="#fde68a" stroke="#0a0b0e" stroke-width="2"/>

  <!-- rabbits -->
  <g fill="#ef4444" stroke="#1a0408" stroke-width="1.5">
    <circle cx="240" cy="50" r="8"/>
    <circle cx="80" cy="160" r="8"/>
  </g>
  <g fill="#1a0408">
    <circle cx="237" cy="48" r="1.2"/>
    <circle cx="243" cy="48" r="1.2"/>
    <circle cx="77" cy="158" r="1.2"/>
    <circle cx="83" cy="158" r="1.2"/>
  </g>

  <!-- title hint -->
  <text x="20" y="200" font-family="system-ui, sans-serif" font-size="0" fill="#fff">Çitle</text>
</svg>
