<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Krep">
  <defs>
    <linearGradient id="kp-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c130c" />
      <stop offset="100%" stop-color="#070504" />
    </linearGradient>
    <radialGradient id="kp-cakeA" cx="0.4" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#f5dc82" />
      <stop offset="55%" stop-color="#e9aa3d" />
      <stop offset="100%" stop-color="#9d5e1d" />
    </radialGradient>
    <radialGradient id="kp-cakeB" cx="0.4" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#c98a40" />
      <stop offset="60%" stop-color="#7c4a1f" />
      <stop offset="100%" stop-color="#2c1709" />
    </radialGradient>
    <radialGradient id="kp-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7adc7a" stop-opacity="0.8" />
      <stop offset="60%" stop-color="#3aa84a" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#3aa84a" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="320" height="200" fill="url(#kp-bg)" />

  <!-- stove dividers -->
  <line x1="160" y1="18" x2="160" y2="182" stroke="#352720" stroke-width="2"/>
  <line x1="18" y1="100" x2="302" y2="100" stroke="#352720" stroke-width="2"/>

  <!-- top-left pan: cooking side A -->
  <g transform="translate(82,52)">
    <circle r="42" fill="#0c0a09" />
    <circle r="36" fill="#262019" />
    <circle r="32" fill="none" stroke="#3a302a" stroke-width="2" />
    <circle r="28" fill="url(#kp-cakeA)" />
  </g>

  <!-- top-right pan: ready to flip (green ring) -->
  <g transform="translate(238,52)">
    <circle r="50" fill="url(#kp-glow)" />
    <circle r="42" fill="#0c0a09" />
    <circle r="36" fill="#262019" />
    <circle r="38" fill="none" stroke="#78dc82" stroke-width="3" />
    <circle r="28" fill="url(#kp-cakeA)" />
    <text x="0" y="4" text-anchor="middle" font-family="system-ui,sans-serif"
          font-size="11" font-weight="700" fill="#fff">ÇEVİR</text>
  </g>

  <!-- bottom-left pan: cooking side B -->
  <g transform="translate(82,148)">
    <circle r="42" fill="#0c0a09" />
    <circle r="36" fill="#262019" />
    <circle r="32" fill="none" stroke="#3a302a" stroke-width="2" />
    <circle r="28" fill="url(#kp-cakeB)" />
    <circle cx="-10" cy="-10" r="4" fill="rgba(255,255,255,0.35)" />
  </g>

  <!-- bottom-right pan: burnt with smoke -->
  <g transform="translate(238,148)">
    <circle r="42" fill="#0c0a09" />
    <circle r="36" fill="#262019" />
    <circle r="32" fill="none" stroke="#3a302a" stroke-width="2" />
    <circle r="28" fill="#150803" />
    <path d="M -8 -34 q 6 -14 -2 -26" stroke="rgba(220,210,200,0.5)" stroke-width="2" fill="none"/>
    <path d="M 0 -34 q -6 -14 4 -26" stroke="rgba(220,210,200,0.5)" stroke-width="2" fill="none"/>
    <path d="M 8 -34 q 6 -14 -4 -26" stroke="rgba(220,210,200,0.4)" stroke-width="2" fill="none"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#f55050" stroke-width="3" />
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#f55050" stroke-width="3" />
  </g>
</svg>
