<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Ay Yürüyüşü">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#03040a" />
      <stop offset="55%" stop-color="#0c0820" />
      <stop offset="100%" stop-color="#1b1538" />
    </linearGradient>
    <linearGradient id="plateau" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a9eb2" />
      <stop offset="20%" stop-color="#6b6c83" />
      <stop offset="60%" stop-color="#3a3a52" />
      <stop offset="100%" stop-color="#161826" />
    </linearGradient>
    <radialGradient id="earth" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#5fa6ff" />
      <stop offset="60%" stop-color="#2c5fb5" />
      <stop offset="100%" stop-color="#0a1d44" />
    </radialGradient>
    <linearGradient id="crystal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bfeaff" />
      <stop offset="50%" stop-color="#5fb6ff" />
      <stop offset="100%" stop-color="#1e4f9e" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#sky)" />
  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="20" cy="25" r="0.9" />
    <circle cx="60" cy="40" r="0.6" />
    <circle cx="95" cy="20" r="1.4" opacity="0.9" />
    <circle cx="135" cy="50" r="0.7" />
    <circle cx="180" cy="28" r="0.9" />
    <circle cx="220" cy="60" r="0.6" />
    <circle cx="40" cy="70" r="0.6" />
    <circle cx="260" cy="35" r="1.2" opacity="0.85" />
    <circle cx="290" cy="20" r="0.7" />
  </g>
  <!-- Earth -->
  <g>
    <circle cx="265" cy="50" r="20" fill="url(#earth)" />
    <ellipse cx="259" cy="53" rx="7" ry="3" fill="#6ec882" opacity="0.5" transform="rotate(-22 259 53)" />
    <ellipse cx="273" cy="44" rx="5" ry="2" fill="#6ec882" opacity="0.5" transform="rotate(35 273 44)" />
    <circle cx="265" cy="50" r="21.5" fill="none" stroke="#96c8ff" stroke-opacity="0.3" />
  </g>
  <!-- plateaus -->
  <g>
    <polygon points="0,140 90,140 92,200 -2,200" fill="url(#plateau)" />
    <line x1="0" y1="139" x2="90" y2="139" stroke="#dcdcec" stroke-opacity="0.6" stroke-width="1.6" />
    <ellipse cx="22" cy="142" rx="4" ry="1.2" fill="#000000" opacity="0.3" />
    <ellipse cx="60" cy="142" rx="4" ry="1.2" fill="#000000" opacity="0.3" />
  </g>
  <g>
    <polygon points="130,115 200,115 202,200 128,200" fill="url(#plateau)" />
    <line x1="130" y1="114" x2="200" y2="114" stroke="#dcdcec" stroke-opacity="0.6" stroke-width="1.6" />
    <ellipse cx="155" cy="117" rx="4" ry="1.2" fill="#000000" opacity="0.3" />
    <!-- crystal -->
    <g transform="translate(165,103)">
      <circle r="9" fill="#5fb6ff" opacity="0.3" />
      <polygon points="0,-7 5,0 0,9 -5,0" fill="url(#crystal)" stroke="#ffffff" stroke-opacity="0.7" stroke-width="0.6" />
    </g>
  </g>
  <g>
    <polygon points="240,150 305,150 307,200 238,200" fill="url(#plateau)" />
    <line x1="240" y1="149" x2="305" y2="149" stroke="#dcdcec" stroke-opacity="0.6" stroke-width="1.6" />
  </g>
  <!-- astronaut leaping between first two plateaus -->
  <g transform="translate(112,98)">
    <!-- jet flame -->
    <polygon points="-3,6 3,6 0,16" fill="#ffb45a" opacity="0.85" />
    <polygon points="-1.2,6 1.2,6 0,12" fill="#fff0c8" />
    <!-- body -->
    <ellipse cx="0" cy="3" rx="8" ry="11" fill="#e9ecf2" stroke="#1a1c2a" stroke-width="1.1" />
    <rect x="5" y="-3" width="5" height="10" fill="#9aa1b3" stroke="#1a1c2a" stroke-width="1" />
    <!-- helmet -->
    <circle cx="0" cy="-6" r="8" fill="#f5f7ff" stroke="#1a1c2a" stroke-width="1.1" />
    <ellipse cx="1" cy="-6" rx="5" ry="4" fill="#0a1a30" />
    <ellipse cx="3" cy="-8" rx="1.4" ry="0.9" fill="#7adcff" opacity="0.7" />
    <rect x="-3" y="0" width="3" height="3" fill="#d24252" />
  </g>
  <!-- arc trail -->
  <path d="M 45 130 Q 90 60 165 95" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="3 4" />
  <!-- title -->
  <text x="14" y="32" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="700" fill="#e4e4ed">Ay Yürüyüşü</text>
</svg>
