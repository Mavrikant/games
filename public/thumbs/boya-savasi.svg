    <rect x="150" y="145" width="20" height="20" rx="4" fill="#22c55e" stroke="rgba(255,255,255,0.85)" stroke-width="2.5" />
    <rect x="173" y="145" width="20" height="20" rx="4" fill="#22c55e" stroke="rgba(255,255,255,0.85)" stroke-width="2.5" />
    <rect x="196" y="145" width="20" height="20" rx="4" fill="#22c55e" stroke="rgba(255,255,255,0.85)" stroke-width="2.5" />
    <rect x="219" y="145" width="20" height="20" rx="4" fill="#3b82f6" />
    <rect x="242" y="145" width="20" height="20" rx="4" fill="#a855f7" />
