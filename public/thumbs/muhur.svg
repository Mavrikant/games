<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Mühür">
  <defs>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b1d12" />
      <stop offset="100%" stop-color="#1a110a" />
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3e3c0" />
      <stop offset="100%" stop-color="#dac596" />
    </linearGradient>
    <radialGradient id="wax" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="55%" stop-color="#b91c1c" />
      <stop offset="100%" stop-color="#7f1d1d" />
    </radialGradient>
    <radialGradient id="flame" cx="0.5" cy="0.55" r="0.55">
      <stop offset="0%" stop-color="#fff8c8" />
      <stop offset="45%" stop-color="#ffac40" />
      <stop offset="100%" stop-color="#ff3320" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#desk)" />
  <!-- wood grain -->
  <g stroke="rgba(60,36,18,0.55)" stroke-width="1" fill="none">
    <path d="M0 36 Q 80 40 160 36 T 320 38" />
    <path d="M0 78 Q 90 84 180 80 T 320 82" />
    <path d="M0 132 Q 100 138 200 134 T 320 134" />
    <path d="M0 176 Q 80 180 160 176 T 320 178" />
  </g>
  <!-- letter / envelope -->
  <g transform="translate(34 50)">
    <rect width="200" height="120" rx="6" fill="url(#paper)" stroke="#8a7448" stroke-width="2" />
    <path d="M0 0 L100 32 L200 0" fill="none" stroke="rgba(138,116,72,0.5)" stroke-width="1" />
    <g stroke="rgba(99,80,50,0.4)" stroke-width="1.5" fill="none">
      <line x1="14" y1="62" x2="180" y2="62" />
      <line x1="14" y1="76" x2="160" y2="76" />
      <line x1="14" y1="90" x2="170" y2="90" />
      <line x1="14" y1="104" x2="140" y2="104" />
    </g>
  </g>
  <!-- wax seal -->
  <g transform="translate(178 130)">
    <circle r="32" fill="url(#wax)" />
    <circle r="32" fill="none" stroke="#3a0a0a" stroke-width="2" />
    <!-- embossed star -->
    <polygon
      points="0,-20 5,-7 18,-7 8,2 12,15 0,7 -12,15 -8,2 -18,-7 -5,-7"
      fill="#7f1d1d"
      stroke="#3a0a0a"
      stroke-width="0.8" />
    <circle r="3.5" fill="#3a0a0a" />
  </g>
  <!-- candle -->
  <g transform="translate(264 78)">
    <rect x="-12" y="0" width="24" height="58" rx="3" fill="#dc2626" stroke="#7f1d1d" stroke-width="1.5" />
    <rect x="-12" y="0" width="24" height="5" fill="#b91c1c" />
    <line x1="0" y1="0" x2="0" y2="-10" stroke="#3a2a14" stroke-width="2" />
    <ellipse cx="0" cy="-18" rx="9" ry="15" fill="url(#flame)" />
    <!-- dripping strand -->
    <line x1="-3" y1="40" x2="-86" y2="86" stroke="#dc2626" stroke-width="2.5" />
    <circle cx="-86" cy="86" r="3" fill="#dc2626" />
  </g>
  <!-- title corner accent -->
  <g opacity="0.5">
    <circle cx="38" cy="34" r="3" fill="#d4a017" />
    <circle cx="48" cy="34" r="2" fill="#d4a017" />
  </g>
</svg>
