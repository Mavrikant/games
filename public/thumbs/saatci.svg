<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Saatçi">
  <defs>
    <linearGradient id="sa-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1626" />
      <stop offset="100%" stop-color="#070a14" />
    </linearGradient>
    <radialGradient id="sa-dial" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#15273b" />
      <stop offset="100%" stop-color="#091221" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#sa-bg)" />

  <!-- Title -->
  <text x="20" y="32" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4e4ed">Saatçi</text>
  <text x="20" y="50" font-family="ui-sans-serif, system-ui" font-size="10" fill="#5eead4" font-weight="600" letter-spacing="2">COUPLED WINDERS</text>

  <!-- Clock face -->
  <circle cx="220" cy="105" r="74" fill="url(#sa-dial)" stroke="#1e293b" stroke-width="2" />

  <!-- minute ticks -->
  <g stroke="#94a3b8" stroke-opacity="0.4">
    <g transform="translate(220 105)">
      <g><line x1="0" y1="-72" x2="0" y2="-64" stroke-width="2" /></g>
      <g transform="rotate(30)"><line x1="0" y1="-72" x2="0" y2="-66" stroke-width="1.2" /></g>
      <g transform="rotate(60)"><line x1="0" y1="-72" x2="0" y2="-66" stroke-width="1.2" /></g>
      <g transform="rotate(90)"><line x1="0" y1="-72" x2="0" y2="-64" stroke-width="2" /></g>
      <g transform="rotate(120)"><line x1="0" y1="-72" x2="0" y2="-66" stroke-width="1.2" /></g>
      <g transform="rotate(150)"><line x1="0" y1="-72" x2="0" y2="-66" stroke-width="1.2" /></g>
      <g transform="rotate(180)"><line x1="0" y1="-72" x2="0" y2="-64" stroke-width="2" /></g>
      <g transform="rotate(210)"><line x1="0" y1="-72" x2="0" y2="-66" stroke-width="1.2" /></g>
      <g transform="rotate(240)"><line x1="0" y1="-72" x2="0" y2="-66" stroke-width="1.2" /></g>
      <g transform="rotate(270)"><line x1="0" y1="-72" x2="0" y2="-64" stroke-width="2" /></g>
      <g transform="rotate(300)"><line x1="0" y1="-72" x2="0" y2="-66" stroke-width="1.2" /></g>
      <g transform="rotate(330)"><line x1="0" y1="-72" x2="0" y2="-66" stroke-width="1.2" /></g>
    </g>
  </g>

  <!-- Numerals -->
  <g font-family="ui-sans-serif, system-ui" font-size="11" font-weight="700" fill="#94a3b8" text-anchor="middle">
    <text x="220" y="48">12</text>
    <text x="280" y="110">3</text>
    <text x="220" y="172">6</text>
    <text x="160" y="110">9</text>
  </g>

  <!-- Target ghost hands (red, faint) - pointing to ~2:38 -->
  <g transform="translate(220 105)" stroke="#f87171" stroke-linecap="round" stroke-opacity="0.45">
    <!-- hour ghost ~ 2:38 → 76 deg -->
    <line x1="0" y1="0" x2="34" y2="-19" stroke-width="6" />
    <!-- minute ghost ~ 38 → 228 deg from 12 -->
    <line x1="0" y1="0" x2="-43" y2="35" stroke-width="3" />
  </g>

  <!-- Current hands (accent) - pointing to ~10:15 -->
  <g transform="translate(220 105)" stroke="#5eead4" stroke-linecap="round">
    <!-- hour ~ 10:15 → -45 deg from up -->
    <line x1="0" y1="0" x2="-30" y2="-22" stroke-width="5" />
    <!-- minute → 90 deg → right -->
    <line x1="0" y1="0" x2="52" y2="0" stroke-width="3" />
  </g>

  <!-- second hand (amber) -->
  <line x1="220" y1="105" x2="220" y2="42" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" />

  <!-- center cap -->
  <circle cx="220" cy="105" r="4" fill="#5eead4" stroke="#08111e" stroke-width="1" />

  <!-- Winder buttons on left -->
  <g font-family="ui-sans-serif, system-ui" font-weight="700" text-anchor="middle">
    <rect x="20" y="70" width="50" height="32" rx="6" fill="#0e1a2b" stroke="#1e293b" />
    <text x="45" y="91" fill="#e4e4ed" font-size="13">−1H</text>
    <rect x="20" y="108" width="50" height="32" rx="6" fill="#11243a" stroke="#5eead4" stroke-width="1.5" />
    <text x="45" y="123" fill="#5eead4" font-size="12">+1H</text>
    <text x="45" y="135" fill="#f87171" font-size="8" font-weight="500">+5M</text>
  </g>

  <!-- Winder cogs in middle bottom -->
  <g font-family="ui-sans-serif, system-ui" font-size="10" font-weight="700" fill="#94a3b8" text-anchor="middle">
    <text x="80" y="160">SAAT</text>
    <text x="125" y="160">DAKİKA</text>
    <text x="170" y="160">SANİYE</text>
  </g>

  <!-- Three small cogs (gears) -->
  <g fill="none" stroke="#1e293b" stroke-width="1.5">
    <circle cx="80" cy="178" r="9" />
    <circle cx="125" cy="178" r="9" />
    <circle cx="170" cy="178" r="9" />
  </g>
  <g fill="#5eead4">
    <circle cx="80" cy="178" r="2.5" />
    <circle cx="125" cy="178" r="2.5" />
    <circle cx="170" cy="178" r="2.5" />
  </g>
</svg>
