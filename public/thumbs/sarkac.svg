<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Sarkaç">
  <defs>
    <linearGradient id="sk-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c2a" />
      <stop offset="100%" stop-color="#0a0a14" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#sk-bg)" />
  <!-- Swing arc guide -->
  <path d="M 70 60 A 110 110 0 0 0 250 60" fill="none" stroke="#3b4252" stroke-width="1" stroke-dasharray="3 4" />
  <!-- Rope -->
  <line x1="160" y1="40" x2="100" y2="135" stroke="#aab3c2" stroke-width="2" />
  <!-- Pivot -->
  <circle cx="160" cy="40" r="4" fill="#aab3c2" />
  <!-- Bob -->
  <circle cx="100" cy="135" r="14" fill="#f5c451" stroke="#aab3c2" stroke-width="2" />
  <!-- Bricks around arc -->
  <circle cx="78" cy="92" r="10" fill="none" stroke="#e4ecf8" stroke-width="2.5" />
  <circle cx="78" cy="92" r="6" fill="#e4ecf8" fill-opacity="0.45" />
  <circle cx="160" cy="160" r="10" fill="none" stroke="#f5c451" stroke-width="2.5" />
  <circle cx="160" cy="160" r="6" fill="#f5c451" fill-opacity="0.45" />
  <circle cx="232" cy="120" r="10" fill="none" stroke="#ef4f4f" stroke-width="2.5" />
  <circle cx="232" cy="120" r="6" fill="#ef4f4f" fill-opacity="0.45" />
  <text x="20" y="32" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4e4ed">Sarkaç</text>
</svg>
