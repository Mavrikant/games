<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Hanoi Kuleleri">
  <defs>
    <linearGradient id="hk-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15171f" />
      <stop offset="100%" stop-color="#0a0b0e" />
    </linearGradient>
    <linearGradient id="hk-d1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0abfc" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
    <linearGradient id="hk-d2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="hk-d3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="hk-d4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="hk-d5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#hk-bg)" />

  <!-- Taban -->
  <rect x="22" y="160" width="276" height="10" rx="3" fill="#3a4150" />
  <rect x="22" y="170" width="276" height="3" fill="#1e2228" />

  <!-- Çubuklar (3 kule) -->
  <rect x="65" y="50" width="5" height="110" rx="2" fill="#4a5260" />
  <rect x="158" y="50" width="5" height="110" rx="2" fill="#4a5260" />
  <rect x="251" y="50" width="5" height="110" rx="2" fill="#4a5260" />

  <!-- Sol kulede 5 disk: en büyük altta, en küçük üstte -->
  <rect x="29"  y="146" width="78" height="11" rx="4" fill="url(#hk-d5)" />
  <rect x="33"  y="132" width="70" height="11" rx="4" fill="url(#hk-d4)" />
  <rect x="38"  y="118" width="60" height="11" rx="4" fill="url(#hk-d3)" />
  <rect x="44"  y="104" width="48" height="11" rx="4" fill="url(#hk-d2)" />
  <rect x="50"  y="90"  width="36" height="11" rx="4" fill="url(#hk-d1)" />

  <!-- Hava taşıma göstergesi: orta kuleye uçan en küçük disk -->
  <g opacity="0.92">
    <rect x="142" y="56" width="36" height="9" rx="3" fill="url(#hk-d1)" />
    <!-- Hareket oku -->
    <path d="M 88 88 Q 130 28, 160 58" stroke="#818cf8" stroke-width="1.6" fill="none" stroke-dasharray="3 3" opacity="0.7" />
    <polygon points="158,55 165,57 160,62" fill="#818cf8" opacity="0.85" />
  </g>

  <!-- Başlık -->
  <text x="20" y="32" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="700" fill="#e4e4ed">Hanoi Kuleleri</text>
  <text x="20" y="190" font-family="ui-sans-serif, system-ui" font-size="10" font-weight="500" fill="#98a0ad" letter-spacing="0.06em">3 KULE · DISK BULMACASI</text>
</svg>
