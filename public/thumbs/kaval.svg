<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" role="img" aria-label="Kaval">
  <defs>
    <linearGradient id="kaval-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a1f12"/>
      <stop offset="0.55" stop-color="#3d2c18"/>
      <stop offset="1" stop-color="#1a120a"/>
    </linearGradient>
    <radialGradient id="kaval-lamp" cx="160" cy="20" r="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd282" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffd282" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kaval-band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffdc6e" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffdc6e" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#ffdc6e" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#kaval-bg)"/>
  <rect width="320" height="200" fill="url(#kaval-lamp)"/>

  <!-- yellow trance band -->
  <rect x="0" y="60" width="320" height="60" fill="url(#kaval-band)"/>
  <line x1="0" y1="90" x2="320" y2="90" stroke="#ffdc6e" stroke-opacity="0.5" stroke-dasharray="6 6"/>

  <!-- flute on the left -->
  <g transform="translate(20 170) rotate(-20)">
    <rect x="0" y="0" width="80" height="8" fill="#a87a3a" rx="2"/>
    <rect x="0" y="0" width="6" height="8" fill="#5b3a17"/>
    <rect x="74" y="0" width="6" height="8" fill="#5b3a17"/>
    <circle cx="22" cy="4" r="1.6" fill="#0e0a05"/>
    <circle cx="34" cy="4" r="1.6" fill="#0e0a05"/>
    <circle cx="46" cy="4" r="1.6" fill="#0e0a05"/>
    <circle cx="58" cy="4" r="1.6" fill="#0e0a05"/>
  </g>

  <!-- basket -->
  <g>
    <polygon points="115,160 205,160 195,192 125,192" fill="#3a2510"/>
    <line x1="115" y1="170" x2="205" y2="170" stroke="#5b3a17" stroke-width="1.2"/>
    <line x1="117" y1="180" x2="203" y2="180" stroke="#5b3a17" stroke-width="1.2"/>
    <line x1="119" y1="188" x2="201" y2="188" stroke="#5b3a17" stroke-width="1.2"/>
    <rect x="113" y="156" width="94" height="6" fill="#231708"/>
  </g>

  <!-- snake body -->
  <path d="M 160 160 C 130 130, 190 110, 158 88" stroke="#3c5a32" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M 160 160 C 130 130, 190 110, 158 88" stroke="#6a8a4c" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 160 160 C 130 130, 190 110, 158 88" stroke="#d8e0a0" stroke-width="1.5" fill="none" stroke-dasharray="5 8" stroke-linecap="round" opacity="0.6"/>

  <!-- snake hood + head -->
  <g transform="translate(158 84)">
    <ellipse cx="-13" cy="4" rx="9" ry="13" fill="#3c5a32"/>
    <ellipse cx="13" cy="4" rx="9" ry="13" fill="#3c5a32"/>
    <ellipse cx="0" cy="0" rx="10" ry="13" fill="#4f7340"/>
    <ellipse cx="0" cy="-2" rx="8" ry="11" fill="#7ea257"/>
    <circle cx="-3" cy="-3" r="2" fill="#fff7d8"/>
    <circle cx="3" cy="-3" r="2" fill="#fff7d8"/>
    <circle cx="-3" cy="-3" r="1" fill="#1a1006"/>
    <circle cx="3" cy="-3" r="1" fill="#1a1006"/>
    <path d="M 0 10 L -2 14 M 0 10 L 2 14" stroke="#c84a3a" stroke-width="1.4"/>
  </g>

  <!-- musical notes -->
  <g fill="#ffdc6e" opacity="0.55">
    <circle cx="55" cy="120" r="3"/>
    <circle cx="75" cy="100" r="2.5"/>
    <circle cx="95" cy="80" r="2"/>
    <circle cx="110" cy="60" r="1.5" opacity="0.4"/>
  </g>
</svg>
