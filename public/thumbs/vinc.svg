<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Vinç">
  <defs>
    <linearGradient id="vinc-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1726" />
      <stop offset="70%" stop-color="#182032" />
      <stop offset="100%" stop-color="#1c1a14" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#vinc-bg)" />

  <!-- dock floor -->
  <rect x="0" y="174" width="320" height="26" fill="#3b2f1c" />
  <rect x="0" y="174" width="320" height="3" fill="#6a5224" />

  <!-- crane tower -->
  <rect x="18" y="38" width="14" height="136" fill="#1f2937" />
  <g stroke="#374151" stroke-width="1.3" fill="none">
    <path d="M18 38 L32 56 M32 38 L18 56 M18 56 L32 74 M32 56 L18 74 M18 74 L32 92 M32 74 L18 92 M18 92 L32 110 M32 92 L18 110 M18 110 L32 128 M32 110 L18 128 M18 128 L32 146 M32 128 L18 146 M18 146 L32 164 M32 146 L18 164" />
  </g>
  <rect x="12" y="30" width="26" height="8" fill="#facc15" />

  <!-- horizontal rail -->
  <rect x="42" y="46" width="260" height="7" fill="#475569" stroke="#0f172a" stroke-width="1" />

  <!-- trolley -->
  <rect x="138" y="34" width="36" height="14" rx="2" fill="#facc15" />
  <rect x="138" y="48" width="36" height="4" fill="#a16207" />

  <!-- rope + hook -->
  <line x1="156" y1="54" x2="172" y2="118" stroke="#cbd5e1" stroke-width="1.6" />
  <circle cx="172" cy="118" r="4.5" fill="#e5e7eb" stroke="#0f172a" stroke-width="1.2" />

  <!-- swinging crate (held) -->
  <g transform="translate(172 138) rotate(11)">
    <rect x="-19" y="-16" width="38" height="32" fill="#7c2d12" stroke="#0f172a" stroke-width="1.3" />
    <rect x="-19" y="-16" width="38" height="9" fill="#fb923c" />
    <path d="M-16 -5 L16 13 M16 -5 L-16 13" stroke="#0f172a" stroke-width="1" opacity="0.55" />
  </g>

  <!-- waiting crates on left -->
  <g>
    <rect x="60" y="148" width="32" height="26" fill="#1e3a8a" stroke="#0f172a" stroke-width="1.3" />
    <rect x="60" y="148" width="32" height="8" fill="#60a5fa" />

    <rect x="96" y="148" width="32" height="26" fill="#14532d" stroke="#0f172a" stroke-width="1.3" />
    <rect x="96" y="148" width="32" height="8" fill="#34d399" />
  </g>

  <!-- target slots on right -->
  <g>
    <rect x="200" y="159" width="38" height="14" fill="rgba(15,23,42,0.55)" stroke="#60a5fa" stroke-width="1.5" />
    <polygon points="219,151 215,158 223,158" fill="#60a5fa" />

    <rect x="246" y="159" width="38" height="14" fill="rgba(15,23,42,0.55)" stroke="#34d399" stroke-width="1.5" />
    <polygon points="265,151 261,158 269,158" fill="#34d399" />
  </g>

  <text x="20" y="22" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="700" fill="#fde68a">Vinç</text>
</svg>
