<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Lights Out">
  <defs>
    <linearGradient id="lo-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c2a" />
      <stop offset="100%" stop-color="#0a0a14" />
    </linearGradient>
    <radialGradient id="lo-on" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#f7d680" />
      <stop offset="60%" stop-color="#f0c557" />
      <stop offset="100%" stop-color="#d99a1c" />
    </radialGradient>
    <filter id="lo-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="320" height="200" fill="url(#lo-bg)" />

  <!-- 5x5 grid centered. Cell 22px with 4px gap, board 134px wide.
       Off cells: dark surface. On cells: glowing amber. -->
  <g transform="translate(115, 32)">
    <!-- All 25 off cells first (low layer) -->
    <g fill="#1a1d24" stroke="#262b34" stroke-width="1">
      <rect x="0"  y="0"   width="22" height="22" rx="5" />
      <rect x="26" y="0"   width="22" height="22" rx="5" />
      <rect x="52" y="0"   width="22" height="22" rx="5" />
      <rect x="78" y="0"   width="22" height="22" rx="5" />
      <rect x="104" y="0"  width="22" height="22" rx="5" />

      <rect x="0"  y="26"  width="22" height="22" rx="5" />
      <rect x="26" y="26"  width="22" height="22" rx="5" />
      <rect x="52" y="26"  width="22" height="22" rx="5" />
      <rect x="78" y="26"  width="22" height="22" rx="5" />
      <rect x="104" y="26" width="22" height="22" rx="5" />

      <rect x="0"  y="52"  width="22" height="22" rx="5" />
      <rect x="26" y="52"  width="22" height="22" rx="5" />
      <rect x="52" y="52"  width="22" height="22" rx="5" />
      <rect x="78" y="52"  width="22" height="22" rx="5" />
      <rect x="104" y="52" width="22" height="22" rx="5" />

      <rect x="0"  y="78"  width="22" height="22" rx="5" />
      <rect x="26" y="78"  width="22" height="22" rx="5" />
      <rect x="52" y="78"  width="22" height="22" rx="5" />
      <rect x="78" y="78"  width="22" height="22" rx="5" />
      <rect x="104" y="78" width="22" height="22" rx="5" />

      <rect x="0"  y="104" width="22" height="22" rx="5" />
      <rect x="26" y="104" width="22" height="22" rx="5" />
      <rect x="52" y="104" width="22" height="22" rx="5" />
      <rect x="78" y="104" width="22" height="22" rx="5" />
      <rect x="104" y="104" width="22" height="22" rx="5" />
    </g>

    <!-- "On" cells with glow -->
    <g filter="url(#lo-glow)">
      <rect x="26" y="0"   width="22" height="22" rx="5" fill="url(#lo-on)" />
      <rect x="52" y="26"  width="22" height="22" rx="5" fill="url(#lo-on)" />
      <rect x="26" y="52"  width="22" height="22" rx="5" fill="url(#lo-on)" />
      <rect x="78" y="52"  width="22" height="22" rx="5" fill="url(#lo-on)" />
      <rect x="52" y="78"  width="22" height="22" rx="5" fill="url(#lo-on)" />
      <rect x="104" y="104" width="22" height="22" rx="5" fill="url(#lo-on)" />
    </g>
  </g>

  <text x="20" y="34" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4e4ed">Lights Out</text>
  <text x="20" y="184" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="500" fill="#98a0ad" letter-spacing="0.06em">TURN THEM ALL OFF</text>
</svg>
