<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Kafe Görevlisi">
  <defs>
    <linearGradient id="kg-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f1810" />
      <stop offset="100%" stop-color="#0a0805" />
    </linearGradient>
    <linearGradient id="kg-counter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d2c1e" />
      <stop offset="100%" stop-color="#231810" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" rx="14" fill="url(#kg-bg)" />
  <rect x="1" y="1" width="318" height="198" rx="13" stroke="#2a1d12" fill="none" />
  <!-- order strip (visible memorized sequence) -->
  <rect x="40" y="42" width="240" height="40" rx="8" fill="#1a120a" stroke="#3d2c1e" />
  <text x="160" y="36" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="9" font-weight="700" fill="#a89070" letter-spacing="0.12em">SİPARİŞ</text>
  <text x="78" y="72" text-anchor="middle" font-size="22">☕</text>
  <text x="128" y="72" text-anchor="middle" font-size="22">🍵</text>
  <text x="178" y="72" text-anchor="middle" font-size="22">🧃</text>
  <text x="228" y="72" text-anchor="middle" font-size="22">💧</text>
  <!-- counter -->
  <rect x="20" y="118" width="280" height="56" rx="6" fill="url(#kg-counter)" stroke="#4d3a26" />
  <line x1="20" y1="134" x2="300" y2="134" stroke="#5a4530" stroke-width="1" />
  <!-- prepared drinks (tray) -->
  <g transform="translate(54,148)">
    <ellipse cx="0" cy="6" rx="13" ry="3" fill="rgba(0,0,0,0.4)" />
    <rect x="-10" y="-10" width="20" height="14" rx="2" fill="#5b3a22" />
    <rect x="-10" y="-12" width="20" height="3" fill="#8a6240" />
    <path d="M10,-6 q6,0 6,5 q0,5 -6,5" fill="none" stroke="#5b3a22" stroke-width="2" />
  </g>
  <g transform="translate(104,148)">
    <ellipse cx="0" cy="6" rx="13" ry="3" fill="rgba(0,0,0,0.4)" />
    <rect x="-10" y="-10" width="20" height="14" rx="2" fill="#3a7048" />
    <rect x="-10" y="-12" width="20" height="3" fill="#5fa070" />
    <path d="M10,-6 q6,0 6,5 q0,5 -6,5" fill="none" stroke="#3a7048" stroke-width="2" />
  </g>
  <g transform="translate(154,148)">
    <ellipse cx="0" cy="6" rx="13" ry="3" fill="rgba(0,0,0,0.4)" />
    <rect x="-10" y="-12" width="20" height="16" rx="2" fill="#f59e0b" />
    <rect x="-3" y="-16" width="6" height="6" fill="#fbbf24" />
  </g>
  <!-- empty slot (yet to fill) -->
  <g transform="translate(204,148)">
    <rect x="-12" y="-12" width="24" height="18" rx="3" fill="none" stroke="#4d3a26" stroke-dasharray="3,3" />
  </g>
  <text x="20" y="34" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="800" fill="#fbeacb">Kafe Görevlisi</text>
  <text x="300" y="194" text-anchor="end" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="600" fill="#7a6045" letter-spacing="0.05em">HAFIZA · SIRALAMA</text>
</svg>
