<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Hayalet İz">
  <defs>
    <radialGradient id="hi-bg" cx="0.5" cy="0.5" r="0.85">
      <stop offset="0" stop-color="#141a26"/>
      <stop offset="1" stop-color="#0b0f17"/>
    </radialGradient>
    <radialGradient id="hi-player-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5eead4" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hi-ghost-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f87171" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#f87171" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hi-orb-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#facc15" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#facc15" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="320" height="200" fill="url(#hi-bg)"/>

  <!-- Hafif grid noktaları -->
  <g fill="#1a2230" opacity="0.85">
    <circle cx="40" cy="40" r="1.2"/>
    <circle cx="80" cy="40" r="1.2"/>
    <circle cx="120" cy="40" r="1.2"/>
    <circle cx="160" cy="40" r="1.2"/>
    <circle cx="200" cy="40" r="1.2"/>
    <circle cx="240" cy="40" r="1.2"/>
    <circle cx="280" cy="40" r="1.2"/>
    <circle cx="40" cy="80" r="1.2"/>
    <circle cx="80" cy="80" r="1.2"/>
    <circle cx="120" cy="80" r="1.2"/>
    <circle cx="160" cy="80" r="1.2"/>
    <circle cx="200" cy="80" r="1.2"/>
    <circle cx="240" cy="80" r="1.2"/>
    <circle cx="280" cy="80" r="1.2"/>
    <circle cx="40" cy="120" r="1.2"/>
    <circle cx="80" cy="120" r="1.2"/>
    <circle cx="120" cy="120" r="1.2"/>
    <circle cx="160" cy="120" r="1.2"/>
    <circle cx="200" cy="120" r="1.2"/>
    <circle cx="240" cy="120" r="1.2"/>
    <circle cx="280" cy="120" r="1.2"/>
  </g>

  <!-- Hayalet iz: kırmızı noktalar dizisi (geçmiş yol) -->
  <g>
    <circle cx="40" cy="150" r="4" fill="#f87171" opacity="0.35"/>
    <circle cx="58" cy="145" r="4.5" fill="#f87171" opacity="0.55"/>
    <circle cx="76" cy="138" r="5" fill="#f87171" opacity="0.75"/>
    <circle cx="94" cy="128" r="5" fill="#f87171" opacity="0.9"/>
    <circle cx="112" cy="116" r="5" fill="#f87171" opacity="0.95"/>
    <circle cx="130" cy="102" r="5" fill="#f87171" opacity="0.9"/>
    <circle cx="148" cy="92" r="5" fill="#f87171" opacity="0.8"/>
    <circle cx="166" cy="92" r="5" fill="#f87171" opacity="0.6"/>
    <circle cx="184" cy="100" r="4.5" fill="#f87171" opacity="0.4"/>
  </g>

  <!-- Glow halesi yakın iz çevresinde -->
  <circle cx="112" cy="116" r="22" fill="url(#hi-ghost-glow)"/>

  <!-- Sönen sınır (ön iz, daha soluk) -->
  <g fill="#f87171" opacity="0.15">
    <circle cx="200" cy="112" r="3.5"/>
    <circle cx="214" cy="124" r="3.5"/>
    <circle cx="226" cy="138" r="3.5"/>
  </g>

  <!-- Altın küre (orb) -->
  <circle cx="262" cy="74" r="22" fill="url(#hi-orb-glow)"/>
  <circle cx="262" cy="74" r="8" fill="#facc15"/>

  <!-- Oyuncu (turkuaz) -->
  <circle cx="240" cy="148" r="22" fill="url(#hi-player-glow)"/>
  <circle cx="240" cy="148" r="7" fill="#5eead4"/>
  <circle cx="252" cy="142" r="2.4" fill="#5eead4"/>

  <!-- Başlık -->
  <text x="160" y="190" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11" font-weight="600" fill="#dfe4f0" opacity="0.85"
        letter-spacing="2">HAYALET İZ</text>
</svg>
