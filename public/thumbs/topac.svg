<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Topaç">
  <defs>
    <radialGradient id="tp-bg" cx="0.5" cy="0.45" r="0.85">
      <stop offset="0%" stop-color="#1c2231" />
      <stop offset="100%" stop-color="#070a14" />
    </radialGradient>
    <radialGradient id="tp-floor" cx="0.45" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#3a2d20" />
      <stop offset="60%" stop-color="#231a12" />
      <stop offset="100%" stop-color="#15100a" />
    </radialGradient>
    <linearGradient id="tp-wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6e4b22" />
      <stop offset="50%" stop-color="#caa164" />
      <stop offset="100%" stop-color="#6e4b22" />
    </linearGradient>
  </defs>

  <rect width="320" height="200" fill="url(#tp-bg)" />

  <!-- Title -->
  <text x="20" y="32" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4e4ed">Topaç</text>
  <text x="20" y="50" font-family="ui-sans-serif, system-ui" font-size="10" fill="#f59e0b" font-weight="600" letter-spacing="2">KIRBAÇLA DÖNDÜR</text>

  <!-- Wooden table disc -->
  <ellipse cx="200" cy="135" rx="95" ry="44" fill="url(#tp-floor)" stroke="#3a2614" stroke-width="1.5" />
  <!-- Plank rings -->
  <g fill="none" stroke="rgba(78,50,28,0.6)" stroke-width="0.8">
    <ellipse cx="200" cy="135" rx="78" ry="36" />
    <ellipse cx="200" cy="135" rx="58" ry="26" />
    <ellipse cx="200" cy="135" rx="38" ry="17" />
  </g>

  <!-- Top, leaning slightly to indicate motion -->
  <g transform="translate(200 110) rotate(-8)">
    <!-- tip -->
    <polygon points="-3,0 3,0 0,16" fill="#1a1a1a" />
    <!-- body -->
    <polygon points="0,0 32,-12 26,-42 8,-86 -8,-86 -26,-42 -32,-12" fill="url(#tp-wood)" stroke="#3a2614" stroke-width="1.2" />
    <!-- spin band -->
    <ellipse cx="0" cy="-22" rx="28" ry="6" fill="#1f2733" />
    <ellipse cx="20" cy="-22" rx="4" ry="2.5" fill="#f59e0b" />
    <ellipse cx="0" cy="-26" rx="4" ry="2.5" fill="#e7eef9" />
    <ellipse cx="-20" cy="-22" rx="4" ry="2.5" fill="#f59e0b" />
    <ellipse cx="0" cy="-18" rx="4" ry="2.5" fill="#e7eef9" />
    <!-- knob -->
    <polygon points="-8,-86 8,-86 6,-94 -6,-94" fill="#6e4b22" stroke="#3a2614" stroke-width="1" />
  </g>

  <!-- Wind arrow indicating a gust from the left -->
  <g stroke="#f87171" fill="#f87171" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <line x1="60" y1="105" x2="120" y2="105" />
    <polygon points="120,105 110,99 110,111" />
  </g>

  <!-- RPM meter on the right -->
  <g>
    <rect x="290" y="60" width="10" height="120" rx="3" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)" />
    <rect x="290" y="100" width="10" height="80" rx="3" fill="#fbbf24" />
    <text x="295" y="52" font-family="ui-sans-serif, system-ui" font-size="9" font-weight="700" fill="#e4e4ed" text-anchor="middle">RPM</text>
  </g>
</svg>
