<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Dikiş">
  <defs>
    <linearGradient id="dk-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2533" />
      <stop offset="100%" stop-color="#0d1320" />
    </linearGradient>
    <pattern id="dk-grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" />
    </pattern>
  </defs>
  <rect width="320" height="200" fill="url(#dk-bg)" />
  <rect width="320" height="200" fill="url(#dk-grid)" />

  <text x="20" y="32" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4e4ed">Dikiş</text>
  <text x="20" y="50" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="600" fill="#8cf0c8" letter-spacing="2">RİTİM · HASSAS TAKİP</text>

  <!-- Target dashed curve (wave) -->
  <path d="M 50 165 C 90 105, 130 215, 170 130 S 240 110, 290 150"
        fill="none" stroke="#b4c8f0" stroke-opacity="0.55" stroke-width="2.2" stroke-dasharray="7,5" />

  <!-- Visited waypoints (filled green) -->
  <g fill="#84dcaf" fill-opacity="0.7">
    <circle cx="50" cy="165" r="4" />
    <circle cx="73" cy="139" r="4" />
    <circle cx="96" cy="124" r="4" />
    <circle cx="119" cy="143" r="4" />
    <circle cx="142" cy="170" r="4" />
  </g>

  <!-- Current target (highlight ring) -->
  <circle cx="170" cy="130" r="22" fill="none" stroke="#8cf0c8" stroke-width="2" />
  <circle cx="170" cy="130" r="6" fill="#8cf0c8" />

  <!-- Upcoming waypoints (dim) -->
  <g fill="#c8d8ff" fill-opacity="0.35">
    <circle cx="200" cy="118" r="3" />
    <circle cx="230" cy="111" r="3" />
    <circle cx="260" cy="124" r="3" />
    <circle cx="290" cy="150" r="3" />
  </g>

  <!-- Stitch thread connecting visited waypoints -->
  <path d="M 50 165 L 73 139 L 96 124 L 119 143 L 142 170 L 156 138"
        fill="none" stroke="#e6ebf5" stroke-opacity="0.55" stroke-width="1.6" />

  <!-- Crosshair cursor near current target -->
  <g stroke="#ffffff" stroke-width="2">
    <line x1="160" y1="138" x2="180" y2="138" />
    <line x1="170" y1="128" x2="170" y2="148" />
  </g>
  <circle cx="170" cy="138" r="5" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.2" />

  <!-- Bottom rhythm bar -->
  <rect x="20" y="180" width="280" height="6" rx="3" fill="#000000" fill-opacity="0.45" />
  <rect x="20" y="180" width="170" height="6" rx="3" fill="#8cf0c8" />
</svg>
