<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Sönen Yıldız">
  <defs>
    <radialGradient id="sky" cx="50%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#1a2240" />
      <stop offset="60%" stop-color="#0a0d18" />
      <stop offset="100%" stop-color="#04060c" />
    </radialGradient>
    <radialGradient id="glowBright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(200,220,255,0.95)" />
      <stop offset="100%" stop-color="rgba(160,200,255,0)" />
    </radialGradient>
    <radialGradient id="glowDim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,180,180,0.55)" />
      <stop offset="100%" stop-color="rgba(255,140,140,0)" />
    </radialGradient>
    <radialGradient id="glowShoot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,216,102,0.95)" />
      <stop offset="100%" stop-color="rgba(255,216,102,0)" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#sky)" />

  <!-- background dust -->
  <g fill="#cfd8ff" opacity="0.65">
    <circle cx="22"  cy="160" r="0.8" />
    <circle cx="58"  cy="38"  r="0.9" />
    <circle cx="96"  cy="170" r="0.7" />
    <circle cx="140" cy="22"  r="1.0" />
    <circle cx="190" cy="178" r="0.8" />
    <circle cx="252" cy="48"  r="0.9" />
    <circle cx="290" cy="124" r="1.0" />
    <circle cx="44"  cy="92"  r="0.6" />
    <circle cx="220" cy="92"  r="0.6" />
  </g>

  <!-- bright (just-appeared) star -->
  <circle cx="88" cy="92" r="34" fill="url(#glowBright)" />
  <polygon points="88,72 92,86 106,86 95,94 99,108 88,99 77,108 81,94 70,86 84,86"
           fill="#eaf2ff" stroke="rgba(140,180,255,0.9)" stroke-width="1.3" />

  <!-- dim (about to vanish) star with warning ring -->
  <circle cx="216" cy="124" r="26" fill="url(#glowDim)" />
  <polygon points="216,112 218,121 227,121 220,126 222,135 216,130 210,135 212,126 205,121 214,121"
           fill="#f6e3e3" fill-opacity="0.55"
           stroke="rgba(255,138,138,0.85)" stroke-width="1.2" />
  <circle cx="216" cy="124" r="18" fill="none" stroke="rgba(255,138,138,0.7)" stroke-width="1" stroke-dasharray="3 2" />

  <!-- shooting star -->
  <line x1="260" y1="34" x2="184" y2="68" stroke="rgba(255,216,102,0.55)" stroke-width="5" stroke-linecap="round" />
  <line x1="252" y1="38" x2="208" y2="60" stroke="rgba(255,216,102,0.95)" stroke-width="3" stroke-linecap="round" />
  <circle cx="252" cy="38" r="18" fill="url(#glowShoot)" />
  <polygon points="252,28 254,36 261,36 256,40 258,47 252,43 246,47 248,40 243,36 250,36"
           fill="#fff3c2" stroke="rgba(255,216,102,0.95)" stroke-width="1" />

  <text x="20" y="34" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4e4ed">Sönen Yıldız</text>
  <text x="20" y="56" font-family="ui-sans-serif, system-ui" font-size="11" fill="#8da0c4">geç dokunan kazanır</text>
</svg>
