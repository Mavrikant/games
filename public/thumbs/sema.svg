<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Sema">
  <defs>
    <linearGradient id="sm-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c2a" />
      <stop offset="100%" stop-color="#0a0a14" />
    </linearGradient>
    <radialGradient id="sm-tip" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffe7a3" />
      <stop offset="60%" stop-color="#f5c451" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#f5c451" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#sm-bg)" />
  <!-- Faint guide rings (3 tiers) -->
  <circle cx="160" cy="105" r="32" fill="none" stroke="#82c8ff" stroke-width="6" stroke-opacity="0.18" />
  <circle cx="160" cy="105" r="55" fill="none" stroke="#f5c451" stroke-width="5" stroke-opacity="0.18" />
  <circle cx="160" cy="105" r="80" fill="none" stroke="#ef4f4f" stroke-width="4" stroke-opacity="0.18" />
  <!-- Floor ring -->
  <circle cx="160" cy="105" r="92" fill="none" stroke="#aab3c2" stroke-width="1" stroke-opacity="0.35" />
  <!-- Arm bar (slight tilt) -->
  <line x1="86" y1="80" x2="234" y2="130" stroke="#e4ecf8" stroke-width="5" stroke-linecap="round" />
  <!-- Tip glows -->
  <circle cx="86" cy="80" r="18" fill="url(#sm-tip)" />
  <circle cx="234" cy="130" r="18" fill="url(#sm-tip)" />
  <circle cx="86" cy="80" r="4" fill="#ffe7a3" />
  <circle cx="234" cy="130" r="4" fill="#ffe7a3" />
  <!-- Robe + head -->
  <circle cx="160" cy="105" r="14" fill="#243044" stroke="#e4ecf8" stroke-width="2" />
  <circle cx="160" cy="105" r="6" fill="#c8d0dc" />
  <!-- Notes on rings -->
  <circle cx="186" cy="86" r="5" fill="#82c8ff" />
  <circle cx="212" cy="68" r="6" fill="#f5c451" />
  <circle cx="118" cy="158" r="6.5" fill="#ef4f4f" />
  <text x="18" y="34" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4e4ed">Sema</text>
</svg>
