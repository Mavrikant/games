<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Şimşek Tutucu">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0d14" />
      <stop offset="60%" stop-color="#0c1118" />
      <stop offset="100%" stop-color="#10162a" />
    </linearGradient>
    <radialGradient id="boltGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)" />
  <!-- stars -->
  <g fill="#ffffff" opacity="0.18">
    <rect x="30" y="20" width="1" height="1" />
    <rect x="80" y="14" width="1" height="1" />
    <rect x="150" y="28" width="1" height="1" />
    <rect x="220" y="18" width="1" height="1" />
    <rect x="270" y="36" width="1" height="1" />
    <rect x="60" y="50" width="1" height="1" />
    <rect x="200" y="46" width="1" height="1" />
    <rect x="295" y="60" width="1" height="1" />
  </g>
  <!-- ground line -->
  <line x1="0" y1="178" x2="320" y2="178" stroke="#1f2937" stroke-width="2" />
  <!-- clouds -->
  <g fill="#374151">
    <ellipse cx="62" cy="58" rx="22" ry="12" />
    <ellipse cx="88" cy="58" rx="22" ry="12" />
    <ellipse cx="76" cy="62" rx="28" ry="13" />
  </g>
  <g fill="#9ca3af">
    <ellipse cx="62" cy="52" rx="22" ry="12" />
    <ellipse cx="88" cy="52" rx="22" ry="12" />
    <ellipse cx="76" cy="56" rx="28" ry="13" />
  </g>
  <g fill="#b45309">
    <ellipse cx="206" cy="50" rx="22" ry="12" />
    <ellipse cx="232" cy="50" rx="22" ry="12" />
    <ellipse cx="220" cy="54" rx="28" ry="13" />
  </g>
  <g fill="#fbbf24">
    <ellipse cx="206" cy="44" rx="22" ry="12" />
    <ellipse cx="232" cy="44" rx="22" ry="12" />
    <ellipse cx="220" cy="48" rx="28" ry="13" />
  </g>
  <!-- charge bars -->
  <rect x="46" y="30" width="60" height="4" fill="rgba(255,255,255,0.18)" />
  <rect x="46" y="30" width="20" height="4" fill="#10b981" />
  <rect x="190" y="22" width="60" height="4" fill="rgba(255,255,255,0.18)" />
  <rect x="190" y="22" width="48" height="4" fill="#ef4444" />
  <!-- bolt glow -->
  <circle cx="220" cy="120" r="40" fill="url(#boltGlow)" />
  <!-- bolt from yellow cloud -->
  <polyline
    points="222,60 214,90 226,92 218,130"
    fill="none"
    stroke="#fde047"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- bolt from gray cloud -->
  <polyline
    points="78,68 70,96 82,98 74,140"
    fill="none"
    stroke="#e2e8f0"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.7"
  />
  <!-- rod -->
  <rect x="180" y="148" width="80" height="10" rx="2" fill="#cbd5e1" />
  <rect x="216" y="148" width="6" height="30" fill="#94a3b8" />
  <line x1="219" y1="148" x2="219" y2="138" stroke="#e2e8f0" stroke-width="2" />
  <!-- title -->
  <text x="20" y="186" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#e4e4ed">Şimşek Tutucu</text>
</svg>
