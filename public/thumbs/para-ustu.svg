<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Para Üstü">
  <defs>
    <linearGradient id="pu-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a225c" />
      <stop offset="100%" stop-color="#13102e" />
    </linearGradient>
    <linearGradient id="pu-note50" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8fc6" />
      <stop offset="100%" stop-color="#d6258a" />
    </linearGradient>
    <linearGradient id="pu-note20" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ee0ff" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="pu-note10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bff" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#pu-bg)" />

  <!-- Cashier receipt strip -->
  <g transform="translate(20 28)">
    <rect width="120" height="146" rx="8" fill="#f7f3ff" stroke="#cdbcf2" stroke-width="1.5" />
    <line x1="14" y1="22" x2="106" y2="22" stroke="#a195d2" stroke-width="1.5" />
    <text x="14" y="42" font-family="ui-sans-serif, system-ui" font-size="11" fill="#5b4e8c">Toplam</text>
    <text x="106" y="42" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="700" fill="#281b46" text-anchor="end">23,75 ₺</text>
    <text x="14" y="62" font-family="ui-sans-serif, system-ui" font-size="11" fill="#5b4e8c">Verilen</text>
    <text x="106" y="62" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="700" fill="#281b46" text-anchor="end">50 ₺</text>
    <line x1="14" y1="76" x2="106" y2="76" stroke="#cdbcf2" stroke-dasharray="3 3" />
    <text x="14" y="100" font-family="ui-sans-serif, system-ui" font-size="11" fill="#5b4e8c">Para Üstü</text>
    <text x="106" y="120" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="800" fill="#d6258a" text-anchor="end">26,25 ₺</text>
  </g>

  <!-- Stacked bills/coins -->
  <g transform="translate(170 38)">
    <rect width="120" height="44" rx="8" fill="url(#pu-note20)" stroke="#0e7490" stroke-width="1" />
    <text x="60" y="28" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="800" fill="#082f49" text-anchor="middle">20 ₺</text>
  </g>
  <g transform="translate(170 90)">
    <rect width="100" height="36" rx="6" fill="url(#pu-note10)" stroke="#5b21b6" stroke-width="1" />
    <text x="50" y="24" font-family="ui-sans-serif, system-ui" font-size="16" font-weight="800" fill="#1e1248" text-anchor="middle">5 ₺</text>
  </g>
  <g transform="translate(170 134)">
    <circle cx="22" cy="20" r="18" fill="#ffd166" stroke="#b45309" stroke-width="1.5" />
    <text x="22" y="25" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="800" fill="#5a3300" text-anchor="middle">1 ₺</text>
    <circle cx="62" cy="20" r="14" fill="#cbd5e1" stroke="#475569" stroke-width="1.2" />
    <text x="62" y="24" font-family="ui-sans-serif, system-ui" font-size="9" font-weight="700" fill="#1e293b" text-anchor="middle">25 kr</text>
  </g>

  <text x="20" y="194" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#f5efff">Para Üstü</text>
</svg>
