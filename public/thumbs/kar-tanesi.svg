      <line x1="0" y1="-42" x2="9" y2="-50" />
      <line x1="0" y1="-58" x2="-6" y2="-62" />
      <line x1="0" y1="-58" x2="6" y2="-62" />
    </g>
    <use href="#kt-arm" transform="rotate(60)" />
    <use href="#kt-arm" transform="rotate(120)" />
    <use href="#kt-arm" transform="rotate(180)" />
    <use href="#kt-arm" transform="rotate(240)" />
    <use href="#kt-arm" transform="rotate(300)" />
