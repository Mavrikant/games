      <stop offset="0%" stop-color="#0e1a2e" />
      <stop offset="100%" stop-color="#070b18" />
    </linearGradient>
    <radialGradient id="kt-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#a5e8ff" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#a5e8ff" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#kt-bg)" />
