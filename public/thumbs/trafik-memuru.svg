<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Trafik Memuru">
  <defs>
    <linearGradient id="tm-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15171f" />
      <stop offset="100%" stop-color="#0a0b0e" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#tm-bg)" />
  <!-- Grass background -->
  <rect width="320" height="200" fill="#14171c" />
  <!-- Vertical road -->
  <rect x="130" y="0" width="60" height="200" fill="#1c2027" />
  <!-- Horizontal road -->
  <rect x="0" y="70" width="320" height="60" fill="#1c2027" />
  <!-- Intersection -->
  <rect x="130" y="70" width="60" height="60" fill="#232830" />
  <!-- Lane dashes -->
  <line x1="160" y1="6" x2="160" y2="66" stroke="#5a6473" stroke-width="1.5" stroke-dasharray="6 6" />
  <line x1="160" y1="134" x2="160" y2="194" stroke="#5a6473" stroke-width="1.5" stroke-dasharray="6 6" />
  <line x1="6" y1="100" x2="126" y2="100" stroke="#5a6473" stroke-width="1.5" stroke-dasharray="6 6" />
  <line x1="194" y1="100" x2="314" y2="100" stroke="#5a6473" stroke-width="1.5" stroke-dasharray="6 6" />
  <!-- Stop lines (white) -->
  <line x1="160" y1="70" x2="190" y2="70" stroke="#e4e4ed" stroke-width="2" />
  <line x1="130" y1="130" x2="160" y2="130" stroke="#e4e4ed" stroke-width="2" />
  <line x1="130" y1="70" x2="130" y2="100" stroke="#e4e4ed" stroke-width="2" />
  <line x1="190" y1="100" x2="190" y2="130" stroke="#e4e4ed" stroke-width="2" />
  <!-- Signal NS (green) -->
  <circle cx="116" cy="56" r="8" fill="#0a0b0e" />
  <circle cx="116" cy="56" r="6" fill="#34d399" />
  <text x="116" y="40" font-family="ui-sans-serif, system-ui" font-size="9" font-weight="700" fill="#5a6473" text-anchor="middle">NS</text>
  <!-- Signal EW (red) -->
  <circle cx="204" cy="144" r="8" fill="#0a0b0e" />
  <circle cx="204" cy="144" r="6" fill="#f87171" />
  <text x="204" y="164" font-family="ui-sans-serif, system-ui" font-size="9" font-weight="700" fill="#5a6473" text-anchor="middle">EW</text>
  <!-- Cars: NS green direction (passing) -->
  <rect x="168" y="30" width="14" height="22" fill="#60a5fa" stroke="rgba(0,0,0,0.55)" />
  <rect x="168" y="148" width="14" height="22" fill="#fbbf24" stroke="rgba(0,0,0,0.55)" />
  <!-- Cars: EW red direction (queued) -->
  <rect x="40" y="106" width="22" height="14" fill="#f472b6" stroke="rgba(0,0,0,0.55)" />
  <rect x="66" y="106" width="22" height="14" fill="#34d399" stroke="rgba(0,0,0,0.55)" />
  <!-- Ambulance from east -->
  <rect x="246" y="78" width="22" height="14" fill="#ffffff" stroke="rgba(0,0,0,0.55)" />
  <rect x="255" y="78" width="4" height="14" fill="#f87171" />
  <!-- Title -->
  <text x="20" y="194" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#e4e4ed">Trafik Memuru</text>
</svg>
