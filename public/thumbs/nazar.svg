<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Nazar — kem gözlerin ortasında bir nazar muskası">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#152034"/>
      <stop offset="100%" stop-color="#070a14"/>
    </radialGradient>
    <radialGradient id="amulet" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#bae6fd"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </radialGradient>
    <radialGradient id="eyeRed" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <radialGradient id="eyeAmber" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#92400e"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)" rx="12"/>

  <!-- stars -->
  <g fill="#fbbf24" opacity="0.55">
    <circle cx="28" cy="32" r="1.2"/>
    <circle cx="295" cy="22" r="1"/>
    <circle cx="304" cy="160" r="1.4"/>
    <circle cx="18" cy="168" r="1"/>
    <circle cx="56" cy="180" r="0.8"/>
    <circle cx="270" cy="44" r="0.8"/>
  </g>
  <g fill="#7686d4" opacity="0.5">
    <circle cx="40" cy="60" r="0.8"/>
    <circle cx="80" cy="20" r="0.8"/>
    <circle cx="240" cy="172" r="0.9"/>
    <circle cx="280" cy="120" r="0.7"/>
    <circle cx="14" cy="100" r="0.7"/>
  </g>

  <!-- ring -->
  <circle cx="160" cy="100" r="72" fill="none" stroke="#1d2638" stroke-width="2"/>

  <!-- eyes around: top, right, bottom-left (closing varying charges) -->
  <!-- Top eye - red, almost full -->
  <g transform="translate(160 28)">
    <ellipse cx="0" cy="0" rx="14" ry="9" fill="#f6efe0"/>
    <circle cx="0" cy="0" r="6" fill="url(#eyeRed)"/>
    <circle cx="0" cy="0" r="3" fill="#0a0a0a"/>
    <circle cx="-1.5" cy="-1.5" r="1" fill="#fff"/>
  </g>
  <!-- charge arc red -->
  <path d="M 160 12 a 20 20 0 1 1 -19 25" fill="none" stroke="#ef4444" stroke-width="2.5"/>

  <!-- Right eye - amber, half -->
  <g transform="translate(232 100)">
    <ellipse cx="0" cy="0" rx="9" ry="14" fill="#f6efe0"/>
    <circle cx="0" cy="0" r="6" fill="url(#eyeAmber)"/>
    <circle cx="0" cy="0" r="3" fill="#0a0a0a"/>
    <circle cx="-1.5" cy="-1.5" r="1" fill="#fff"/>
  </g>
  <path d="M 232 84 a 20 20 0 0 1 20 16" fill="none" stroke="#f59e0b" stroke-width="2.5"/>

  <!-- Bottom-left eye - green, early -->
  <g transform="translate(108 152)">
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#f6efe0" transform="rotate(-45)"/>
    <circle cx="0" cy="0" r="6" fill="#86efac"/>
    <circle cx="0" cy="0" r="3" fill="#0a0a0a"/>
    <circle cx="-1.5" cy="-1.5" r="1" fill="#fff"/>
  </g>

  <!-- Center amulet -->
  <g transform="translate(160 100)">
    <circle r="26" fill="#0c4a6e" stroke="#22d3ee" stroke-width="1"/>
    <circle r="19" fill="#f0f9ff"/>
    <circle r="13" fill="url(#amulet)"/>
    <circle r="5" fill="#0c2330"/>
    <!-- pointer toward top eye -->
    <polygon points="0,-32 -7,-22 7,-22" fill="#fbbf24"/>
  </g>

  <!-- Title -->
  <text x="160" y="190" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="0.18em" fill="#bae6fd" opacity="0.85">NAZAR</text>
</svg>
