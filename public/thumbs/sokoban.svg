<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Sokoban">
  <defs>
    <linearGradient id="sb-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15171f" />
      <stop offset="100%" stop-color="#0a0b0e" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#sb-bg)" />
  <g transform="translate(48,28)">
    <!-- Floor area: 6 cols x 4 rows of 24px cells -->
    <rect x="0" y="0" width="144" height="96" fill="#262b39" stroke="#2f3540" />
    <!-- Walls -->
    <g fill="#3a4256" stroke="rgba(0,0,0,0.3)" stroke-width="0.8">
      <rect x="0" y="-24" width="144" height="24" />
      <rect x="0" y="96" width="144" height="24" />
      <rect x="-24" y="-24" width="24" height="144" />
      <rect x="144" y="-24" width="24" height="144" />
    </g>
    <!-- Goal dots -->
    <g>
      <circle cx="36" cy="60" r="7" fill="none" stroke="#6366f1" stroke-width="2" />
      <circle cx="36" cy="60" r="3" fill="#a5b4fc" />
      <circle cx="108" cy="36" r="7" fill="none" stroke="#6366f1" stroke-width="2" />
      <circle cx="108" cy="36" r="3" fill="#a5b4fc" />
    </g>
    <!-- Boxes (one regular, one on goal) -->
    <g>
      <rect x="60" y="48" width="24" height="24" fill="#d97706" stroke="rgba(0,0,0,0.55)" stroke-width="1.5" />
      <path d="M60,48 L84,72 M84,48 L60,72" stroke="rgba(0,0,0,0.55)" stroke-width="1.5" />
      <rect x="96" y="24" width="24" height="24" fill="#22c55e" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" />
      <path d="M96,24 L120,48 M120,24 L96,48" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" />
    </g>
    <!-- Player -->
    <g transform="translate(24,72)">
      <circle cx="12" cy="12" r="9" fill="#f8fafc" stroke="#0f172a" stroke-width="1.5" />
      <circle cx="9" cy="10" r="1.2" fill="#0f172a" />
      <circle cx="15" cy="10" r="1.2" fill="#0f172a" />
    </g>
    <!-- Push arrow -->
    <path d="M52 60 L66 60 M62 56 L66 60 L62 64" stroke="#a5b4fc" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  <text x="20" y="178" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#e4e4ed">Sokoban</text>
  <text x="86" y="178" font-family="ui-sans-serif, system-ui" font-size="10" font-weight="500" fill="#5a6473">kutu itme bulmacası</text>
</svg>
