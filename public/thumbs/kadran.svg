<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Kadran">
  <defs>
    <radialGradient id="dial" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#1f2a36"/>
      <stop offset="1" stop-color="#0c1218"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0b0e"/>
      <stop offset="1" stop-color="#15171c"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)"/>
  <g transform="translate(160 100)">
    <circle r="92" fill="#c9b793"/>
    <circle r="84" fill="url(#dial)" stroke="#08090b" stroke-width="2"/>
    <g fill="#08090b">
      <!-- 10 holes around the dial -->
      <!-- digit 1 at angle 90deg from top (canvas convention: angle from top clockwise) -->
      <!-- baseAngle = STOP_ANGLE(120) - (i+1)*30 -->
      <!-- positions calculated for 10 holes at radius 62 -->
      <circle cx="62" cy="0" r="9"/>
      <circle cx="53.69" cy="-31" r="9"/>
      <circle cx="31" cy="-53.69" r="9"/>
      <circle cx="0" cy="-62" r="9"/>
      <circle cx="-31" cy="-53.69" r="9"/>
      <circle cx="-53.69" cy="-31" r="9"/>
      <circle cx="-62" cy="0" r="9"/>
      <circle cx="-53.69" cy="31" r="9"/>
      <circle cx="-31" cy="53.69" r="9"/>
      <circle cx="0" cy="62" r="9"/>
    </g>
    <!-- digit labels on the rim (outside the holes) -->
    <g fill="#e8eaed" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" font-weight="700" text-anchor="middle" dominant-baseline="central">
      <text x="78" y="0">1</text>
      <text x="67.55" y="-39">2</text>
      <text x="39" y="-67.55">3</text>
      <text x="0" y="-78">4</text>
      <text x="-39" y="-67.55">5</text>
      <text x="-67.55" y="-39">6</text>
      <text x="-78" y="0">7</text>
      <text x="-67.55" y="39">8</text>
      <text x="-39" y="67.55">9</text>
      <text x="0" y="78">0</text>
    </g>
    <!-- center hub -->
    <circle r="22" fill="#c9b793" stroke="#08090b" stroke-width="2"/>
    <!-- finger stop at 120deg (bottom-right) -->
    <g transform="rotate(120)">
      <path d="M -5 -90 L 5 -90 L 7 -64 L -7 -64 Z" fill="#d4af37" stroke="#08090b" stroke-width="1"/>
    </g>
  </g>
  <text x="160" y="184" fill="#7d8590" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" text-anchor="middle" letter-spacing="0.15em">KADRAN</text>
</svg>
