<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Çelik Çomak">
  <defs>
    <linearGradient id="cc-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b2540" />
      <stop offset="100%" stop-color="#3a5780" />
    </linearGradient>
    <linearGradient id="cc-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d2e1d" />
      <stop offset="100%" stop-color="#221708" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="320" height="160" fill="url(#cc-sky)" />
  <!-- Ground -->
  <rect y="160" width="320" height="40" fill="url(#cc-ground)" />
  <line x1="0" y1="160" x2="320" y2="160" stroke="#5a3f1f" stroke-width="1" />

  <!-- Stars -->
  <g fill="rgba(255,255,255,0.45)">
    <rect x="40"  y="32"  width="2" height="2" />
    <rect x="90"  y="58"  width="2" height="2" />
    <rect x="135" y="22"  width="2" height="2" />
    <rect x="180" y="44"  width="2" height="2" />
    <rect x="220" y="18"  width="2" height="2" />
    <rect x="265" y="46"  width="2" height="2" />
    <rect x="295" y="28"  width="2" height="2" />
    <rect x="60"  y="80"  width="2" height="2" />
    <rect x="200" y="76"  width="2" height="2" />
    <rect x="260" y="92"  width="2" height="2" />
  </g>

  <!-- Distance ticks -->
  <g stroke="#7a5532" stroke-width="1">
    <line x1="120" y1="160" x2="120" y2="166" />
    <line x1="160" y1="160" x2="160" y2="168" />
    <line x1="200" y1="160" x2="200" y2="166" />
    <line x1="240" y1="160" x2="240" y2="168" />
    <line x1="280" y1="160" x2="280" y2="166" />
  </g>
  <g font-family="ui-sans-serif, system-ui" font-size="9" fill="rgba(255,255,255,0.55)" text-anchor="middle">
    <text x="160" y="182">20</text>
    <text x="240" y="182">40 adım</text>
  </g>

  <!-- Player (stick figure) on left -->
  <g stroke="#e2dccd" stroke-width="2.5" stroke-linecap="round" fill="none">
    <!-- legs -->
    <path d="M 38 158 L 46 138 L 54 158" />
    <!-- torso -->
    <line x1="46" y1="138" x2="46" y2="118" />
  </g>
  <!-- head -->
  <circle cx="46" cy="113" r="5" fill="#e2dccd" />

  <!-- Çomak (bat) -->
  <line x1="46" y1="126" x2="84" y2="105" stroke="#9b6a30" stroke-width="4" stroke-linecap="round" />

  <!-- Çelik flying mid-air (rotated) -->
  <g transform="translate(170 80) rotate(35)">
    <rect x="-13" y="-3" width="26" height="6" fill="#caa066" stroke="#5c3a14" stroke-width="1" />
    <rect x="-13" y="-3" width="3" height="6" fill="#5c3a14" />
    <rect x="10"  y="-3" width="3" height="6" fill="#5c3a14" />
  </g>

  <!-- Çelik landed (small, lighter) -->
  <g transform="translate(248 156) rotate(-12)">
    <rect x="-12" y="-3" width="24" height="5" fill="rgba(202,160,102,0.7)" stroke="rgba(92,58,20,0.7)" stroke-width="1" />
  </g>

  <!-- Trajectory dashed arc -->
  <path d="M 70 110 Q 160 30 250 152" fill="none" stroke="rgba(251,191,36,0.5)" stroke-width="1.5" stroke-dasharray="3 4" />

  <!-- Title -->
  <text x="20" y="34" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#fbbf24">Çelik Çomak</text>
</svg>
