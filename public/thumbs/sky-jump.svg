<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Sky Jump">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="char" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef08a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#sky)"/>

  <!-- Stars (üst) -->
  <g fill="#ffffff" opacity="0.7">
    <rect x="32" y="20" width="2" height="2"/>
    <rect x="80" y="34" width="2" height="2"/>
    <rect x="120" y="14" width="2" height="2"/>
    <rect x="260" y="28" width="2" height="2"/>
    <rect x="290" y="46" width="2" height="2"/>
  </g>

  <!-- Bulutlar -->
  <g fill="#ffffff" opacity="0.55">
    <ellipse cx="60" cy="60" rx="22" ry="6"/>
    <ellipse cx="78" cy="56" rx="14" ry="5"/>
    <ellipse cx="240" cy="92" rx="26" ry="7"/>
    <ellipse cx="262" cy="88" rx="14" ry="5"/>
  </g>

  <!-- Hareketli platform (mavi, üstte) -->
  <g>
    <rect x="180" y="46" width="60" height="11" rx="5" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
    <polygon points="216,52 210,49 210,55" fill="#ffffff"/>
  </g>

  <!-- Normal platform (gri, ortada) -->
  <rect x="40" y="90" width="60" height="11" rx="5" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Kırılgan platform (kahverengi, alta yakın) -->
  <g>
    <rect x="200" y="142" width="56" height="11" rx="5" fill="#a16207" stroke="#6b3a0a" stroke-width="1.5"/>
    <path d="M 218 144 L 222 152 M 238 144 L 234 152" stroke="rgba(0,0,0,0.45)" stroke-width="1" fill="none"/>
  </g>

  <!-- Normal platform (gri, alt) -->
  <rect x="60" y="170" width="60" height="11" rx="5" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Karakter (zıplıyor) -->
  <g transform="translate(135 122)">
    <ellipse cx="0" cy="20" rx="14" ry="3" fill="rgba(0,0,0,0.2)"/>
    <ellipse cx="0" cy="0" rx="14" ry="16" fill="url(#char)" stroke="#7c3a06" stroke-width="1.5"/>
    <!-- kulaklar -->
    <polygon points="-12,-9 -16,-14 -10,-5" fill="#f59e0b" stroke="#7c3a06" stroke-width="1.2"/>
    <polygon points="12,-9 16,-14 10,-5" fill="#f59e0b" stroke="#7c3a06" stroke-width="1.2"/>
    <!-- gözler -->
    <ellipse cx="-4" cy="-3" rx="3" ry="4" fill="#ffffff"/>
    <ellipse cx="5" cy="-3" rx="3" ry="4" fill="#ffffff"/>
    <circle cx="-4" cy="-2" r="1.6" fill="#1f2937"/>
    <circle cx="5" cy="-2" r="1.6" fill="#1f2937"/>
    <!-- ağız (zıplama gülüşü) -->
    <path d="M -5 6 Q 0 10 5 6" stroke="#7c3a06" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Hareket çizgileri (zıplama efekti) -->
  <g stroke="#ffffff" stroke-width="1.5" opacity="0.65" stroke-linecap="round">
    <line x1="130" y1="138" x2="126" y2="146"/>
    <line x1="140" y1="138" x2="144" y2="146"/>
    <line x1="135" y1="140" x2="135" y2="150"/>
  </g>
</svg>
