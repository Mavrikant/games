<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Gökdelen — yükseklik bulmacası">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1018"/>
      <stop offset="1" stop-color="#0a0b0e"/>
    </linearGradient>
    <linearGradient id="tower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7cbdff"/>
      <stop offset="1" stop-color="#2e6fc8"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)"/>
  <!-- Skyline silhouette -->
  <g fill="url(#tower)" opacity="0.95">
    <rect x="36"  y="118" width="30" height="62" rx="2"/>
    <rect x="72"  y="92"  width="30" height="88" rx="2"/>
    <rect x="108" y="68"  width="30" height="112" rx="2"/>
    <rect x="144" y="44"  width="30" height="136" rx="2"/>
    <rect x="180" y="78"  width="30" height="102" rx="2"/>
    <rect x="216" y="100" width="30" height="80" rx="2"/>
    <rect x="252" y="124" width="30" height="56" rx="2"/>
  </g>
  <!-- Window grid overlay on the tallest tower -->
  <g fill="#0a0d12" opacity="0.55">
    <rect x="148" y="50"  width="22" height="3"/>
    <rect x="148" y="60"  width="22" height="3"/>
    <rect x="148" y="70"  width="22" height="3"/>
    <rect x="148" y="80"  width="22" height="3"/>
    <rect x="148" y="90"  width="22" height="3"/>
    <rect x="148" y="100" width="22" height="3"/>
    <rect x="148" y="110" width="22" height="3"/>
    <rect x="148" y="120" width="22" height="3"/>
    <rect x="148" y="130" width="22" height="3"/>
    <rect x="148" y="140" width="22" height="3"/>
  </g>
  <!-- Visibility clue numbers above each tower -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" fill="#aab7c4" text-anchor="middle">
    <text x="51"  y="28">5</text>
    <text x="87"  y="28">4</text>
    <text x="123" y="28">3</text>
    <text x="159" y="28">1</text>
    <text x="195" y="28">2</text>
    <text x="231" y="28">3</text>
    <text x="267" y="28">4</text>
  </g>
  <!-- Title bar -->
  <g>
    <rect x="0" y="180" width="320" height="20" fill="#0a0d12"/>
    <text x="14" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="11" letter-spacing="2" fill="#7a8190">GÖKDELEN — GÖRÜŞ BULMACASI</text>
  </g>
</svg>
