<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Çekiç Atma">
  <defs>
    <linearGradient id="ca-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0b0e" />
      <stop offset="100%" stop-color="#1c2030" />
    </linearGradient>
    <radialGradient id="ca-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="320" height="200" fill="url(#ca-bg)" />

  <!-- Ground -->
  <rect x="0" y="160" width="320" height="40" fill="#2a2e3a" />
  <line x1="0" y1="160" x2="320" y2="160" stroke="#525a6c" stroke-width="1" />

  <!-- Distance ticks -->
  <g stroke="#525a6c" stroke-width="1">
    <line x1="80"  y1="160" x2="80"  y2="166" />
    <line x1="120" y1="160" x2="120" y2="168" />
    <line x1="160" y1="160" x2="160" y2="166" />
    <line x1="200" y1="160" x2="200" y2="168" />
    <line x1="240" y1="160" x2="240" y2="166" />
    <line x1="280" y1="160" x2="280" y2="168" />
  </g>
  <g font-family="ui-sans-serif, system-ui" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">
    <text x="120" y="182">20m</text>
    <text x="200" y="182">60m</text>
    <text x="280" y="182">100m</text>
  </g>

  <!-- Past landing × -->
  <g stroke="rgba(253,224,71,0.6)" stroke-width="2">
    <line x1="146" y1="151" x2="154" y2="159" />
    <line x1="154" y1="151" x2="146" y2="159" />
  </g>
  <g stroke="#fbbf24" stroke-width="2.5">
    <line x1="222" y1="149" x2="232" y2="159" />
    <line x1="232" y1="149" x2="222" y2="159" />
  </g>

  <!-- Foul line -->
  <line x1="80" y1="158" x2="80" y2="172" stroke="#ef4444" stroke-width="2" />

  <!-- Release-zone arc highlight -->
  <circle cx="80" cy="120" r="46" fill="none" stroke="url(#ca-glow)" stroke-width="14" />
  <path d="M 32,120 A 48,48 0 0,1 80,72" fill="none" stroke="#22c55e" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round" />

  <!-- Athlete -->
  <circle cx="80" cy="120" r="8" fill="#9aa3b2" />
  <rect x="74" y="126" width="4" height="18" fill="#9aa3b2" />
  <rect x="82" y="126" width="4" height="18" fill="#9aa3b2" />

  <!-- Hammer chain to upper-left ball -->
  <line x1="80" y1="120" x2="46" y2="86" stroke="#8a8f9a" stroke-width="2" />
  <circle cx="46" cy="86" r="9" fill="#e6ebf2" />
  <circle cx="46" cy="86" r="14" fill="none" stroke="#22c55e" stroke-opacity="0.35" stroke-width="3" />

  <!-- Star sweet-spot indicator -->
  <text x="36" y="64" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">★</text>

  <!-- Trajectory dotted arc -->
  <path d="M 50 84 Q 160 0 270 152" fill="none" stroke="rgba(230,235,242,0.35)" stroke-width="1.5" stroke-dasharray="3 4" />

  <!-- Title -->
  <text x="22" y="32" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#f5f6f8">Çekiç Atma</text>
</svg>
