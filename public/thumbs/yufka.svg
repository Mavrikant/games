<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Yufka">
  <defs>
    <linearGradient id="yu-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a130d" />
      <stop offset="100%" stop-color="#070504" />
    </linearGradient>
    <linearGradient id="yu-pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8cda5" />
      <stop offset="100%" stop-color="#a4815f" />
    </linearGradient>
    <linearGradient id="yu-dough-ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3d68a" />
      <stop offset="100%" stop-color="#c89548" />
    </linearGradient>
    <linearGradient id="yu-dough-thick" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cba163" />
      <stop offset="100%" stop-color="#7a4e26" />
    </linearGradient>
  </defs>

  <rect width="320" height="200" fill="url(#yu-bg)" />

  <!-- Target band (faint green stripe) -->
  <rect x="14" y="118" width="292" height="20" fill="rgba(116,200,130,0.16)" />
  <line x1="14" y1="118" x2="306" y2="118" stroke="rgba(116,200,130,0.55)" stroke-width="1" />
  <line x1="14" y1="138" x2="306" y2="138" stroke="rgba(116,200,130,0.55)" stroke-width="1" />

  <!-- Dough cells (side profile, varying height) -->
  <g>
    <rect x="14"  y="140" width="18" height="32" fill="url(#yu-dough-ok)" />
    <rect x="32"  y="132" width="18" height="40" fill="url(#yu-dough-ok)" />
    <rect x="50"  y="124" width="18" height="48" fill="url(#yu-dough-ok)" />
    <rect x="68"  y="112" width="18" height="60" fill="url(#yu-dough-thick)" />
    <rect x="86"  y="92"  width="18" height="80" fill="url(#yu-dough-thick)" />
    <rect x="104" y="74"  width="18" height="98" fill="url(#yu-dough-thick)" />
    <rect x="122" y="68"  width="18" height="104" fill="url(#yu-dough-thick)" />
    <rect x="140" y="74"  width="18" height="98" fill="url(#yu-dough-thick)" />
    <rect x="158" y="92"  width="18" height="80" fill="url(#yu-dough-thick)" />
    <rect x="176" y="116" width="18" height="56" fill="url(#yu-dough-ok)" />
    <rect x="194" y="124" width="18" height="48" fill="url(#yu-dough-ok)" />
    <rect x="212" y="130" width="18" height="42" fill="url(#yu-dough-ok)" />
    <rect x="230" y="134" width="18" height="38" fill="url(#yu-dough-ok)" />
    <rect x="248" y="138" width="18" height="34" fill="url(#yu-dough-ok)" />
    <rect x="266" y="140" width="18" height="32" fill="url(#yu-dough-ok)" />
    <rect x="284" y="142" width="22" height="30" fill="url(#yu-dough-ok)" />
  </g>

  <!-- Cell separators -->
  <g stroke="rgba(0,0,0,0.18)" stroke-width="1">
    <line x1="32"  y1="68" x2="32"  y2="172" />
    <line x1="50"  y1="68" x2="50"  y2="172" />
    <line x1="68"  y1="68" x2="68"  y2="172" />
    <line x1="86"  y1="68" x2="86"  y2="172" />
    <line x1="104" y1="68" x2="104" y2="172" />
    <line x1="122" y1="68" x2="122" y2="172" />
    <line x1="140" y1="68" x2="140" y2="172" />
    <line x1="158" y1="68" x2="158" y2="172" />
    <line x1="176" y1="68" x2="176" y2="172" />
    <line x1="194" y1="68" x2="194" y2="172" />
    <line x1="212" y1="68" x2="212" y2="172" />
    <line x1="230" y1="68" x2="230" y2="172" />
    <line x1="248" y1="68" x2="248" y2="172" />
    <line x1="266" y1="68" x2="266" y2="172" />
    <line x1="284" y1="68" x2="284" y2="172" />
  </g>

  <!-- Highlight on top of dough -->
  <rect x="14" y="68" width="292" height="3" fill="rgba(255,255,255,0.08)" />

  <!-- Table surface line -->
  <line x1="0" y1="172" x2="320" y2="172" stroke="rgba(0,0,0,0.4)" stroke-width="2" />
  <rect x="0" y="172" width="320" height="14" fill="#3a2e21" />

  <!-- Rolling pin (above the tall peak, suggesting motion to the right) -->
  <g transform="translate(131,46)">
    <rect x="-44" y="-3" width="14" height="6" fill="#5b3b2a" rx="1" />
    <rect x="30" y="-3" width="14" height="6" fill="#5b3b2a" rx="1" />
    <circle r="22" fill="url(#yu-pin)" stroke="#5b3b2a" stroke-width="2" />
    <!-- motion lines -->
    <line x1="22" y1="-8" x2="40" y2="-8" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" />
    <line x1="22" y1="0"  x2="46" y2="0"  stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linecap="round" />
    <line x1="22" y1="8"  x2="40" y2="8"  stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>
