<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Kavuşum">
  <defs>
    <radialGradient id="space" cx="0.5" cy="0.5" r="0.85">
      <stop offset="0" stop-color="#1b2240"/>
      <stop offset="1" stop-color="#0a0b14"/>
    </radialGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fff7cc"/>
      <stop offset="0.45" stop-color="#facc15"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ray" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="320" height="200" fill="url(#space)"/>

  <!-- Yıldızlar -->
  <g fill="#ffffff" opacity="0.55">
    <circle cx="30" cy="38" r="0.9"/>
    <circle cx="70" cy="22" r="0.7"/>
    <circle cx="108" cy="50" r="1"/>
    <circle cx="158" cy="16" r="0.6"/>
    <circle cx="208" cy="44" r="0.9"/>
    <circle cx="262" cy="28" r="0.7"/>
    <circle cx="298" cy="62" r="0.8"/>
    <circle cx="20" cy="170" r="0.7"/>
    <circle cx="58" cy="186" r="0.9"/>
    <circle cx="118" cy="164" r="0.6"/>
    <circle cx="178" cy="184" r="0.8"/>
    <circle cx="234" cy="170" r="0.7"/>
    <circle cx="288" cy="160" r="0.9"/>
  </g>

  <!-- Yörünge halkaları -->
  <g fill="none" stroke="#7c8bb8" stroke-opacity="0.35" stroke-width="0.8">
    <circle cx="160" cy="100" r="30"/>
    <circle cx="160" cy="100" r="52"/>
    <circle cx="160" cy="100" r="78"/>
  </g>

  <!-- Hedef ışın (sağa doğru) -->
  <line x1="160" y1="100" x2="252" y2="100" stroke="url(#ray)" stroke-width="3"/>
  <circle cx="252" cy="100" r="3" fill="#ffffff" opacity="0.95"/>

  <!-- Güneş -->
  <circle cx="160" cy="100" r="22" fill="url(#sun)"/>
  <circle cx="160" cy="100" r="9" fill="#fff7cc"/>

  <!-- Kavuşum: üç gezegen ışın üzerinde -->
  <circle cx="190" cy="100" r="5.5" fill="#22c55e" stroke="#0a0b14" stroke-width="0.8"/>
  <circle cx="212" cy="100" r="6.5" fill="#60a5fa" stroke="#0a0b14" stroke-width="0.8"/>
  <circle cx="238" cy="100" r="7"   fill="#f43f5e" stroke="#0a0b14" stroke-width="0.8"/>

  <!-- Hafif "isabet" parıltısı -->
  <g fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1">
    <circle cx="190" cy="100" r="9"/>
    <circle cx="212" cy="100" r="10"/>
    <circle cx="238" cy="100" r="10.5"/>
  </g>
</svg>
