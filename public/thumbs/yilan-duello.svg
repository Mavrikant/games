<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Yılan Düellosu">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#11261a" />
      <stop offset="100%" stop-color="#0a0e14" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)" />
  <!-- green snake (host) coming from the left -->
  <g fill="#22c55e">
    <rect x="30" y="120" width="20" height="20" rx="3" />
    <rect x="54" y="120" width="20" height="20" rx="3" />
    <rect x="78" y="120" width="20" height="20" rx="3" />
    <rect x="102" y="96" width="20" height="20" rx="3" />
    <rect x="102" y="120" width="20" height="20" rx="3" />
  </g>
  <rect x="102" y="72" width="20" height="20" rx="3" fill="#86efac" />
  <!-- blue snake (guest) coming from the right -->
  <g fill="#3b82f6">
    <rect x="270" y="60" width="20" height="20" rx="3" />
    <rect x="246" y="60" width="20" height="20" rx="3" />
    <rect x="222" y="60" width="20" height="20" rx="3" />
    <rect x="198" y="60" width="20" height="20" rx="3" />
    <rect x="198" y="84" width="20" height="20" rx="3" />
  </g>
  <rect x="198" y="108" width="20" height="20" rx="3" fill="#93c5fd" />
  <!-- food -->
  <circle cx="160" cy="150" r="10" fill="#f43f5e" />
  <text x="20" y="40" font-family="ui-sans-serif, system-ui" font-size="22" font-weight="700" fill="#e4e4ed">Yılan Düellosu</text>
</svg>
