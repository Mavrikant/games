<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Hava Trafik">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10141c" />
      <stop offset="100%" stop-color="#070a0e" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)" />
  <g stroke="#818cf8" stroke-opacity="0.1" stroke-width="1">
    <line x1="80" y1="0" x2="80" y2="200" />
    <line x1="160" y1="0" x2="160" y2="200" />
    <line x1="240" y1="0" x2="240" y2="200" />
    <line x1="0" y1="66" x2="320" y2="66" />
    <line x1="0" y1="133" x2="320" y2="133" />
  </g>
  <!-- gates -->
  <circle cx="160" cy="14" r="16" fill="#f8717f" fill-opacity="0.18" stroke="#f8717f" stroke-width="2.5" />
  <circle cx="306" cy="100" r="16" fill="#34d399" fill-opacity="0.18" stroke="#34d399" stroke-width="2.5" />
  <circle cx="14" cy="100" r="16" fill="#60a5fa" fill-opacity="0.18" stroke="#60a5fa" stroke-width="2.5" />
  <!-- flight paths -->
  <path d="M70 150 Q120 90 158 30" fill="none" stroke="#f8717f" stroke-width="2" stroke-dasharray="5 6" stroke-opacity="0.55" />
  <path d="M120 60 Q220 90 290 100" fill="none" stroke="#34d399" stroke-width="2" stroke-dasharray="5 6" stroke-opacity="0.55" />
  <!-- planes (triangles) -->
  <g transform="translate(70,150) rotate(-55)" fill="#f8717f" stroke="#070a0e" stroke-width="2">
    <polygon points="11,0 -9,8 -6,0 -9,-8" />
  </g>
  <g transform="translate(120,60) rotate(20)" fill="#34d399" stroke="#070a0e" stroke-width="2">
    <polygon points="11,0 -9,8 -6,0 -9,-8" />
  </g>
  <text x="18" y="184" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#f5f6f8">Hava Trafik</text>
</svg>
