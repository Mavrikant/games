  <rect x="20" y="126" width="280" height="20" fill="#1c2a1c" stroke="#34d399" stroke-width="1.5" />
  <text x="30"  y="140" font-family="ui-monospace, monospace" font-size="9" fill="#a7f3d0">F-1052</text>
  <text x="92"  y="140" font-family="ui-monospace, monospace" font-size="9" fill="#a7f3d0">31.12.2029</text>
  <text x="190" y="140" font-family="ui-monospace, monospace" font-size="9" fill="#a7f3d0" text-anchor="end">760,00</text>
  <text x="250" y="140" font-family="ui-monospace, monospace" font-size="9" fill="#a7f3d0" text-anchor="end">136,80</text>
  <text x="300" y="140" font-family="ui-monospace, monospace" font-size="9" fill="#a7f3d0" text-anchor="end">896,80</text>

  <!-- Row 5: clean -->
  <rect x="20" y="148" width="280" height="20" fill="#14171c" stroke="#1f242c" />
  <text x="30"  y="162" font-family="ui-monospace, monospace" font-size="9" fill="#f5f6f8">F-1063</text>
  <text x="92"  y="162" font-family="ui-monospace, monospace" font-size="9" fill="#98a0ad">19.03.2026</text>
  <text x="190" y="162" font-family="ui-monospace, monospace" font-size="9" fill="#f5f6f8" text-anchor="end">300,00</text>
  <text x="250" y="162" font-family="ui-monospace, monospace" font-size="9" fill="#f5f6f8" text-anchor="end">54,00</text>
  <text x="300" y="162" font-family="ui-monospace, monospace" font-size="9" fill="#f5f6f8" text-anchor="end">354,00</text>

  <!-- Magnifying glass icon over the anomaly row -->
  <g transform="translate(248, 80)">
    <circle cx="0" cy="0" r="11" fill="none" stroke="#fbbf24" stroke-width="2" />
    <line x1="7" y1="7" x2="15" y2="15" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Bottom hint -->
  <text x="160" y="188" font-family="ui-sans-serif, system-ui" font-size="9" fill="#5a6473" text-anchor="middle">anomalileri yakala — toplam, tarih, dublike</text>
</svg>
