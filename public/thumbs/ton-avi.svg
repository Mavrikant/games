<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Ton Avı">
  <defs>
    <linearGradient id="ta-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141a18" />
      <stop offset="100%" stop-color="#0a0b0e" />
    </linearGradient>
    <radialGradient id="ta-dot" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#34b8a0" />
      <stop offset="100%" stop-color="#1f8f7c" />
    </radialGradient>
    <radialGradient id="ta-odd" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#7ff0d6" />
      <stop offset="100%" stop-color="#46c6ad" />
    </radialGradient>
    <filter id="ta-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="320" height="200" fill="url(#ta-bg)" />

  <!-- time bar hint -->
  <rect x="92" y="24" width="136" height="8" rx="4" fill="#1d2622" />
  <rect x="92" y="24" width="86" height="8" rx="4" fill="#34b8a0" />

  <!-- 4x4 grid of circles, one of them an odd, lighter tone -->
  <g transform="translate(94, 46)">
    <!-- row 0 -->
    <circle cx="16"  cy="16"  r="14" fill="url(#ta-dot)" />
    <circle cx="60"  cy="16"  r="14" fill="url(#ta-dot)" />
    <circle cx="104" cy="16"  r="14" fill="url(#ta-dot)" />
    <circle cx="148" cy="16"  r="14" fill="url(#ta-dot)" />
    <!-- row 1 -->
    <circle cx="16"  cy="60"  r="14" fill="url(#ta-dot)" />
    <circle cx="60"  cy="60"  r="14" fill="url(#ta-dot)" />
    <!-- the odd one -->
    <circle cx="104" cy="60"  r="15" fill="url(#ta-odd)" filter="url(#ta-glow)" />
    <circle cx="148" cy="60"  r="14" fill="url(#ta-dot)" />
    <!-- row 2 -->
    <circle cx="16"  cy="104" r="14" fill="url(#ta-dot)" />
    <circle cx="60"  cy="104" r="14" fill="url(#ta-dot)" />
    <circle cx="104" cy="104" r="14" fill="url(#ta-dot)" />
    <circle cx="148" cy="104" r="14" fill="url(#ta-dot)" />
  </g>
</svg>
