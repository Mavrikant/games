<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Suflör">
  <defs>
    <linearGradient id="curtain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a1024"/>
      <stop offset="0.5" stop-color="#7a1735"/>
      <stop offset="1" stop-color="#3a0a18"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.5" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#fff2c4" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#fff2c4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15121d"/>
      <stop offset="1" stop-color="#08070d"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1424"/>
      <stop offset="1" stop-color="#0a0810"/>
    </linearGradient>
  </defs>

  <rect width="320" height="200" fill="url(#stage)"/>

  <!-- Spotlight -->
  <rect width="320" height="200" fill="url(#spot)"/>

  <!-- Side curtains -->
  <path d="M0 0 H46 Q60 100 46 200 H0 Z" fill="url(#curtain)"/>
  <path d="M320 0 H274 Q260 100 274 200 H320 Z" fill="url(#curtain)"/>

  <!-- Curtain folds -->
  <g stroke="#3a0817" stroke-width="0.8" opacity="0.7" fill="none">
    <path d="M12 6 Q20 100 12 196"/>
    <path d="M26 6 Q34 100 26 196"/>
    <path d="M294 6 Q286 100 294 196"/>
    <path d="M308 6 Q300 100 308 196"/>
  </g>

  <!-- Stage floor -->
  <rect x="46" y="156" width="228" height="44" fill="url(#floor)"/>
  <line x1="46" y1="156" x2="274" y2="156" stroke="#3a2f50" stroke-width="0.8"/>

  <!-- Three actor silhouettes -->
  <g fill="#1a1424" stroke="#0a0810" stroke-width="0.8">
    <!-- Actor 1 -->
    <circle cx="98" cy="116" r="11"/>
    <path d="M76 168 Q76 130 98 122 Q120 130 120 168 Z"/>
    <!-- Actor 2 -->
    <circle cx="160" cy="112" r="12"/>
    <path d="M137 168 Q137 126 160 118 Q183 126 183 168 Z"/>
    <!-- Actor 3 -->
    <circle cx="222" cy="116" r="11"/>
    <path d="M200 168 Q200 130 222 122 Q244 130 244 168 Z"/>
  </g>

  <!-- Cue numbers above heads -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-weight="800" text-anchor="middle">
    <rect x="78" y="78" width="40" height="20" rx="4" fill="#0a0810" stroke="#f8d57c" stroke-opacity="0.4"/>
    <text x="98" y="93" font-size="14" fill="#f8d57c">42</text>

    <rect x="140" y="74" width="40" height="20" rx="4" fill="#0a0810" stroke="#f8d57c" stroke-opacity="0.4"/>
    <text x="160" y="89" font-size="14" fill="#f8d57c">17</text>

    <rect x="202" y="78" width="40" height="20" rx="4" fill="#0a0810" stroke="#f8d57c" stroke-opacity="0.4"/>
    <text x="222" y="93" font-size="14" fill="#f8d57c">63</text>
  </g>

  <!-- Memory bars at feet -->
  <g>
    <rect x="78" y="172" width="40" height="4" rx="2" fill="#1a1424" stroke="#000" stroke-opacity="0.4"/>
    <rect x="78" y="172" width="32" height="4" rx="2" fill="#22c55e"/>
    <rect x="140" y="172" width="40" height="4" rx="2" fill="#1a1424" stroke="#000" stroke-opacity="0.4"/>
    <rect x="140" y="172" width="16" height="4" rx="2" fill="#facc15"/>
    <rect x="202" y="172" width="40" height="4" rx="2" fill="#1a1424" stroke="#000" stroke-opacity="0.4"/>
    <rect x="202" y="172" width="8" height="4" rx="2" fill="#ef4444"/>
  </g>

  <!-- Prompter cue card at center -->
  <g transform="translate(160 50)">
    <rect x="-30" y="-22" width="60" height="34" rx="6" fill="#0a0810" stroke="#f8d57c" stroke-width="1.2" stroke-opacity="0.85"/>
    <text x="0" y="6" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="800" font-size="22" fill="#f8d57c" text-anchor="middle">17</text>
  </g>
</svg>
