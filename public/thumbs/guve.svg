<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Güve">
  <defs>
    <linearGradient id="gbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060614" />
      <stop offset="100%" stop-color="#1c1742" />
    </linearGradient>
    <radialGradient id="orangeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9a3a" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#ff9a3a" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6e9dff" stop-opacity="0.75" />
      <stop offset="100%" stop-color="#6e9dff" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#gbg)" />
  <g fill="#fff" opacity="0.55">
    <rect x="40" y="30" width="1.5" height="1.5" />
    <rect x="80" y="20" width="1" height="1" />
    <rect x="130" y="40" width="1.2" height="1.2" />
    <rect x="200" y="22" width="1" height="1" />
    <rect x="260" y="48" width="1.4" height="1.4" />
    <rect x="290" y="32" width="1.1" height="1.1" />
  </g>
  <circle cx="252" cy="44" r="14" fill="#f5f0dc" opacity="0.86" />
  <rect x="0" y="156" width="320" height="44" fill="#2a1b12" />

  <!-- Orange candle 1 -->
  <circle cx="70" cy="130" r="30" fill="url(#orangeGlow)" />
  <rect x="65" y="138" width="10" height="26" fill="#ead9b8" />
  <ellipse cx="70" cy="128" rx="4" ry="8" fill="#ff9a3a" />
  <ellipse cx="70" cy="130" rx="2" ry="5" fill="#ffe28a" />

  <!-- Orange candle 2 -->
  <circle cx="130" cy="130" r="30" fill="url(#orangeGlow)" />
  <rect x="125" y="138" width="10" height="26" fill="#ead9b8" />
  <ellipse cx="130" cy="128" rx="4" ry="8" fill="#ff9a3a" />
  <ellipse cx="130" cy="130" rx="2" ry="5" fill="#ffe28a" />

  <!-- Blue target candle -->
  <circle cx="220" cy="130" r="34" fill="url(#blueGlow)" />
  <rect x="215" y="138" width="10" height="26" fill="#90a8d8" />
  <ellipse cx="220" cy="128" rx="4" ry="8" fill="#6e9dff" />
  <ellipse cx="220" cy="130" rx="2" ry="5" fill="#cfe1ff" />
  <circle cx="220" cy="128" r="14" fill="none" stroke="#6e9dff" stroke-width="1.2" opacity="0.55" />

  <!-- Moth -->
  <g transform="translate(170 95) rotate(15)">
    <ellipse cx="0" cy="-3" rx="9" ry="6" fill="#bfb59a" transform="rotate(-15)" />
    <ellipse cx="0" cy="3" rx="9" ry="6" fill="#bfb59a" transform="rotate(15)" />
    <ellipse cx="0" cy="0" rx="6" ry="2.4" fill="#e6dcc1" />
  </g>

  <text x="20" y="34" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4e4ed">Güve</text>
</svg>
