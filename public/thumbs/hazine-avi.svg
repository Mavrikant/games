<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Hazine Avı">
  <defs>
    <linearGradient id="ha-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d24" />
      <stop offset="100%" stop-color="#0a0b0e" />
    </linearGradient>
    <radialGradient id="ha-star" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#fff7c2" />
      <stop offset="60%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#b88508" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ha-bg)" />

  <!-- 4x4 grid of warmth cells -->
  <g transform="translate(160,108)">
    <!-- row 0 (top) -->
    <rect x="-66" y="-66" width="30" height="30" rx="4" fill="#1e3a8a" opacity="0.85"/>
    <rect x="-33" y="-66" width="30" height="30" rx="4" fill="#1d4ed8" opacity="0.85"/>
    <rect x="0"   y="-66" width="30" height="30" rx="4" fill="#15803d" opacity="0.85"/>
    <rect x="33"  y="-66" width="30" height="30" rx="4" fill="#65a30d" opacity="0.85"/>
    <!-- row 1 -->
    <rect x="-66" y="-33" width="30" height="30" rx="4" fill="#1d4ed8" opacity="0.85"/>
    <rect x="-33" y="-33" width="30" height="30" rx="4" fill="#15803d" opacity="0.85"/>
    <rect x="0"   y="-33" width="30" height="30" rx="4" fill="#ca8a04" opacity="0.9"/>
    <rect x="33"  y="-33" width="30" height="30" rx="4" fill="#ea580c" opacity="0.9"/>
    <!-- row 2 -->
    <rect x="-66" y="0"   width="30" height="30" rx="4" fill="#15803d" opacity="0.85"/>
    <rect x="-33" y="0"   width="30" height="30" rx="4" fill="#ca8a04" opacity="0.9"/>
    <rect x="0"   y="0"   width="30" height="30" rx="4" fill="#ea580c" opacity="0.95"/>
    <rect x="33"  y="0"   width="30" height="30" rx="4" fill="#dc2626" opacity="0.95"/>
    <!-- row 3 -->
    <rect x="-66" y="33"  width="30" height="30" rx="4" fill="#65a30d" opacity="0.85"/>
    <rect x="-33" y="33"  width="30" height="30" rx="4" fill="#ea580c" opacity="0.9"/>
    <rect x="0"   y="33"  width="30" height="30" rx="4" fill="#dc2626" opacity="0.95"/>
    <!-- treasure cell -->
    <rect x="33"  y="33"  width="30" height="30" rx="4" fill="#7c2d12" />
    <g transform="translate(48,48)">
      <path d="M0 -10 L3 -3 L10 -3 L4.5 1 L6 9 L0 4 L-6 9 L-4.5 1 L-10 -3 L-3 -3 Z"
            fill="url(#ha-star)" stroke="#b88508" stroke-width="0.6"/>
    </g>
  </g>

  <text x="22" y="36" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#f5f6f8">Hazine Avı</text>
</svg>
