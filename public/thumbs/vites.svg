<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Vites">
  <defs>
    <linearGradient id="vi-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161922" />
      <stop offset="100%" stop-color="#070810" />
    </linearGradient>
    <linearGradient id="vi-dial" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1f29" />
      <stop offset="100%" stop-color="#0a0b10" />
    </linearGradient>
  </defs>

  <rect width="320" height="200" fill="url(#vi-bg)" />

  <!-- Distant road / horizon -->
  <line x1="160" y1="14" x2="40"  y2="38" stroke="rgba(255,255,255,0.10)" stroke-width="1" />
  <line x1="160" y1="14" x2="280" y2="38" stroke="rgba(255,255,255,0.10)" stroke-width="1" />
  <g stroke="rgba(249,210,76,0.45)" stroke-width="2" stroke-dasharray="6 4">
    <line x1="160" y1="14" x2="160" y2="38" />
  </g>

  <!-- Tachometer dial: arc from 200° to 340° -->
  <g transform="translate(160 120)">
    <circle r="74" fill="url(#vi-dial)" stroke="rgba(255,255,255,0.12)" stroke-width="1" />

    <!-- Zones (concentric arcs) -->
    <path d="M -56.39 -20.55 A 60 60 0 0 1 -42.43 -42.43" fill="none" stroke="rgba(120,140,170,0.7)" stroke-width="7" />
    <path d="M -42.43 -42.43 A 60 60 0 0 1 22.97 -55.43" fill="none" stroke="rgba(116,200,130,0.9)" stroke-width="7" />
    <path d="M 22.97 -55.43 A 60 60 0 0 1 48.71 -34.96" fill="none" stroke="rgba(249,210,76,0.9)" stroke-width="7" />
    <path d="M 48.71 -34.96 A 60 60 0 0 1 56.39 -20.55" fill="none" stroke="rgba(232,90,90,0.95)" stroke-width="7" />

    <!-- Tick labels -->
    <g font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="rgba(255,255,255,0.75)" text-anchor="middle">
      <text x="-44" y="-22">0</text>
      <text x="-18" y="-44">2</text>
      <text x="18"  y="-44">4</text>
      <text x="44"  y="-22">6</text>
      <text x="54"  y="-2">8</text>
    </g>

    <!-- Needle pointing into yellow zone (about 5500 rpm) -->
    <line x1="0" y1="0" x2="38" y2="-38" stroke="#ff4d4d" stroke-width="3" stroke-linecap="round" />
    <circle r="6" fill="#1b1d24" stroke="rgba(255,255,255,0.25)" stroke-width="1" />

    <!-- Digital speed in center -->
    <text x="0" y="22" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#f9d24c" text-anchor="middle">168</text>
    <text x="0" y="32" font-family="system-ui, sans-serif" font-size="7" fill="rgba(255,255,255,0.55)" text-anchor="middle">km/h</text>
  </g>

  <!-- Gear strip (N 1 2 3 4 [5]) -->
  <g transform="translate(28 188)">
    <g font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">
      <rect x="0"   y="-12" width="32" height="14" rx="2" fill="#11131a" stroke="rgba(255,255,255,0.12)" />
      <text x="16"  y="-1.5" fill="rgba(255,255,255,0.65)">N</text>
      <rect x="38"  y="-12" width="32" height="14" rx="2" fill="#11131a" stroke="rgba(255,255,255,0.12)" />
      <text x="54"  y="-1.5" fill="rgba(255,255,255,0.65)">1</text>
      <rect x="76"  y="-12" width="32" height="14" rx="2" fill="#11131a" stroke="rgba(255,255,255,0.12)" />
      <text x="92"  y="-1.5" fill="rgba(255,255,255,0.65)">2</text>
      <rect x="114" y="-12" width="32" height="14" rx="2" fill="#11131a" stroke="rgba(255,255,255,0.12)" />
      <text x="130" y="-1.5" fill="rgba(255,255,255,0.65)">3</text>
      <rect x="152" y="-12" width="32" height="14" rx="2" fill="#11131a" stroke="rgba(255,255,255,0.12)" />
      <text x="168" y="-1.5" fill="rgba(255,255,255,0.65)">4</text>
      <rect x="190" y="-12" width="32" height="14" rx="2" fill="#f9d24c" />
      <text x="206" y="-1.5" fill="#0a0b0e">5</text>
    </g>
  </g>
</svg>
