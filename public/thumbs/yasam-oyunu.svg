<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Yasam Oyunu">
  <defs>
    <linearGradient id="yo-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1620" />
      <stop offset="100%" stop-color="#04080d" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#yo-bg)" />
  <!-- Grid lines (very subtle) -->
  <g stroke="#1a2530" stroke-width="0.6">
    <line x1="20" y1="60" x2="300" y2="60" />
    <line x1="20" y1="80" x2="300" y2="80" />
    <line x1="20" y1="100" x2="300" y2="100" />
    <line x1="20" y1="120" x2="300" y2="120" />
    <line x1="20" y1="140" x2="300" y2="140" />
    <line x1="20" y1="160" x2="300" y2="160" />
    <line x1="20" y1="180" x2="300" y2="180" />
    <line x1="60" y1="50" x2="60" y2="190" />
    <line x1="80" y1="50" x2="80" y2="190" />
    <line x1="100" y1="50" x2="100" y2="190" />
    <line x1="120" y1="50" x2="120" y2="190" />
    <line x1="140" y1="50" x2="140" y2="190" />
    <line x1="160" y1="50" x2="160" y2="190" />
    <line x1="180" y1="50" x2="180" y2="190" />
    <line x1="200" y1="50" x2="200" y2="190" />
    <line x1="220" y1="50" x2="220" y2="190" />
    <line x1="240" y1="50" x2="240" y2="190" />
    <line x1="260" y1="50" x2="260" y2="190" />
    <line x1="280" y1="50" x2="280" y2="190" />
  </g>
  <!-- Live cells: a glider top-left -->
  <g fill="#7cf2a8">
    <rect x="42" y="62" width="16" height="16" rx="2" />
    <rect x="62" y="82" width="16" height="16" rx="2" />
    <rect x="22" y="102" width="16" height="16" rx="2" />
    <rect x="42" y="102" width="16" height="16" rx="2" />
    <rect x="62" y="102" width="16" height="16" rx="2" />
  </g>
  <!-- Pulsar fragment / blinker right -->
  <g fill="#7cf2a8">
    <rect x="222" y="82" width="16" height="16" rx="2" />
    <rect x="242" y="82" width="16" height="16" rx="2" />
    <rect x="262" y="82" width="16" height="16" rx="2" />
  </g>
  <!-- block bottom right -->
  <g fill="#7cf2a8">
    <rect x="242" y="142" width="16" height="16" rx="2" />
    <rect x="262" y="142" width="16" height="16" rx="2" />
    <rect x="242" y="162" width="16" height="16" rx="2" />
    <rect x="262" y="162" width="16" height="16" rx="2" />
  </g>
  <!-- some scattered -->
  <g fill="#7cf2a8" opacity="0.75">
    <rect x="142" y="122" width="16" height="16" rx="2" />
    <rect x="162" y="142" width="16" height="16" rx="2" />
    <rect x="122" y="162" width="16" height="16" rx="2" />
  </g>
  <text x="20" y="34" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="700" fill="#c8e6d6">Yasam Oyunu</text>
</svg>
