      <stop offset="0%" stop-color="#1a0f0a" />
      <stop offset="55%" stop-color="#0e0807" />
      <stop offset="100%" stop-color="#2a0f04" />
    </linearGradient>
    <radialGradient id="sk-ember" cx="0.5" cy="0.5" r="0.5">
