<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Yel Değirmeni">
  <defs>
    <linearGradient id="yd-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2536" />
      <stop offset="100%" stop-color="#0a0e1a" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#yd-bg)" />
  <!-- Wind streamlines -->
  <g stroke="#78b4f0" stroke-opacity="0.45" stroke-width="1.5" stroke-linecap="round" fill="none">
    <line x1="20" y1="50" x2="48" y2="50" />
    <line x1="76" y1="50" x2="104" y2="50" />
    <line x1="132" y1="50" x2="160" y2="50" />
    <line x1="188" y1="50" x2="216" y2="50" />
    <line x1="244" y1="50" x2="272" y2="50" />

    <line x1="36" y1="100" x2="64" y2="100" />
    <line x1="92" y1="100" x2="120" y2="100" />
    <line x1="148" y1="100" x2="176" y2="100" />
    <line x1="204" y1="100" x2="232" y2="100" />
    <line x1="260" y1="100" x2="288" y2="100" />

    <line x1="20" y1="150" x2="48" y2="150" />
    <line x1="76" y1="150" x2="104" y2="150" />
    <line x1="132" y1="150" x2="160" y2="150" />
    <line x1="188" y1="150" x2="216" y2="150" />
    <line x1="244" y1="150" x2="272" y2="150" />
  </g>
  <!-- Windmill 1 (aligned, green ring, blades horizontal) -->
  <g transform="translate(100,110)">
    <circle r="34" fill="none" stroke="#5fd07d" stroke-width="3" />
    <g fill="#c7cdd9">
      <polygon points="0,-3 28,-2 28,2 0,3" />
      <polygon points="0,-3 -28,-2 -28,2 0,3" transform="rotate(180)" />
      <polygon points="0,-3 28,-2 28,2 0,3" transform="rotate(90)" />
      <polygon points="0,-3 28,-2 28,2 0,3" transform="rotate(270)" />
    </g>
    <circle r="7" fill="#c7cdd9" stroke="#0a0e1a" stroke-width="2" />
  </g>
  <!-- Windmill 2 (mid alignment, yellow) -->
  <g transform="translate(220,90) rotate(35)">
    <circle r="28" fill="none" stroke="#f5c451" stroke-width="3" />
    <g fill="#c7cdd9">
      <polygon points="0,-3 22,-2 22,2 0,3" />
      <polygon points="0,-3 -22,-2 -22,2 0,3" transform="rotate(180)" />
      <polygon points="0,-3 22,-2 22,2 0,3" transform="rotate(90)" />
      <polygon points="0,-3 22,-2 22,2 0,3" transform="rotate(270)" />
    </g>
    <circle r="6" fill="#c7cdd9" stroke="#0a0e1a" stroke-width="2" />
  </g>
  <!-- Windmill 3 (mis-aligned, red) -->
  <g transform="translate(260,155) rotate(70)">
    <circle r="22" fill="none" stroke="#ef4f4f" stroke-width="3" />
    <g fill="#c7cdd9">
      <polygon points="0,-3 16,-2 16,2 0,3" />
      <polygon points="0,-3 -16,-2 -16,2 0,3" transform="rotate(180)" />
      <polygon points="0,-3 16,-2 16,2 0,3" transform="rotate(90)" />
      <polygon points="0,-3 16,-2 16,2 0,3" transform="rotate(270)" />
    </g>
    <circle r="5" fill="#c7cdd9" stroke="#0a0e1a" stroke-width="2" />
  </g>
  <text x="16" y="32" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="700" fill="#e4e4ed">Yel Değirmeni</text>
</svg>
