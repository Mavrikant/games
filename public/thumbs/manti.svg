<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a5a37"/>
      <stop offset="1" stop-color="#3f2810"/>
    </linearGradient>
    <radialGradient id="dough" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#f0d9a8"/>
      <stop offset="1" stop-color="#caa66a"/>
    </radialGradient>
    <radialGradient id="seal" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#fff8dc"/>
      <stop offset="0.5" stop-color="#fde047"/>
      <stop offset="1" stop-color="#facc15" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)"/>
  <g opacity="0.06" stroke="#fff" stroke-width="0.6" fill="none">
    <path d="M0 24 Q160 30 320 24"/>
    <path d="M0 52 Q160 58 320 52"/>
    <path d="M0 80 Q160 86 320 80"/>
    <path d="M0 108 Q160 114 320 108"/>
    <path d="M0 136 Q160 142 320 136"/>
    <path d="M0 164 Q160 170 320 164"/>
  </g>
  <!-- finished manti in tray, left side -->
  <g transform="translate(70 130)">
    <polygon points="0,-22 22,0 0,22 -22,0" fill="#e6c990" stroke="#7a5a37" stroke-width="1.4"/>
    <circle r="7" fill="#7a3220"/>
  </g>
  <g transform="translate(48 96)">
    <polygon points="0,-16 16,0 0,16 -16,0" fill="#d9bd86" stroke="#7a5a37" stroke-width="1.2" opacity="0.85"/>
    <circle r="4" fill="#7a3220"/>
  </g>
  <!-- active dough in center -->
  <g transform="translate(180 96) rotate(8)">
    <rect x="-52" y="-52" width="104" height="104" rx="8" fill="url(#dough)" stroke="#8a6840" stroke-width="1.4"/>
    <!-- folded triangles on 2 corners -->
    <polygon points="-52,-52 0,-8 -28,-30" fill="#d9bd86" opacity="0.7" stroke="#8a6840" stroke-width="1"/>
    <polygon points="52,52 0,8 30,28" fill="#d9bd86" opacity="0.7" stroke="#8a6840" stroke-width="1"/>
    <!-- filling -->
    <circle r="11" fill="#a23a25"/>
    <circle r="5" cx="-2" cy="-2" fill="#6b1f12"/>
    <!-- seal glow -->
    <circle r="26" fill="url(#seal)" opacity="0.7"/>
    <circle r="5" fill="#fff8dc"/>
    <!-- remaining 2 corner knobs -->
    <circle cx="52" cy="-52" r="6" fill="#0f172a" stroke="#fde68a" stroke-width="1.5"/>
    <circle cx="-52" cy="52" r="6" fill="#0f172a" stroke="#fde68a" stroke-width="1.5"/>
    <!-- one dragged dashed line -->
    <line x1="52" y1="-52" x2="20" y2="-16" stroke="#fff" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.8"/>
  </g>
  <!-- title -->
  <text x="16" y="186" font-family="system-ui,sans-serif" font-weight="700" font-size="18" fill="#fde68a">Mantı</text>
</svg>
