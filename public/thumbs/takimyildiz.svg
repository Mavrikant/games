<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Takımyıldız">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0728" />
      <stop offset="100%" stop-color="#1c0f3d" />
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#fff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff79c6" />
      <stop offset="50%" stop-color="#b15cff" />
      <stop offset="100%" stop-color="#34d2ff" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#sky)" />

  <!-- Drifting micro stars -->
  <g fill="#fff" opacity="0.55">
    <circle cx="28" cy="40" r="1.2" />
    <circle cx="60" cy="22" r="0.9" />
    <circle cx="100" cy="170" r="1.1" />
    <circle cx="280" cy="150" r="1.0" />
    <circle cx="300" cy="40" r="1.2" />
    <circle cx="190" cy="20" r="0.9" />
    <circle cx="40" cy="160" r="0.7" />
    <circle cx="160" cy="180" r="0.9" />
    <circle cx="220" cy="180" r="0.7" />
    <circle cx="20" cy="100" r="0.8" />
    <circle cx="305" cy="105" r="0.8" />
  </g>

  <!-- Constellation connecting lines -->
  <g fill="none" stroke="url(#line)" stroke-width="1.6" stroke-linecap="round" opacity="0.95">
    <path d="M 70 140 L 130 90 L 175 60 L 220 100 L 265 80 L 230 145 L 170 120 L 110 95" />
  </g>

  <!-- The 8 numbered stars -->
  <g>
    <circle cx="70"  cy="140" r="14" fill="url(#halo)" />
    <circle cx="130" cy="90"  r="14" fill="url(#halo)" />
    <circle cx="175" cy="60"  r="14" fill="url(#halo)" />
    <circle cx="220" cy="100" r="14" fill="url(#halo)" />
    <circle cx="265" cy="80"  r="14" fill="url(#halo)" />
    <circle cx="230" cy="145" r="14" fill="url(#halo)" />
    <circle cx="170" cy="120" r="14" fill="url(#halo)" />
    <circle cx="110" cy="95"  r="14" fill="url(#halo)" />

    <circle cx="70"  cy="140" r="6" fill="#fff" />
    <circle cx="130" cy="90"  r="6" fill="#fff" />
    <circle cx="175" cy="60"  r="6" fill="#fff" />
    <circle cx="220" cy="100" r="6" fill="#fff" />
    <circle cx="265" cy="80"  r="6" fill="#fff" />
    <circle cx="230" cy="145" r="6" fill="#fff" />
    <circle cx="170" cy="120" r="6" fill="#fff" />
    <circle cx="110" cy="95"  r="6" fill="#fff" />
  </g>

  <text x="20" y="32" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#f9f7ff" letter-spacing="0.5">Takımyıldız</text>
</svg>
