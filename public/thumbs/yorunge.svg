<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Yörünge">
  <defs>
    <radialGradient id="space" cx="0.5" cy="0.5" r="0.8">
      <stop offset="0" stop-color="#1a1f3a"/>
      <stop offset="1" stop-color="#0a0b14"/>
    </radialGradient>
    <radialGradient id="well" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffb43a" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#f59e0b" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goal" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="320" height="200" fill="url(#space)"/>

  <!-- Yıldız serpilmesi -->
  <g fill="#ffffff" opacity="0.55">
    <circle cx="28" cy="36" r="0.9"/>
    <circle cx="62" cy="22" r="0.7"/>
    <circle cx="98" cy="46" r="1"/>
    <circle cx="148" cy="18" r="0.6"/>
    <circle cx="186" cy="58" r="0.8"/>
    <circle cx="224" cy="28" r="1.1"/>
    <circle cx="262" cy="50" r="0.7"/>
    <circle cx="294" cy="34" r="0.9"/>
    <circle cx="40" cy="120" r="0.6"/>
    <circle cx="88" cy="158" r="0.8"/>
    <circle cx="124" cy="178" r="0.7"/>
    <circle cx="200" cy="166" r="0.9"/>
    <circle cx="248" cy="140" r="0.7"/>
    <circle cx="290" cy="172" r="1"/>
    <circle cx="14" cy="180" r="0.7"/>
  </g>

  <!-- Yerçekimi kuyusu (sarı) -->
  <circle cx="160" cy="110" r="58" fill="url(#well)"/>
  <circle cx="160" cy="110" r="20" fill="none" stroke="#ffd073" stroke-width="1.5" opacity="0.85"/>
  <circle cx="160" cy="110" r="6" fill="#ffb43a"/>

  <!-- Hedef halka (sağ) -->
  <circle cx="278" cy="110" r="28" fill="url(#goal)"/>
  <circle cx="278" cy="110" r="24" fill="none" stroke="#5be0a6" stroke-width="2" stroke-dasharray="5 4"/>

  <!-- Uydu yörüngesi: kavisli iz -->
  <path d="M 28,72 C 70,76 110,86 140,108 C 170,130 210,148 256,124 C 274,114 278,112 278,110"
        fill="none" stroke="#7ad3ff" stroke-width="1.8" opacity="0.8" stroke-linecap="round"/>

  <!-- Başlangıç noktası -->
  <circle cx="28" cy="72" r="3.5" fill="#7ad3ff"/>
  <circle cx="28" cy="72" r="6" fill="none" stroke="#7ad3ff" stroke-width="1" opacity="0.5"/>

  <!-- Uydu (yolun ucunda) -->
  <circle cx="256" cy="124" r="3.5" fill="#7ad3ff"/>

  <!-- Başlık -->
  <text x="160" y="194" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11" font-weight="600" fill="#dfe4f0" opacity="0.85"
        letter-spacing="2">YÖRÜNGE</text>
</svg>
