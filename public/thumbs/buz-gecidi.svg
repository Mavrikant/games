<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Buz Geçidi">
  <defs>
    <linearGradient id="bg-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1a2a" />
      <stop offset="100%" stop-color="#08111c" />
    </linearGradient>
    <linearGradient id="bg-s3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eead4" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="bg-s2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="bg-s1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg-bg)" />
  <!-- 4x4 board, 28px cells, gap 4, centered -->
  <g transform="translate(88,24)">
    <!-- Row 0 -->
    <rect x="0"   y="0"   width="28" height="28" rx="4" fill="url(#bg-s3)" />
    <rect x="32"  y="0"   width="28" height="28" rx="4" fill="url(#bg-s2)" />
    <rect x="64"  y="0"   width="28" height="28" rx="4" fill="url(#bg-s3)" />
    <rect x="96"  y="0"   width="28" height="28" rx="4" fill="url(#bg-s3)" stroke="#ffd166" stroke-width="2" />
    <!-- Row 1 -->
    <rect x="0"   y="32"  width="28" height="28" rx="4" fill="url(#bg-s2)" />
    <rect x="32"  y="32"  width="28" height="28" rx="4" fill="url(#bg-s1)" />
    <rect x="64"  y="32"  width="28" height="28" rx="4" fill="rgba(15,23,42,0.55)" />
    <rect x="96"  y="32"  width="28" height="28" rx="4" fill="url(#bg-s2)" />
    <!-- Row 2 -->
    <rect x="0"   y="64"  width="28" height="28" rx="4" fill="url(#bg-s3)" />
    <rect x="32"  y="64"  width="28" height="28" rx="4" fill="url(#bg-s2)" />
    <rect x="64"  y="64"  width="28" height="28" rx="4" fill="url(#bg-s3)" />
    <rect x="96"  y="64"  width="28" height="28" rx="4" fill="url(#bg-s1)" />
    <!-- Row 3 -->
    <rect x="0"   y="96"  width="28" height="28" rx="4" fill="url(#bg-s3)" stroke="#ffffff" stroke-width="2" />
    <rect x="32"  y="96"  width="28" height="28" rx="4" fill="url(#bg-s2)" />
    <rect x="64"  y="96"  width="28" height="28" rx="4" fill="rgba(15,23,42,0.55)" />
    <rect x="96"  y="96"  width="28" height="28" rx="4" fill="url(#bg-s3)" />

    <!-- Step counts on a few cells -->
    <g font-family="ui-sans-serif, system-ui" font-size="13" font-weight="700" fill="rgba(255,255,255,0.92)" text-anchor="middle">
      <text x="14"  y="116">3</text>
      <text x="46"  y="116">2</text>
      <text x="110" y="116">3</text>
      <text x="110" y="20">3</text>
      <text x="46"  y="52">1</text>
      <text x="14"  y="20">3</text>
    </g>

    <!-- Goal flag -->
    <g transform="translate(102,4)">
      <text font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#ffd166">⚑</text>
    </g>

    <!-- Player pawn on start (bottom-left) -->
    <circle cx="14" cy="110" r="9" fill="#ffffff" />
    <circle cx="14" cy="110" r="9" fill="none" stroke="#0ea5e9" stroke-width="1.5" />

    <!-- Suggested path arrow -->
    <path d="M14 110 L46 110 L46 78 L78 78 L78 14 L110 14"
      fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
      stroke-dasharray="2 6" opacity="0.55" />
  </g>
  <text x="20" y="178" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#e4e4ed">Buz Geçidi</text>
  <text x="112" y="178" font-family="ui-sans-serif, system-ui" font-size="10" font-weight="500" fill="#5a6473">çatlayan buzda yol bul</text>
</svg>
