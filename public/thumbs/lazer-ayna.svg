<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Lazer ve Ayna">
  <defs>
    <linearGradient id="la-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0f1a" />
      <stop offset="100%" stop-color="#06080f" />
    </linearGradient>
    <linearGradient id="la-beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff5050" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#ff8080" stop-opacity="0.95" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" rx="14" fill="url(#la-bg)" />
  <rect x="1" y="1" width="318" height="198" rx="13" stroke="#171a21" fill="none" />
  <!-- 5x4 grid (centered) -->
  <g transform="translate(80,50)">
    <!-- grid background -->
    <rect x="0" y="0" width="160" height="128" fill="#0f131e" stroke="#1c2231" rx="2" />
    <!-- grid lines -->
    <g stroke="#1c2231" stroke-width="1">
      <line x1="32" y1="0" x2="32" y2="128" />
      <line x1="64" y1="0" x2="64" y2="128" />
      <line x1="96" y1="0" x2="96" y2="128" />
      <line x1="128" y1="0" x2="128" y2="128" />
      <line x1="0" y1="32" x2="160" y2="32" />
      <line x1="0" y1="64" x2="160" y2="64" />
      <line x1="0" y1="96" x2="160" y2="96" />
    </g>
    <!-- laser path highlight -->
    <rect x="0" y="64" width="96" height="32" fill="rgba(255,80,80,0.10)" />
    <rect x="96" y="0" width="32" height="96" fill="rgba(255,80,80,0.10)" />
    <!-- mirrors -->
    <line x1="100" y1="92" x2="124" y2="68" stroke="#60b8e8" stroke-width="3" stroke-linecap="round" />
    <!-- laser beam path -->
    <path d="M -10,80 L 112,80 L 112,16" fill="none" stroke="url(#la-beam)" stroke-width="2.5" stroke-linecap="round" />
    <!-- target star (top right area, after reflection) -->
    <text x="112" y="22" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="800" fill="#f0c040">★</text>
    <!-- secondary target (dim) -->
    <text x="144" y="118" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="18" fill="#3a4258">★</text>
  </g>
  <!-- laser source -->
  <text x="74" y="135" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="800" fill="#ff5050">▶</text>
  <text x="20" y="36" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="800" fill="#e4e4ed">Lazer &amp; Ayna</text>
  <text x="300" y="194" text-anchor="end" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="600" fill="#5a6473" letter-spacing="0.05em">OPTİK · BULMACA</text>
</svg>
