<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Kapan">
  <defs>
    <linearGradient id="kpbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f2e" />
      <stop offset="100%" stop-color="#0a0d14" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#kpbg)" />
  <!-- subtle grid -->
  <g stroke="#222a3a" stroke-width="1">
    <line x1="40" y1="40" x2="280" y2="40" />
    <line x1="40" y1="80" x2="280" y2="80" />
    <line x1="40" y1="120" x2="280" y2="120" />
    <line x1="40" y1="160" x2="280" y2="160" />
    <line x1="80" y1="20" x2="80" y2="180" />
    <line x1="120" y1="20" x2="120" y2="180" />
    <line x1="160" y1="20" x2="160" y2="180" />
    <line x1="200" y1="20" x2="200" y2="180" />
    <line x1="240" y1="20" x2="240" y2="180" />
  </g>
  <!-- fresh barriers (bright) -->
  <g fill="#fb923c" rx="4">
    <rect x="124" y="44" width="32" height="32" rx="6" />
    <rect x="164" y="44" width="32" height="32" rx="6" />
    <rect x="204" y="84" width="32" height="32" rx="6" />
    <rect x="84" y="84" width="32" height="32" rx="6" />
    <rect x="124" y="124" width="32" height="32" rx="6" />
    <rect x="164" y="124" width="32" height="32" rx="6" />
  </g>
  <!-- crumbling barrier (dim) -->
  <rect x="44" y="124" width="28" height="28" rx="5" fill="#6e5240" opacity="0.85" />
  <rect x="244" y="44" width="28" height="28" rx="5" fill="#6e5240" opacity="0.85" />
  <!-- rabbit in center -->
  <g transform="translate(160 100)">
    <ellipse cx="-7" cy="-22" rx="4" ry="12" fill="#f1f5f9" transform="rotate(-12)" />
    <ellipse cx="7" cy="-22" rx="4" ry="12" fill="#f1f5f9" transform="rotate(12)" />
    <circle cx="0" cy="2" r="16" fill="#f1f5f9" />
    <circle cx="-5" cy="-2" r="2" fill="#101418" />
    <circle cx="5" cy="-2" r="2" fill="#101418" />
    <circle cx="0" cy="6" r="2" fill="#f472b6" />
  </g>
  <text x="20" y="34" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4e4ed">Kapan</text>
</svg>
