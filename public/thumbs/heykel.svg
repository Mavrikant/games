<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Heykel">
  <defs>
    <linearGradient id="hk-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1820" />
      <stop offset="100%" stop-color="#06090e" />
    </linearGradient>
    <radialGradient id="hk-eye-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff7a7a" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#ff7a7a" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="hk-closed-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#65e0a6" stop-opacity="0.40" />
      <stop offset="100%" stop-color="#65e0a6" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#hk-bg)" />

  <!-- Track / path -->
  <rect x="120" y="35" width="80" height="150" fill="rgba(120,160,200,0.05)" stroke="rgba(160,200,220,0.10)" stroke-width="1" />
  <g stroke="rgba(120,160,200,0.10)" stroke-width="1">
    <line x1="150" y1="35" x2="150" y2="185" />
    <line x1="170" y1="35" x2="170" y2="185" />
  </g>

  <!-- Finish line -->
  <line x1="120" y1="60" x2="200" y2="60" stroke="#65e0a6" stroke-width="2" stroke-dasharray="6,4" opacity="0.85" />
  <text x="120" y="52" font-family="ui-sans-serif, system-ui" font-size="9" fill="#65e0a6" letter-spacing="0.1em">BİTİŞ</text>

  <!-- Start line -->
  <line x1="120" y1="175" x2="200" y2="175" stroke="#9aa6b3" stroke-width="1" opacity="0.45" />

  <!-- Watcher (open eye, red phase) -->
  <circle cx="160" cy="40" r="34" fill="url(#hk-eye-glow)" />
  <circle cx="160" cy="40" r="22" fill="#3a2020" stroke="#ff7a7a" stroke-width="2.5" />
  <ellipse cx="160" cy="41" rx="14" ry="10" fill="#e8f5f8" />
  <circle cx="162" cy="42" r="5" fill="#0a0f14" />
  <circle cx="160.5" cy="40.5" r="1.6" fill="#fff" />

  <!-- Player figure (frozen, mid-track) -->
  <ellipse cx="160" cy="138" rx="10" ry="3" fill="rgba(0,0,0,0.45)" />
  <circle cx="160" cy="128" r="10" fill="#dde5e8" stroke="#0a0b0e" stroke-width="1.5" />
  <line x1="171" y1="121" x2="176" y2="121" stroke="rgba(220,240,250,0.9)" stroke-width="1" />
  <line x1="173.5" y1="118" x2="173.5" y2="124" stroke="rgba(220,240,250,0.9)" stroke-width="1" />

  <!-- Small companion: closed-eye preview (corner, for context) -->
  <circle cx="40" cy="42" r="18" fill="url(#hk-closed-glow)" />
  <circle cx="40" cy="42" r="13" fill="#1f3a2c" stroke="#65e0a6" stroke-width="1.8" />
  <path d="M30 43 Q40 47 50 43" stroke="#3a4751" stroke-width="2" fill="none" stroke-linecap="round" />
  <text x="40" y="76" font-family="ui-sans-serif, system-ui" font-size="8" fill="#65e0a6" text-anchor="middle" letter-spacing="0.1em">KAPALI</text>

  <circle cx="280" cy="42" r="18" fill="url(#hk-eye-glow)" />
  <circle cx="280" cy="42" r="13" fill="#3a2020" stroke="#ff7a7a" stroke-width="1.8" />
  <ellipse cx="280" cy="42" rx="8" ry="5" fill="#e8f5f8" />
  <circle cx="280" cy="42" r="3" fill="#0a0f14" />
  <text x="280" y="76" font-family="ui-sans-serif, system-ui" font-size="8" fill="#ff7a7a" text-anchor="middle" letter-spacing="0.1em">AÇIK</text>

  <!-- Title -->
  <text x="160" y="195" font-family="ui-sans-serif, system-ui" font-size="11" fill="#9bb8c4" text-anchor="middle" letter-spacing="0.18em">H E Y K E L</text>
</svg>
