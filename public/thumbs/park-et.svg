<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Park Et">
  <defs>
    <linearGradient id="pe-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2f3a" />
      <stop offset="100%" stop-color="#1c2028" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#pe-bg)" />
  <!-- Faint asphalt grid -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="40" x2="320" y2="40" />
    <line x1="0" y1="80" x2="320" y2="80" />
    <line x1="0" y1="120" x2="320" y2="120" />
    <line x1="0" y1="160" x2="320" y2="160" />
    <line x1="80" y1="0" x2="80" y2="200" />
    <line x1="160" y1="0" x2="160" y2="200" />
    <line x1="240" y1="0" x2="240" y2="200" />
  </g>
  <!-- Parked obstacle car (left) -->
  <g transform="translate(118 138)">
    <rect x="-16" y="-30" width="32" height="60" rx="3" fill="#6f7e95" stroke="#000" stroke-opacity="0.45" />
    <rect x="-12" y="-22" width="24" height="8" fill="#bcd4f0" fill-opacity="0.5" />
  </g>
  <!-- Parked obstacle car (right) -->
  <g transform="translate(232 138)">
    <rect x="-16" y="-30" width="32" height="60" rx="3" fill="#7d8aa0" stroke="#000" stroke-opacity="0.45" />
    <rect x="-12" y="-22" width="24" height="8" fill="#bcd4f0" fill-opacity="0.5" />
  </g>
  <!-- Target parking spot (between) -->
  <g transform="translate(175 138)" stroke="#34d399" stroke-width="2.2" stroke-dasharray="6 4" fill="rgba(52,211,153,0.20)">
    <rect x="-22" y="-34" width="44" height="68" rx="2" />
  </g>
  <text x="175" y="144" font-family="ui-sans-serif, system-ui" font-size="22" font-weight="700" fill="#34d399" text-anchor="middle">P</text>
  <!-- Trajectory arc -->
  <path d="M70,70 Q120,55 170,95" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="3 4" />
  <!-- Player car (mid-turn, headed toward spot) -->
  <g transform="translate(105 75) rotate(28)">
    <rect x="-26" y="-14" width="52" height="28" rx="3" fill="#e94e3a" stroke="#7a1a10" stroke-width="1.5" />
    <rect x="12" y="-10" width="6" height="20" fill="#bedcff" fill-opacity="0.85" />
    <rect x="23" y="-12" width="3" height="4" fill="#fff7c2" />
    <rect x="23" y="8" width="3" height="4" fill="#fff7c2" />
  </g>
  <text x="14" y="34" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4e4ed">Park Et</text>
</svg>
