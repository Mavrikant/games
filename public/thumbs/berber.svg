<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Berber">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1320" />
      <stop offset="60%" stop-color="#0a0f1a" />
      <stop offset="100%" stop-color="#060a14" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bgB)" />
  <!-- chair -->
  <rect x="90" y="156" width="140" height="22" fill="#1a2030" />
  <rect x="90" y="156" width="140" height="4" fill="#252d40" />
  <rect x="152" y="142" width="16" height="14" fill="#16192a" />
  <!-- head -->
  <ellipse cx="160" cy="100" rx="50" ry="34" fill="#e7c39a" />
  <rect x="142" y="130" width="36" height="20" fill="#cba37e" />
  <!-- eyes & mouth -->
  <circle cx="148" cy="100" r="2" fill="#1a1208" />
  <circle cx="172" cy="100" r="2" fill="#1a1208" />
  <path d="M152 112 q8 6 16 0" stroke="#1a1208" stroke-width="1.5" fill="none" />
  <!-- hair strands (uneven, mid-cut) -->
  <g stroke="#3b2410" stroke-width="3" stroke-linecap="round">
    <line x1="120" y1="78" x2="120" y2="158" />
    <line x1="128" y1="78" x2="128" y2="170" />
    <line x1="136" y1="78" x2="136" y2="120" />
    <line x1="144" y1="78" x2="144" y2="130" />
    <line x1="152" y1="78" x2="152" y2="100" />
    <line x1="160" y1="78" x2="160" y2="95" />
    <line x1="168" y1="78" x2="168" y2="98" />
    <line x1="176" y1="78" x2="176" y2="118" />
    <line x1="184" y1="78" x2="184" y2="145" />
    <line x1="192" y1="78" x2="192" y2="160" />
    <line x1="200" y1="78" x2="200" y2="165" />
  </g>
  <!-- target silhouette (dashed blue) -->
  <polyline
    points="120,100 128,100 136,100 144,100 152,100 160,100 168,100 176,100 184,100 192,100 200,100"
    fill="none"
    stroke="#7dd3fc"
    stroke-width="1.8"
    stroke-dasharray="4 3"
    opacity="0.85"
  />
  <!-- scissor cut line preview (red dashed) -->
  <line x1="60" y1="60" x2="240" y2="74" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 4" />
  <circle cx="240" cy="74" r="4" fill="#ef4444" />
  <!-- scissors icon -->
  <g transform="translate(258 28) rotate(20)">
    <circle cx="0" cy="0" r="7" fill="none" stroke="#cbd5e1" stroke-width="2" />
    <circle cx="0" cy="14" r="7" fill="none" stroke="#cbd5e1" stroke-width="2" />
    <line x1="6" y1="4" x2="28" y2="20" stroke="#cbd5e1" stroke-width="2.5" />
    <line x1="6" y1="10" x2="28" y2="-6" stroke="#cbd5e1" stroke-width="2.5" />
  </g>
  <!-- title -->
  <text x="20" y="186" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#e4e4ed">Berber</text>
</svg>
