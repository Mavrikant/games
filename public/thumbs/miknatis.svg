<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Mıknatıs">
  <defs>
    <linearGradient id="mk-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1830" />
      <stop offset="100%" stop-color="#08070f" />
    </linearGradient>
    <radialGradient id="mk-field" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#mk-bg)" />
  <circle cx="160" cy="160" r="78" fill="url(#mk-field)" />

  <!-- target ring (goal) at top -->
  <circle cx="160" cy="40" r="22" fill="none" stroke="#10b981" stroke-width="3" stroke-dasharray="6 4" />
  <circle cx="160" cy="40" r="12" fill="none" stroke="#10b981" stroke-opacity="0.4" stroke-width="1.5" />

  <!-- shavings being drawn toward magnet -->
  <circle cx="100" cy="120" r="6" fill="#10b981" />
  <circle cx="130" cy="105" r="6" fill="#10b981" />
  <circle cx="190" cy="110" r="6" fill="#10b981" />
  <circle cx="215" cy="130" r="6" fill="#10b981" />
  <!-- decoys -->
  <circle cx="78" cy="155" r="6" fill="#ef4444" />
  <circle cx="220" cy="170" r="6" fill="#3b82f6" />
  <circle cx="105" cy="175" r="6" fill="#fbbf24" />
  <circle cx="240" cy="100" r="6" fill="#3b82f6" />
  <circle cx="70" cy="90" r="6" fill="#fbbf24" />

  <!-- attraction lines -->
  <g stroke="#a855f7" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="3 3" fill="none">
    <line x1="100" y1="120" x2="158" y2="158" />
    <line x1="130" y1="105" x2="158" y2="158" />
    <line x1="190" y1="110" x2="162" y2="158" />
    <line x1="215" y1="130" x2="162" y2="158" />
  </g>

  <!-- magnet (horseshoe-styled) -->
  <g transform="translate(160 160)">
    <rect x="-22" y="-14" width="22" height="28" fill="#dc2626" rx="3" />
    <rect x="0" y="-14" width="22" height="28" fill="#374151" rx="3" />
    <rect x="-2.5" y="-14" width="5" height="28" fill="#f1f5f9" />
    <text x="-11" y="4" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">N</text>
    <text x="11" y="4" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">S</text>
  </g>

  <text x="20" y="36" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4e4ed">Mıknatıs</text>
</svg>
