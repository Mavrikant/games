<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Helva Çekme">
  <defs>
    <linearGradient id="hc-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1410" />
      <stop offset="100%" stop-color="#0a0807" />
    </linearGradient>
    <linearGradient id="hc-strand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d9772a" />
      <stop offset="50%" stop-color="#f4ecd8" />
      <stop offset="100%" stop-color="#d9772a" />
    </linearGradient>
    <linearGradient id="hc-bench" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#463224" />
      <stop offset="100%" stop-color="#1c1308" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#hc-bg)" />
  <rect x="0" y="150" width="320" height="50" fill="url(#hc-bench)" />
  <!-- left hook -->
  <rect x="44" y="82" width="10" height="44" fill="#3b3b42" />
  <path d="M49 82 q14 -8 18 6 q3 14 -10 16" stroke="#cfd2d8" stroke-width="5" stroke-linecap="round" fill="none" />
  <!-- right hook -->
  <rect x="266" y="82" width="10" height="44" fill="#3b3b42" />
  <path d="M271 82 q-14 -8 -18 6 q-3 14 10 16" stroke="#cfd2d8" stroke-width="5" stroke-linecap="round" fill="none" />
  <!-- strand: stretched, dipping in the middle -->
  <path d="M52 95 Q160 145 268 95" stroke="url(#hc-strand)" stroke-width="22" stroke-linecap="round" fill="none" />
  <!-- twisted layer hints -->
  <path d="M52 90 Q160 138 268 90" stroke="rgba(255,255,255,0.35)" stroke-width="4" stroke-linecap="round" fill="none" />
  <path d="M52 100 Q160 152 268 100" stroke="rgba(0,0,0,0.25)" stroke-width="4" stroke-linecap="round" fill="none" />
  <!-- air bubbles -->
  <g fill="rgba(255,255,255,0.7)">
    <circle cx="120" cy="118" r="2.2" />
    <circle cx="150" cy="124" r="2.6" />
    <circle cx="180" cy="120" r="2.0" />
    <circle cx="210" cy="115" r="2.4" />
  </g>
  <text x="20" y="36" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#f4ecd8">Helva Çekme</text>
</svg>
