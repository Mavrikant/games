<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Hattat">
  <defs>
    <linearGradient id="ht-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4e9cf" />
      <stop offset="100%" stop-color="#d8c79e" />
    </linearGradient>
    <radialGradient id="ht-vign" cx="0.5" cy="0.5" r="0.7">
      <stop offset="60%" stop-color="rgba(244,233,207,0)" />
      <stop offset="100%" stop-color="rgba(80,60,28,0.32)" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ht-bg)" />
  <rect width="320" height="200" fill="url(#ht-vign)" />
  <!-- Faint paper specks -->
  <g fill="#8a6f3c" fill-opacity="0.10">
    <rect x="40" y="30" width="2" height="2" />
    <rect x="98" y="62" width="2" height="2" />
    <rect x="220" y="40" width="2" height="2" />
    <rect x="58" y="148" width="2" height="2" />
    <rect x="282" y="170" width="2" height="2" />
    <rect x="180" y="120" width="2" height="2" />
  </g>
  <!-- Corridor (wide soft band) -->
  <path d="M 38 160 Q 110 30 220 70 T 290 150"
        fill="none" stroke="#8a6f3c" stroke-opacity="0.16" stroke-width="28" stroke-linecap="round" />
  <!-- Corridor (inner highlight) -->
  <path d="M 38 160 Q 110 30 220 70 T 290 150"
        fill="none" stroke="#c4a86a" stroke-opacity="0.42" stroke-width="20" stroke-linecap="round" />
  <!-- Centerline dashed guide -->
  <path d="M 38 160 Q 110 30 220 70 T 290 150"
        fill="none" stroke="#3c2d14" stroke-opacity="0.22" stroke-width="1" stroke-dasharray="4 6" />
  <!-- Ink stroke (in-corridor, varying width) -->
  <path d="M 40 159 Q 110 32 200 72"
        fill="none" stroke="#1a1410" stroke-opacity="0.92" stroke-width="6" stroke-linecap="round" />
  <path d="M 200 72 Q 240 92 258 110"
        fill="none" stroke="#1a1410" stroke-opacity="0.92" stroke-width="5" stroke-linecap="round" />
  <!-- Start dot (green) -->
  <circle cx="38" cy="160" r="11" fill="#34d399" />
  <text x="38" y="164" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="700"
        text-anchor="middle" fill="#0f3823">B</text>
  <!-- End dot (gold) -->
  <circle cx="290" cy="150" r="11" fill="#d4af37" />
  <text x="290" y="154" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="700"
        text-anchor="middle" fill="#2c1f06">S</text>
  <!-- Title -->
  <text x="20" y="28" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700"
        fill="#2c1f06">Hattat</text>
</svg>
