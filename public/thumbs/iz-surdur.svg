<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="İz Sürdür">
  <defs>
    <linearGradient id="is-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0b0e" />
      <stop offset="100%" stop-color="#11151d" />
    </linearGradient>
    <linearGradient id="is-vis" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd3fc" />
      <stop offset="100%" stop-color="#7dd3fc" />
    </linearGradient>
  </defs>

  <rect width="320" height="200" fill="url(#is-bg)" />

  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
    <line x1="20" y1="50"  x2="300" y2="50" />
    <line x1="20" y1="100" x2="300" y2="100" />
    <line x1="20" y1="150" x2="300" y2="150" />
  </g>

  <!-- Frame -->
  <rect x="20" y="25" width="280" height="150" fill="none" stroke="rgba(255,255,255,0.16)" />

  <!-- Visible portion of the curve (bright cyan): a damped sine -->
  <path
    d="M 20,100
       C 35,55 55,55 70,100
       C 85,140 105,140 120,105
       C 132,80 145,82 155,98
       C 162,108 168,110 172,108"
    fill="none" stroke="#7dd3fc" stroke-width="3" stroke-linecap="round" />

  <!-- Faded grey continuation (the part the player must predict) -->
  <path
    d="M 172,108
       C 180,107 188,104 196,100
       C 210,93 222,92 240,93"
    fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2" stroke-dasharray="4 4" />

  <!-- Dot at end of visible portion -->
  <circle cx="172" cy="108" r="5" fill="#fde68a" />

  <!-- Target line (gold) -->
  <line x1="240" y1="25" x2="240" y2="175" stroke="#facc15" stroke-width="2" />
  <text x="240" y="20" fill="#facc15" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">hedef</text>

  <!-- Guess marker (pink) -->
  <line x1="226" y1="106" x2="254" y2="106" stroke="#f472b6" stroke-width="2.5" stroke-linecap="round" />

  <!-- True crossing dot (cyan) -->
  <circle cx="240" cy="93" r="5" fill="#22d3ee" stroke="#0b0e14" stroke-width="1" />

  <!-- Title text -->
  <text x="160" y="195" fill="rgba(255,255,255,0.32)" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" letter-spacing="2">İZ SÜRDÜR</text>
</svg>
