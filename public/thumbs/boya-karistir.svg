<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Boya Karıştır">
  <defs>
    <linearGradient id="bk-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22" />
      <stop offset="100%" stop-color="#0a0b0e" />
    </linearGradient>
    <radialGradient id="bk-mix" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#e08a4a" />
      <stop offset="55%" stop-color="#9a5f5a" />
      <stop offset="100%" stop-color="#5a4060" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bk-bg)" />

  <!-- target swatch (left) -->
  <g>
    <circle cx="100" cy="86" r="42" fill="#d97a3b" />
    <circle cx="100" cy="86" r="42" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2" />
    <text x="100" y="146" text-anchor="middle" fill="#9aa4b2" font-family="system-ui,-apple-system,Inter,sans-serif" font-size="11" letter-spacing="1.2">HEDEF</text>
  </g>

  <!-- mix swatch (right) -->
  <g>
    <circle cx="220" cy="86" r="42" fill="url(#bk-mix)" />
    <circle cx="220" cy="86" r="42" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2" />
    <text x="220" y="146" text-anchor="middle" fill="#9aa4b2" font-family="system-ui,-apple-system,Inter,sans-serif" font-size="11" letter-spacing="1.2">KARIŞIM</text>
  </g>

  <!-- three paint pots at bottom -->
  <g>
    <circle cx="80" cy="178" r="13" fill="#de3834" />
    <circle cx="80" cy="178" r="13" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" />
  </g>
  <g>
    <circle cx="160" cy="178" r="13" fill="#f0d04c" />
    <circle cx="160" cy="178" r="13" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" />
  </g>
  <g>
    <circle cx="240" cy="178" r="13" fill="#3c5cc4" />
    <circle cx="240" cy="178" r="13" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" />
  </g>

  <!-- arc lines suggesting drops moving toward mix circle -->
  <g stroke="rgba(170,180,196,0.32)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="3 3">
    <path d="M80 165 Q 140 130 200 110" />
    <path d="M160 165 Q 190 140 215 116" />
    <path d="M240 165 Q 235 140 230 116" />
  </g>
</svg>
