<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" aria-label="Nüans">
  <rect width="480" height="300" fill="#0e1016"/>
  <defs>
    <pattern id="hatch" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="7" height="14" fill="#2a2c33"/>
      <rect x="7" width="7" height="14" fill="#1f2127"/>
    </pattern>
  </defs>
  <g transform="translate(72 32)">
    <rect width="156" height="120" rx="14" fill="rgb(220, 95, 60)"/>
    <rect x="170" width="156" height="120" rx="14" fill="url(#hatch)"/>
    <text x="78" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#e7e9ee" letter-spacing="1.2">HEDEF</text>
    <text x="248" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#e7e9ee" letter-spacing="1.2">EZBERDE</text>
  </g>
  <g transform="translate(60 178)">
    <rect width="360" height="14" rx="7" fill="none" stroke="#2a2c33" stroke-width="1"/>
    <rect width="360" height="14" rx="7" fill="url(#rGrad)"/>
    <circle cx="270" cy="7" r="11" fill="#fff" stroke="#0a0b0e" stroke-width="2"/>

    <rect y="26" width="360" height="14" rx="7" fill="none" stroke="#2a2c33" stroke-width="1"/>
    <rect y="26" width="360" height="14" rx="7" fill="url(#gGrad)"/>
    <circle cx="130" cy="33" r="11" fill="#fff" stroke="#0a0b0e" stroke-width="2"/>

    <rect y="52" width="360" height="14" rx="7" fill="none" stroke="#2a2c33" stroke-width="1"/>
    <rect y="52" width="360" height="14" rx="7" fill="url(#bGrad)"/>
    <circle cx="90" cy="59" r="11" fill="#fff" stroke="#0a0b0e" stroke-width="2"/>
  </g>
  <defs>
    <linearGradient id="rGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="100%" stop-color="#ff2a2a"/>
    </linearGradient>
    <linearGradient id="gGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="100%" stop-color="#2aff2a"/>
    </linearGradient>
    <linearGradient id="bGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="100%" stop-color="#2a64ff"/>
    </linearGradient>
  </defs>
  <text x="240" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#e7e9ee">Nüans</text>
</svg>
