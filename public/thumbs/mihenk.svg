<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Mihenk">
  <defs>
    <linearGradient id="mh-wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2516" />
      <stop offset="55%" stop-color="#2a1a0e" />
      <stop offset="100%" stop-color="#1a1008" />
    </linearGradient>
    <linearGradient id="mh-stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1a18" />
      <stop offset="50%" stop-color="#0c0a08" />
      <stop offset="100%" stop-color="#070605" />
    </linearGradient>
    <radialGradient id="mh-gold" cx="0.35" cy="0.32" r="0.9">
      <stop offset="0%" stop-color="#fbe48a" />
      <stop offset="55%" stop-color="#f5cf42" />
      <stop offset="100%" stop-color="#a47915" />
    </radialGradient>
  </defs>
  <!-- Counter background -->
  <rect width="320" height="200" fill="url(#mh-wood)" />

  <!-- Wood grain -->
  <g stroke="#ffffff" stroke-opacity="0.04" fill="none" stroke-width="1">
    <path d="M0 32 Q 90 35 180 28 T 320 33" />
    <path d="M0 64 Q 90 60 180 66 T 320 62" />
    <path d="M0 96 Q 90 92 180 100 T 320 95" />
    <path d="M0 130 Q 90 134 180 126 T 320 132" />
    <path d="M0 164 Q 90 160 180 168 T 320 162" />
  </g>

  <!-- Mihenk stone slab -->
  <rect x="34" y="74" width="200" height="62" rx="6" fill="url(#mh-stone)" stroke="#5c4222" stroke-width="1.5" />
  <text x="44" y="86" fill="#dcc8a0" fill-opacity="0.55" font-family="system-ui, sans-serif" font-size="9" font-weight="600">MİHENK TAŞI</text>

  <!-- Faint slate scratches -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1">
    <line x1="50" y1="118" x2="76" y2="120" />
    <line x1="90" y1="105" x2="124" y2="106" />
    <line x1="148" y1="124" x2="180" y2="123" />
  </g>

  <!-- The yellow gold streak: smooth uniform -->
  <g fill="#f5d04a">
    <circle cx="56" cy="106" r="1.6" />
    <circle cx="62" cy="104" r="1.4" />
    <circle cx="68" cy="106" r="1.7" />
    <circle cx="74" cy="105" r="1.5" />
    <circle cx="80" cy="106" r="1.6" />
    <circle cx="86" cy="104" r="1.4" />
    <circle cx="92" cy="106" r="1.6" />
    <circle cx="98" cy="105" r="1.5" />
    <circle cx="104" cy="106" r="1.7" />
    <circle cx="110" cy="104" r="1.5" />
    <circle cx="116" cy="106" r="1.4" />
    <circle cx="122" cy="105" r="1.6" />
    <circle cx="128" cy="106" r="1.7" />
    <circle cx="134" cy="105" r="1.5" />
    <circle cx="140" cy="106" r="1.6" />
    <circle cx="58" cy="110" r="1.3" />
    <circle cx="74" cy="111" r="1.2" />
    <circle cx="92" cy="110" r="1.3" />
    <circle cx="112" cy="110" r="1.2" />
    <circle cx="132" cy="110" r="1.4" />
  </g>

  <!-- Below the gold streak, a fake (gilded) streak with bronze flecks -->
  <g fill="#eac246">
    <circle cx="55" cy="124" r="1.5" />
    <circle cx="63" cy="123" r="1.4" />
    <circle cx="71" cy="124" r="1.6" />
    <circle cx="79" cy="123" r="1.3" />
    <circle cx="87" cy="124" r="1.5" />
    <circle cx="95" cy="123" r="1.4" />
    <circle cx="103" cy="124" r="1.5" />
    <circle cx="111" cy="123" r="1.6" />
    <circle cx="119" cy="124" r="1.4" />
    <circle cx="127" cy="123" r="1.5" />
    <circle cx="135" cy="124" r="1.6" />
  </g>
  <g fill="#8a5b1f">
    <circle cx="60" cy="126" r="1.1" />
    <circle cx="72" cy="125" r="1.0" />
    <circle cx="88" cy="126" r="1.2" />
    <circle cx="106" cy="125" r="1.1" />
    <circle cx="122" cy="126" r="1.0" />
    <circle cx="134" cy="125" r="1.1" />
  </g>

  <!-- Velvet pad / item rest on the right -->
  <ellipse cx="276" cy="138" rx="36" ry="6" fill="#000" fill-opacity="0.45" />
  <ellipse cx="276" cy="138" rx="36" ry="6" fill="none" stroke="#b48a50" stroke-opacity="0.25" />

  <!-- Gold coin (real gold) to the right -->
  <circle cx="276" cy="116" r="22" fill="url(#mh-gold)" stroke="#000" stroke-opacity="0.45" stroke-width="1.4" />
  <circle cx="276" cy="116" r="16" fill="none" stroke="#000" stroke-opacity="0.28" />
  <!-- 8-point star -->
  <g stroke="#000" stroke-opacity="0.32" fill="none">
    <polygon points="276,104 279,113 288,116 279,119 276,128 273,119 264,116 273,113" />
  </g>
  <!-- Shine -->
  <ellipse cx="270" cy="108" rx="4.5" ry="2.6" fill="#fff" fill-opacity="0.55" transform="rotate(-30 270 108)" />

  <!-- Title strip top -->
  <rect x="0" y="0" width="320" height="22" fill="#000" fill-opacity="0.5" />
  <text x="14" y="14" fill="#cfb98a" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="0.1em">MİHENK</text>

  <!-- Timer bar -->
  <rect x="120" y="9" width="190" height="8" fill="#ffffff" fill-opacity="0.08" />
  <rect x="120" y="9" width="130" height="8" fill="#5fb672" />
  <rect x="120" y="9" width="190" height="8" fill="none" stroke="#ffffff" stroke-opacity="0.18" />

  <!-- Verdict pill bottom -->
  <rect x="34" y="160" width="84" height="24" rx="5" fill="#1f9d57" />
  <text x="76" y="176" fill="#fff" font-family="system-ui, sans-serif" font-size="12" font-weight="800" text-anchor="middle" letter-spacing="0.1em">SAF</text>
  <rect x="124" y="160" width="84" height="24" rx="5" fill="#c0392b" />
  <text x="166" y="176" fill="#fff" font-family="system-ui, sans-serif" font-size="12" font-weight="800" text-anchor="middle" letter-spacing="0.1em">SAHTE</text>
</svg>
