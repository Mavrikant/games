<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Water Sort">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c2a" />
      <stop offset="100%" stop-color="#0a0a14" />
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.10)" />
      <stop offset="40%" stop-color="rgba(255,255,255,0.04)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0.18)" />
    </linearGradient>
    <linearGradient id="meniscus" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)" />

  <!-- Tube 1: red/yellow/red/green (mixed) -->
  <g transform="translate(40, 40)">
    <clipPath id="t1">
      <path d="M 0 0 L 28 0 L 28 110 Q 28 120 18 120 L 10 120 Q 0 120 0 110 Z" />
    </clipPath>
    <g clip-path="url(#t1)">
      <rect x="0" y="80" width="28" height="40" fill="#22c55e" />
      <rect x="0" y="55" width="28" height="25" fill="#ef4444" />
      <rect x="0" y="30" width="28" height="25" fill="#fde047" />
      <rect x="0" y="0" width="28" height="30" fill="#ef4444" />
      <rect x="0" y="0" width="28" height="3" fill="url(#meniscus)" />
    </g>
    <path d="M 0 0 L 28 0 L 28 110 Q 28 120 18 120 L 10 120 Q 0 120 0 110 Z" fill="url(#glass)" stroke="#2f3540" stroke-width="1.5" />
    <rect x="-3" y="-2" width="34" height="4" fill="#2f3540" rx="2" />
  </g>

  <!-- Tube 2: green/red/yellow/blue (mixed) -->
  <g transform="translate(100, 40)">
    <clipPath id="t2">
      <path d="M 0 0 L 28 0 L 28 110 Q 28 120 18 120 L 10 120 Q 0 120 0 110 Z" />
    </clipPath>
    <g clip-path="url(#t2)">
      <rect x="0" y="90" width="28" height="30" fill="#3b82f6" />
      <rect x="0" y="60" width="28" height="30" fill="#fde047" />
      <rect x="0" y="30" width="28" height="30" fill="#ef4444" />
      <rect x="0" y="0" width="28" height="30" fill="#22c55e" />
      <rect x="0" y="0" width="28" height="3" fill="url(#meniscus)" />
    </g>
    <path d="M 0 0 L 28 0 L 28 110 Q 28 120 18 120 L 10 120 Q 0 120 0 110 Z" fill="url(#glass)" stroke="#2f3540" stroke-width="1.5" />
    <rect x="-3" y="-2" width="34" height="4" fill="#2f3540" rx="2" />
  </g>

  <!-- Tube 3: pouring from above into tube 4 -->
  <g transform="translate(160, 28) rotate(28 14 120)">
    <clipPath id="t3">
      <path d="M 0 0 L 28 0 L 28 110 Q 28 120 18 120 L 10 120 Q 0 120 0 110 Z" />
    </clipPath>
    <g clip-path="url(#t3)">
      <rect x="0" y="60" width="28" height="60" fill="#a855f7" />
      <rect x="0" y="55" width="28" height="5" fill="url(#meniscus)" />
    </g>
    <path d="M 0 0 L 28 0 L 28 110 Q 28 120 18 120 L 10 120 Q 0 120 0 110 Z" fill="url(#glass)" stroke="#2f3540" stroke-width="1.5" />
    <rect x="-3" y="-2" width="34" height="4" fill="#2f3540" rx="2" />
  </g>

  <!-- Stream from tube 3 to tube 4 -->
  <path d="M 198 60 Q 210 90 220 105" stroke="#a855f7" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.92" />
  <circle cx="222" cy="108" r="2.6" fill="#a855f7" opacity="0.85" />

  <!-- Tube 4: receiving purple at top -->
  <g transform="translate(220, 50)">
    <clipPath id="t4">
      <path d="M 0 0 L 28 0 L 28 110 Q 28 120 18 120 L 10 120 Q 0 120 0 110 Z" />
    </clipPath>
    <g clip-path="url(#t4)">
      <rect x="0" y="80" width="28" height="40" fill="#06b6d4" />
      <rect x="0" y="50" width="28" height="30" fill="#a855f7" />
      <rect x="0" y="42" width="28" height="10" fill="#a855f7" opacity="0.85" />
      <rect x="0" y="40" width="28" height="3" fill="url(#meniscus)" />
    </g>
    <path d="M 0 0 L 28 0 L 28 110 Q 28 120 18 120 L 10 120 Q 0 120 0 110 Z" fill="url(#glass)" stroke="#2f3540" stroke-width="1.5" />
    <rect x="-3" y="-2" width="34" height="4" fill="#2f3540" rx="2" />
  </g>

  <!-- Tube 5: empty -->
  <g transform="translate(275, 40)">
    <path d="M 0 0 L 28 0 L 28 110 Q 28 120 18 120 L 10 120 Q 0 120 0 110 Z" fill="url(#glass)" stroke="#2f3540" stroke-width="1.5" />
    <rect x="-3" y="-2" width="34" height="4" fill="#2f3540" rx="2" />
  </g>

  <text x="20" y="36" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="700" fill="#e4e4ed">Water Sort</text>
  <text x="20" y="184" font-family="ui-sans-serif, system-ui" font-size="11" fill="#98a0ad">Renkleri sırala · dök, eşle</text>
</svg>
