<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="İksir Ölçer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2027" />
      <stop offset="100%" stop-color="#0a0b0e" />
    </linearGradient>
    <linearGradient id="liq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <linearGradient id="liq2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#15976a" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)" />

  <!-- big flask -->
  <g>
    <rect x="70" y="58" width="58" height="118" rx="12" fill="#232830" stroke="#2f3540" stroke-width="3" />
    <rect x="73" y="118" width="52" height="55" rx="9" fill="url(#liq)" />
    <line x1="70" y1="100" x2="128" y2="100" stroke="#98a0ad" stroke-width="2" stroke-dasharray="5 4" opacity="0.7" />
  </g>

  <!-- pouring stream -->
  <path d="M128 70 q26 4 40 36" fill="none" stroke="#818cf8" stroke-width="5" stroke-linecap="round" opacity="0.85" />

  <!-- target flask (hit, green) -->
  <g>
    <rect x="190" y="78" width="50" height="98" rx="11" fill="#232830" stroke="#34d399" stroke-width="3" />
    <rect x="193" y="120" width="44" height="53" rx="8" fill="url(#liq2)" />
  </g>

  <text x="20" y="36" font-family="ui-sans-serif, system-ui" font-size="22" font-weight="700" fill="#f5f6f8">İksir Ölçer</text>
  <text x="262" y="52" font-family="ui-sans-serif, system-ui" font-size="26" fill="#fbbf24">★★★</text>
</svg>
