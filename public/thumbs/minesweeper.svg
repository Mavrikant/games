<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Minesweeper">
  <defs>
    <linearGradient id="ms-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c2a" />
      <stop offset="100%" stop-color="#0a0a14" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ms-bg)" />
  <g>
    <!-- 8x5 grid of cells -->
    <g fill="#1f2230" stroke="#2f3346" stroke-width="1.5">
      <rect x="40"  y="40"  width="30" height="30" rx="4" />
      <rect x="72"  y="40"  width="30" height="30" rx="4" />
      <rect x="104" y="40"  width="30" height="30" rx="4" fill="#11131c" />
      <rect x="136" y="40"  width="30" height="30" rx="4" fill="#11131c" />
      <rect x="168" y="40"  width="30" height="30" rx="4" fill="#11131c" />
      <rect x="200" y="40"  width="30" height="30" rx="4" />
      <rect x="232" y="40"  width="30" height="30" rx="4" />
      <rect x="264" y="40"  width="30" height="30" rx="4" />

      <rect x="40"  y="72"  width="30" height="30" rx="4" />
      <rect x="72"  y="72"  width="30" height="30" rx="4" fill="#11131c" />
      <rect x="104" y="72"  width="30" height="30" rx="4" fill="#11131c" />
      <rect x="136" y="72"  width="30" height="30" rx="4" fill="#11131c" />
      <rect x="168" y="72"  width="30" height="30" rx="4" fill="#11131c" />
      <rect x="200" y="72"  width="30" height="30" rx="4" fill="#11131c" />
      <rect x="232" y="72"  width="30" height="30" rx="4" />
      <rect x="264" y="72"  width="30" height="30" rx="4" />

      <rect x="40"  y="104" width="30" height="30" rx="4" />
      <rect x="72"  y="104" width="30" height="30" rx="4" fill="#11131c" />
      <rect x="104" y="104" width="30" height="30" rx="4" fill="#11131c" />
      <rect x="136" y="104" width="30" height="30" rx="4" fill="#11131c" />
      <rect x="168" y="104" width="30" height="30" rx="4" fill="#11131c" />
      <rect x="200" y="104" width="30" height="30" rx="4" fill="#11131c" />
      <rect x="232" y="104" width="30" height="30" rx="4" fill="#11131c" />
      <rect x="264" y="104" width="30" height="30" rx="4" />

      <rect x="40"  y="136" width="30" height="30" rx="4" />
      <rect x="72"  y="136" width="30" height="30" rx="4" />
      <rect x="104" y="136" width="30" height="30" rx="4" fill="#11131c" />
      <rect x="136" y="136" width="30" height="30" rx="4" fill="#11131c" />
      <rect x="168" y="136" width="30" height="30" rx="4" />
      <rect x="200" y="136" width="30" height="30" rx="4" />
      <rect x="232" y="136" width="30" height="30" rx="4" />
      <rect x="264" y="136" width="30" height="30" rx="4" />
    </g>

    <!-- numbers in opened area -->
    <g font-family="ui-sans-serif, system-ui" font-size="18" font-weight="800" text-anchor="middle">
      <text x="119" y="93"  fill="#60a5fa">1</text>
      <text x="151" y="93"  fill="#34d399">2</text>
      <text x="183" y="93"  fill="#f87171">3</text>
      <text x="87"  y="125" fill="#60a5fa">1</text>
      <text x="119" y="125" fill="#34d399">2</text>
      <text x="247" y="125" fill="#f87171">3</text>
    </g>

    <!-- flag -->
    <g transform="translate(46,46)" font-size="22">
      <text x="0" y="18">🚩</text>
    </g>
    <!-- bomb -->
    <g transform="translate(238,142)" font-size="22">
      <text x="0" y="18">💣</text>
    </g>
  </g>
  <text x="20" y="30" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="700" fill="#e4e4ed">Minesweeper</text>
</svg>
