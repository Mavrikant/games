<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Ritim">
  <defs>
    <radialGradient id="ri-bg" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#1f1530" />
      <stop offset="100%" stop-color="#0a0b0e" />
    </radialGradient>
    <radialGradient id="ri-glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.55" />
      <stop offset="60%" stop-color="#fbbf24" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ri-bg)" />

  <g transform="translate(160,108)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="76" fill="url(#ri-glow)" />

    <!-- Target ring (white) -->
    <circle cx="0" cy="0" r="58" fill="none" stroke="#f5f6f8" stroke-width="2.5" />

    <!-- Mid expanding ring (yellow → just touching target = PERFECT) -->
    <circle cx="0" cy="0" r="58" fill="none" stroke="#fbbf24" stroke-width="3" opacity="0.95" />
    <!-- second expanding ring trailing -->
    <circle cx="0" cy="0" r="36" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.4" />
    <circle cx="0" cy="0" r="20" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.25" />

    <!-- Center pulse -->
    <circle cx="0" cy="0" r="5" fill="#fbbf24" />

    <!-- PERFECT marker -->
    <g transform="translate(0,-78)">
      <rect x="-26" y="-9" width="52" height="18" rx="9" fill="#16a34a" />
      <text x="0" y="4" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="10" font-weight="700" fill="#f5f6f8">PERFECT</text>
    </g>
  </g>

  <text x="22" y="36" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#f5f6f8">Ritim</text>
</svg>
