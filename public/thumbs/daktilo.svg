<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Daktilo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16181c"/>
      <stop offset="1" stop-color="#0a0b0e"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a342a"/>
      <stop offset="1" stop-color="#1f1b15"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)"/>
  <!-- Paper sheet -->
  <rect x="60" y="22" width="200" height="56" fill="#f4ead5" rx="2"/>
  <text x="160" y="56" text-anchor="middle" font-family="Courier New, monospace"
        font-weight="700" font-size="22" fill="#1a1a1a" letter-spacing="2">DAKTİLO</text>
  <rect x="98" y="62" width="124" height="3" fill="#1a1a1a"/>
  <!-- Typewriter body -->
  <rect x="40" y="92" width="240" height="90" rx="14" fill="url(#body)"/>
  <rect x="52" y="100" width="216" height="5" fill="#4a4234"/>
  <!-- Mallet swinging up -->
  <line x1="160" y1="104" x2="160" y2="82" stroke="#c7a96a" stroke-width="4"/>
  <circle cx="160" cy="80" r="5" fill="#e6cf94"/>
  <!-- Keys -->
  <g fill="#1c1812" stroke="#3a342a">
    <rect x="62" y="118" width="20" height="20" rx="4"/>
    <rect x="86" y="118" width="20" height="20" rx="4"/>
    <rect x="110" y="118" width="20" height="20" rx="4"/>
    <rect x="134" y="118" width="20" height="20" rx="4" fill="#c7a96a"/>
    <rect x="158" y="118" width="20" height="20" rx="4"/>
    <rect x="182" y="118" width="20" height="20" rx="4"/>
    <rect x="206" y="118" width="20" height="20" rx="4"/>
    <rect x="230" y="118" width="20" height="20" rx="4"/>
    <rect x="72" y="142" width="20" height="20" rx="4"/>
    <rect x="96" y="142" width="20" height="20" rx="4"/>
    <rect x="120" y="142" width="20" height="20" rx="4"/>
    <rect x="144" y="142" width="20" height="20" rx="4"/>
    <rect x="168" y="142" width="20" height="20" rx="4"/>
    <rect x="192" y="142" width="20" height="20" rx="4"/>
    <rect x="216" y="142" width="20" height="20" rx="4"/>
    <rect x="240" y="142" width="20" height="20" rx="4"/>
  </g>
  <!-- JAM indicator -->
  <circle cx="252" cy="106" r="5" fill="#e23a3a"/>
</svg>
