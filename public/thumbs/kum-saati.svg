<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Kum Saati">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1410" />
      <stop offset="100%" stop-color="#0a0805" />
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5b748" />
      <stop offset="100%" stop-color="#c4862a" />
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5b748" stop-opacity="0.0" />
      <stop offset="100%" stop-color="#f5b748" stop-opacity="0.4" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)" />

  <!-- Hourglass silhouette: two triangles meeting at center -->
  <g transform="translate(160 100)">
    <!-- Frame -->
    <rect x="-60" y="-72" width="120" height="6" rx="2" fill="#3a3026" />
    <rect x="-60" y="66" width="120" height="6" rx="2" fill="#3a3026" />
    <!-- Top chamber outline -->
    <path d="M -50 -66 L 50 -66 L 4 0 L -4 0 Z" fill="#1a1410" stroke="#3a3026" stroke-width="2" />
    <!-- Bottom chamber outline -->
    <path d="M -4 0 L 4 0 L 50 66 L -50 66 Z" fill="#1a1410" stroke="#3a3026" stroke-width="2" />

    <!-- Sand in top (partly drained) -->
    <path d="M -36 -52 L 36 -52 L 4 -8 L -4 -8 Z" fill="url(#sand)" opacity="0.92" />
    <!-- Sand in bottom (accumulated) -->
    <path d="M -42 58 L 42 58 L 30 28 L -30 28 Z" fill="url(#sand)" opacity="0.92" />
    <!-- Falling sand stream -->
    <rect x="-1" y="-6" width="2" height="40" fill="#f5b748" opacity="0.85" />
    <!-- Small pile peak -->
    <ellipse cx="0" cy="30" rx="14" ry="4" fill="#f5b748" opacity="0.95" />

    <!-- Glow underneath -->
    <ellipse cx="0" cy="60" rx="50" ry="6" fill="url(#glow)" />
  </g>

  <!-- Floating question marks suggesting "guess" -->
  <text x="48" y="64" font-family="ui-sans-serif, system-ui" font-size="22" font-weight="700" fill="#5d4a35" opacity="0.65">?</text>
  <text x="252" y="146" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="700" fill="#5d4a35" opacity="0.55">?</text>
  <text x="252" y="56" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#5d4a35" opacity="0.4">?</text>

  <text x="20" y="34" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4d4b3">Kum Saati</text>
  <text x="20" y="184" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="500" fill="#8a7b5f" letter-spacing="1">SAATSIZ TAHMIN</text>
</svg>
