<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Kör Tuş">
  <defs>
    <linearGradient id="kt-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15171f" />
      <stop offset="100%" stop-color="#0a0b0e" />
    </linearGradient>
    <radialGradient id="kt-dot" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#fde68a" />
      <stop offset="100%" stop-color="#f59e0b" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" rx="14" fill="url(#kt-bg)" />
  <rect x="1" y="1" width="318" height="198" rx="13" stroke="#171a21" fill="none" />
  <!-- target zone -->
  <rect x="124" y="84" width="72" height="44" rx="8" fill="rgba(80,200,100,0.18)" stroke="rgba(80,200,100,0.6)" stroke-width="2" />
  <text x="160" y="80" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="10" font-weight="700" fill="rgba(80,200,100,0.85)" letter-spacing="0.1em">HEDEF</text>
  <!-- track -->
  <line x1="50" y1="106" x2="270" y2="106" stroke="#2f3540" stroke-width="4" stroke-linecap="round" />
  <circle cx="50" cy="106" r="5" fill="#2f3540" />
  <circle cx="270" cy="106" r="5" fill="#2f3540" />
  <!-- moving dot (just outside zone for tension) -->
  <circle cx="100" cy="106" r="14" fill="url(#kt-dot)" />
  <!-- motion lines suggesting movement -->
  <line x1="78" y1="106" x2="86" y2="106" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.7" />
  <line x1="68" y1="106" x2="74" y2="106" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.4" />
  <text x="20" y="36" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="800" fill="#e4e4ed">Kör Tuş</text>
  <text x="20" y="184" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="600" fill="#5a6473" letter-spacing="0.05em">TEK TUŞ · ZAMANLAMA</text>
</svg>
