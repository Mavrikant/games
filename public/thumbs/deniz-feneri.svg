<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Deniz Feneri">
  <defs>
    <radialGradient id="sea" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#0e1a2f" />
      <stop offset="65%" stop-color="#07101e" />
      <stop offset="100%" stop-color="#04080f" />
    </radialGradient>
    <radialGradient id="beam" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.7" />
      <stop offset="60%" stop-color="#fde047" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#fde047" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="lamp" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fde047" />
      <stop offset="100%" stop-color="#fbbf24" />
    </radialGradient>
  </defs>

  <rect width="320" height="200" fill="url(#sea)" />

  <!-- Stars / faint distant lights -->
  <g fill="#ffffff" opacity="0.18">
    <rect x="38" y="22" width="1" height="1" />
    <rect x="92" y="14" width="1" height="1" />
    <rect x="148" y="26" width="1" height="1" />
    <rect x="218" y="20" width="1" height="1" />
    <rect x="278" y="38" width="1" height="1" />
    <rect x="58" y="48" width="1" height="1" />
    <rect x="244" y="52" width="1" height="1" />
    <rect x="296" y="64" width="1" height="1" />
  </g>

  <!-- Faint water rings -->
  <g fill="none" stroke="#60a5fa" stroke-opacity="0.06">
    <ellipse cx="160" cy="110" rx="60" ry="46" />
    <ellipse cx="160" cy="110" rx="92" ry="72" />
    <ellipse cx="160" cy="110" rx="130" ry="100" />
  </g>

  <!-- Beam cone, pointing toward upper right -->
  <polygon
    points="160,100 290,30 300,82"
    fill="url(#beam)"
  />
  <line x1="160" y1="100" x2="296" y2="56" stroke="#fef3c7" stroke-opacity="0.45" stroke-width="1.4" />

  <!-- Reef ring (dashed) + rocks -->
  <circle cx="160" cy="110" r="36" fill="none" stroke="#ef4444" stroke-opacity="0.35" stroke-width="1.4" stroke-dasharray="4 6" />
  <g fill="#1f2937">
    <circle cx="187" cy="92" r="4" />
    <circle cx="190" cy="124" r="5" />
    <circle cx="160" cy="146" r="4" />
    <circle cx="132" cy="132" r="5" />
    <circle cx="124" cy="100" r="4" />
    <circle cx="138" cy="80" r="3" />
    <circle cx="170" cy="76" r="3" />
  </g>

  <!-- Lighthouse -->
  <rect x="148" y="106" width="24" height="14" fill="#cbd5e1" />
  <polygon points="148,106 172,106 168,90 152,90" fill="#f8fafc" />
  <rect x="149" y="98" width="22" height="3" fill="#ef4444" />
  <rect x="149" y="92" width="22" height="3" fill="#ef4444" />
  <circle cx="160" cy="86" r="5.5" fill="url(#lamp)" />
  <polygon points="153,82 167,82 160,76" fill="#0f172a" />

  <!-- A few ships -->
  <!-- yellow speed boat (top right) -->
  <g transform="translate(258 50) rotate(200)">
    <polygon points="8,0 -6,-5 -4,0 -6,5" fill="#b45309" />
    <polygon points="-1,-1 6,0 -1,3" fill="#fde68a" />
  </g>
  <!-- blue radio ship (left) -->
  <g transform="translate(40 138) rotate(-20)">
    <polygon points="9,0 -6,-5 -4,0 -6,5" fill="#1d4ed8" />
    <polygon points="-1,-1 7,0 -1,3" fill="#bfdbfe" />
  </g>
  <!-- black deaf ship (bottom right) -->
  <g transform="translate(252 170) rotate(225)">
    <polygon points="9,0 -6,-5 -4,0 -6,5" fill="#0f172a" />
    <polygon points="-1,-1 7,0 -1,3" fill="#475569" />
  </g>
  <!-- gauge on yellow boat -->
  <rect x="246" y="36" width="20" height="3" fill="rgba(0,0,0,0.4)" />
  <rect x="246" y="36" width="13" height="3" fill="#22c55e" />

  <!-- Title -->
  <text x="18" y="186" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#e4e4ed">Deniz Feneri</text>
</svg>
