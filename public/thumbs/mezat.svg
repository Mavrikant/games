<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#131a24"/>
      <stop offset="1" stop-color="#0c1018"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f1c97a"/>
      <stop offset="1" stop-color="#b9852a"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="0%" r="80%">
      <stop offset="0" stop-color="#f1c97a" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f1c97a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="320" height="200" fill="url(#bg)"/>
  <rect width="320" height="120" fill="url(#spot)"/>

  <!-- baseline -->
  <line x1="0" y1="172" x2="320" y2="172" stroke="#2a3645" stroke-width="1"/>

  <!-- bid history bars on left -->
  <g transform="translate(20,82)">
    <rect x="0"  y="46" width="28" height="14" rx="2" fill="#2a3645"/>
    <rect x="0"  y="30" width="38" height="14" rx="2" fill="#4a3a22"/>
    <rect x="0"  y="14" width="50" height="14" rx="2" fill="#80631e"/>
    <rect x="0"  y="-2" width="62" height="14" rx="2" fill="url(#brass)"/>
  </g>

  <!-- big bid amount centered -->
  <g transform="translate(160,108)">
    <text text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
          font-weight="800" font-size="44" fill="#f5ecd6"
          letter-spacing="-1">425₺</text>
  </g>
  <text x="160" y="78" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-weight="500" font-size="10" fill="#8a93b0" letter-spacing="2">SON TEKLİF</text>

  <!-- excitement vertical meter on right -->
  <g transform="translate(268,72)">
    <rect x="0" y="0" width="14" height="86" rx="7" fill="#1a2230" stroke="#2a3645"/>
    <rect x="2" y="14" width="10" height="70" rx="5" fill="#e23e57"/>
    <rect x="2" y="44" width="10" height="40" rx="5" fill="#d68c3c" opacity="0.85"/>
  </g>

  <!-- gavel illustration bottom-right -->
  <g transform="translate(220,140) rotate(-20)">
    <!-- handle -->
    <rect x="0" y="6" width="60" height="6" rx="3" fill="#7a5a26"/>
    <!-- head -->
    <rect x="48" y="-4" width="34" height="22" rx="3" fill="url(#brass)" stroke="#5a3f10" stroke-width="1"/>
    <rect x="76" y="0" width="8" height="14" rx="2" fill="#8a6020"/>
    <!-- shine -->
    <rect x="52" y="-2" width="22" height="3" rx="1.5" fill="#fff1c8" opacity="0.55"/>
  </g>

  <!-- base / podium block -->
  <rect x="200" y="170" width="100" height="6" rx="2" fill="#3a2a14"/>

  <!-- title -->
  <text x="20" y="32" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="22" fill="#f5ecd6">Mezat</text>
  <text x="20" y="50" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="11" fill="#8a93b0" letter-spacing="1.5">BİDLER · ZAMANLAMA · TOKMAK</text>
</svg>
