<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Hokkabaz">
  <defs>
    <linearGradient id="bgHok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1027" />
      <stop offset="100%" stop-color="#06070f" />
    </linearGradient>
    <radialGradient id="spotHok" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bgHok)" />
  <rect width="320" height="200" fill="url(#spotHok)" />

  <!-- Floor line -->
  <line x1="20" y1="178" x2="300" y2="178" stroke="#1f2937" stroke-width="1.5" />

  <!-- Cascade arcs (faint, behind balls) -->
  <g fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="3 5" opacity="0.6">
    <path d="M 200,150 Q 180,40 130,150" />
    <path d="M 130,150 Q 150,40 200,150" />
  </g>

  <!-- Balls on a cascade -->
  <g>
    <!-- ascending left -->
    <circle cx="148" cy="78" r="13" fill="#fb7185" />
    <circle cx="144" cy="74" r="3" fill="#ffffff" opacity="0.55" />
    <!-- top right -->
    <circle cx="190" cy="56" r="13" fill="#fbbf24" />
    <circle cx="186" cy="52" r="3" fill="#ffffff" opacity="0.6" />
    <!-- descending right -->
    <circle cx="216" cy="118" r="13" fill="#34d399" />
    <circle cx="212" cy="114" r="3" fill="#ffffff" opacity="0.55" />
  </g>

  <!-- Juggler in front of the falling ball -->
  <g stroke="#cbd5f5" stroke-width="3.5" stroke-linecap="round" fill="none">
    <!-- body -->
    <line x1="165" y1="142" x2="165" y2="170" />
    <!-- legs -->
    <line x1="165" y1="170" x2="156" y2="178" />
    <line x1="165" y1="170" x2="174" y2="178" />
    <!-- arms to hands -->
    <line x1="165" y1="144" x2="142" y2="150" />
    <line x1="165" y1="144" x2="188" y2="150" />
  </g>
  <!-- Hands -->
  <circle cx="142" cy="150" r="6" fill="#94a3b8" />
  <circle cx="188" cy="150" r="6" fill="#fde68a" />
  <!-- Head -->
  <circle cx="165" cy="128" r="8.5" fill="#e2e8f0" />
  <!-- Hat -->
  <rect x="156" y="116" width="18" height="2.5" fill="#a78bfa" />
  <rect x="159" y="110" width="12" height="6" fill="#a78bfa" />

  <text x="20" y="32" font-family="ui-sans-serif, system-ui" font-size="22" font-weight="800" fill="#e4e4ed">Hokkabaz</text>
  <text x="20" y="54" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="500" fill="#98a0ad">Cascade refleks</text>
</svg>
