<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" role="img" aria-label="İp Atla">
  <defs>
    <linearGradient id="ia-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2746"/>
      <stop offset="1" stop-color="#34466c"/>
    </linearGradient>
    <linearGradient id="ia-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5e4a30"/>
      <stop offset="1" stop-color="#3b2e1d"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" rx="14" fill="url(#ia-sky)"/>
  <rect x="0" y="155" width="320" height="45" fill="url(#ia-ground)"/>
  <rect x="0" y="155" width="320" height="3" fill="#7a5d3a"/>

  <!-- clouds -->
  <g fill="rgba(255,255,255,0.08)">
    <ellipse cx="55" cy="40" rx="22" ry="6"/>
    <ellipse cx="260" cy="60" rx="20" ry="5"/>
    <ellipse cx="160" cy="30" rx="16" ry="4"/>
  </g>

  <!-- left spinner -->
  <circle cx="42" cy="70" r="8" fill="#e2dccb"/>
  <rect x="35" y="80" width="14" height="22" fill="#7c8be8"/>
  <rect x="35" y="102" width="6" height="55" fill="#2f3a64"/>
  <rect x="43" y="102" width="6" height="55" fill="#2f3a64"/>
  <line x1="49" y1="84" x2="64" y2="135" stroke="#e2dccb" stroke-width="3" stroke-linecap="round"/>
  <circle cx="64" cy="135" r="3" fill="#e2dccb"/>

  <!-- right spinner -->
  <circle cx="278" cy="70" r="8" fill="#e2dccb"/>
  <rect x="271" y="80" width="14" height="22" fill="#7c8be8"/>
  <rect x="271" y="102" width="6" height="55" fill="#2f3a64"/>
  <rect x="279" y="102" width="6" height="55" fill="#2f3a64"/>
  <line x1="271" y1="84" x2="256" y2="135" stroke="#e2dccb" stroke-width="3" stroke-linecap="round"/>
  <circle cx="256" cy="135" r="3" fill="#e2dccb"/>

  <!-- rope -->
  <path d="M 64 135 Q 160 152 256 135" stroke="#ffcc55" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- shadow under jumper -->
  <ellipse cx="160" cy="157" rx="14" ry="3" fill="rgba(0,0,0,0.32)"/>

  <!-- jumper (tucked, mid-air) -->
  <!-- head -->
  <circle cx="160" cy="80" r="10" fill="#f1c79a"/>
  <path d="M 150 74 a 10 10 0 0 1 20 0 z" fill="#3a2517"/>
  <circle cx="157" cy="79" r="1.3" fill="#1a1a1a"/>
  <circle cx="163" cy="79" r="1.3" fill="#1a1a1a"/>
  <!-- torso -->
  <rect x="150" y="89" width="20" height="26" fill="#5fd897"/>
  <!-- tucked arms -->
  <line x1="151" y1="95" x2="146" y2="105" stroke="#5fd897" stroke-width="4" stroke-linecap="round"/>
  <line x1="169" y1="95" x2="174" y2="105" stroke="#5fd897" stroke-width="4" stroke-linecap="round"/>
  <!-- tucked legs -->
  <polyline points="155,115 152,125 156,131" stroke="#2554a6" stroke-width="5" stroke-linecap="round" fill="none"/>
  <polyline points="165,115 168,125 164,131" stroke="#2554a6" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- title -->
  <text x="20" y="28" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="700" fill="#e4e4ed">İp Atla</text>
</svg>
