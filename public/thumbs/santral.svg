<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Santral">
  <defs>
    <linearGradient id="sb-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1410" />
      <stop offset="100%" stop-color="#0a0706" />
    </linearGradient>
    <radialGradient id="sb-hole" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#1a1208" />
      <stop offset="100%" stop-color="#050302" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#sb-bg)" />

  <!-- top jack row -->
  <g>
    <circle cx="60" cy="70" r="11" fill="#7a5a2a" />
    <circle cx="60" cy="70" r="8" fill="url(#sb-hole)" />
    <circle cx="110" cy="70" r="11" fill="#7a5a2a" />
    <circle cx="110" cy="70" r="8" fill="url(#sb-hole)" />
    <circle cx="160" cy="70" r="11" fill="#7a5a2a" />
    <circle cx="160" cy="70" r="8" fill="url(#sb-hole)" />
    <circle cx="210" cy="70" r="11" fill="#7a5a2a" />
    <circle cx="210" cy="70" r="8" fill="url(#sb-hole)" />
    <circle cx="260" cy="70" r="11" fill="#7a5a2a" />
    <circle cx="260" cy="70" r="8" fill="url(#sb-hole)" />
  </g>

  <!-- bottom jack row -->
  <g>
    <circle cx="60" cy="150" r="11" fill="#7a5a2a" />
    <circle cx="60" cy="150" r="8" fill="url(#sb-hole)" />
    <circle cx="110" cy="150" r="11" fill="#7a5a2a" />
    <circle cx="110" cy="150" r="8" fill="url(#sb-hole)" />
    <circle cx="160" cy="150" r="11" fill="#7a5a2a" />
    <circle cx="160" cy="150" r="8" fill="url(#sb-hole)" />
    <circle cx="210" cy="150" r="11" fill="#7a5a2a" />
    <circle cx="210" cy="150" r="8" fill="url(#sb-hole)" />
    <circle cx="260" cy="150" r="11" fill="#7a5a2a" />
    <circle cx="260" cy="150" r="8" fill="url(#sb-hole)" />
  </g>

  <!-- cables -->
  <g fill="none" stroke-width="3" stroke-linecap="round">
    <path d="M 60 70 C 60 130, 160 90, 160 150" stroke="#e8b664" />
    <path d="M 110 70 C 110 150, 260 70, 260 150" stroke="#7ab8e8" opacity="0.9" />
    <path d="M 210 70 C 210 120, 60 100, 60 150" stroke="#c87ae8" opacity="0.85" />
  </g>

  <!-- plug tips -->
  <g fill="#d8b16a">
    <circle cx="60"  cy="70"  r="3.5" />
    <circle cx="160" cy="150" r="3.5" />
    <circle cx="110" cy="70"  r="3.5" />
    <circle cx="260" cy="150" r="3.5" />
    <circle cx="210" cy="70"  r="3.5" />
    <circle cx="60"  cy="150" r="3.5" />
  </g>

  <!-- ringing indicator on jack 4 -->
  <circle cx="210" cy="70" r="16" fill="none" stroke="#f5a065" stroke-width="2" opacity="0.85" />

  <!-- bubble -->
  <g>
    <rect x="194" y="22" width="34" height="20" rx="6" fill="#f4e9d8" stroke="#3a2a18" stroke-width="1.4" />
    <polygon points="206,42 211,49 216,42" fill="#f4e9d8" stroke="#3a2a18" stroke-width="1.4" />
    <text x="211" y="36" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="700" fill="#3a2a18" text-anchor="middle">→2</text>
  </g>

  <!-- title -->
  <text x="20" y="36" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4d4b8">Santral</text>
</svg>
