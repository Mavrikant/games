<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Nonogram">
  <defs>
    <linearGradient id="ng-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141821" />
      <stop offset="100%" stop-color="#0a0b0e" />
    </linearGradient>
    <linearGradient id="ng-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5fd9a3" />
      <stop offset="100%" stop-color="#2faa6f" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ng-bg)" />
  <!-- Column hint numbers, top of grid -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#c9cdd6" text-anchor="middle">
    <text x="135" y="36">3</text>
    <text x="159" y="24">1</text>
    <text x="159" y="36">3</text>
    <text x="183" y="24">1</text>
    <text x="183" y="36">3</text>
    <text x="207" y="24">1</text>
    <text x="207" y="36">3</text>
    <text x="231" y="36">3</text>
  </g>
  <!-- Row hint numbers, left of grid -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#c9cdd6" text-anchor="end">
    <text x="115" y="56">3</text>
    <text x="115" y="80">5</text>
    <text x="115" y="104">5</text>
    <text x="115" y="128">3</text>
    <text x="115" y="152">1</text>
  </g>
  <!-- 5x5 grid showing the heart puzzle -->
  <g>
    <!-- row 0: .###. -->
    <rect x="123" y="44" width="22" height="22" rx="4" fill="#1a1d24" stroke="#262b34" />
    <rect x="147" y="44" width="22" height="22" rx="4" fill="url(#ng-fill)" />
    <rect x="171" y="44" width="22" height="22" rx="4" fill="url(#ng-fill)" />
    <rect x="195" y="44" width="22" height="22" rx="4" fill="url(#ng-fill)" />
    <rect x="219" y="44" width="22" height="22" rx="4" fill="#1a1d24" stroke="#262b34" />
    <!-- row 1: ##### -->
    <rect x="123" y="68" width="22" height="22" rx="4" fill="url(#ng-fill)" />
    <rect x="147" y="68" width="22" height="22" rx="4" fill="url(#ng-fill)" />
    <rect x="171" y="68" width="22" height="22" rx="4" fill="url(#ng-fill)" />
    <rect x="195" y="68" width="22" height="22" rx="4" fill="url(#ng-fill)" />
    <rect x="219" y="68" width="22" height="22" rx="4" fill="url(#ng-fill)" />
    <!-- row 2: ##### -->
    <rect x="123" y="92" width="22" height="22" rx="4" fill="url(#ng-fill)" />
    <rect x="147" y="92" width="22" height="22" rx="4" fill="url(#ng-fill)" />
    <rect x="171" y="92" width="22" height="22" rx="4" fill="url(#ng-fill)" />
    <rect x="195" y="92" width="22" height="22" rx="4" fill="url(#ng-fill)" />
    <rect x="219" y="92" width="22" height="22" rx="4" fill="url(#ng-fill)" />
    <!-- row 3: .###. -->
    <rect x="123" y="116" width="22" height="22" rx="4" fill="#1a1d24" stroke="#262b34" />
    <rect x="147" y="116" width="22" height="22" rx="4" fill="url(#ng-fill)" />
    <rect x="171" y="116" width="22" height="22" rx="4" fill="url(#ng-fill)" />
    <rect x="195" y="116" width="22" height="22" rx="4" fill="url(#ng-fill)" />
    <rect x="219" y="116" width="22" height="22" rx="4" fill="#1a1d24" stroke="#262b34" />
    <!-- row 4: ..#.. -->
    <rect x="123" y="140" width="22" height="22" rx="4" fill="#1a1d24" stroke="#262b34" />
    <rect x="147" y="140" width="22" height="22" rx="4" fill="#1a1d24" stroke="#262b34" />
    <rect x="171" y="140" width="22" height="22" rx="4" fill="url(#ng-fill)" />
    <rect x="195" y="140" width="22" height="22" rx="4" fill="#1a1d24" stroke="#262b34" />
    <rect x="219" y="140" width="22" height="22" rx="4" fill="#1a1d24" stroke="#262b34" />
  </g>
  <!-- Title -->
  <text x="160" y="184" font-family="ui-sans-serif, system-ui, -apple-system" font-size="14" font-weight="700" fill="#e5e7eb" text-anchor="middle" letter-spacing="2">NONOGRAM</text>
</svg>
