<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Zar Yolcusu">
  <defs>
    <linearGradient id="zy-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10131a"/>
      <stop offset="1" stop-color="#1c2231"/>
    </linearGradient>
    <linearGradient id="zy-die" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf6e7"/>
      <stop offset="1" stop-color="#e4d5a8"/>
    </linearGradient>
    <radialGradient id="zy-goal-glow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#6ca2f8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6ca2f8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="320" height="200" fill="url(#zy-bg)"/>

  <!-- 5x5 grid hint -->
  <g stroke="#262b34" stroke-width="1" fill="#1a1d24" opacity="0.85">
    <rect x="38"  y="20" width="48" height="32" rx="6"/>
    <rect x="92"  y="20" width="48" height="32" rx="6"/>
    <rect x="146" y="20" width="48" height="32" rx="6"/>
    <rect x="200" y="20" width="48" height="32" rx="6"/>
    <rect x="254" y="20" width="48" height="32" rx="6"/>

    <rect x="38"  y="56" width="48" height="32" rx="6"/>
    <rect x="92"  y="56" width="48" height="32" rx="6"/>
    <rect x="146" y="56" width="48" height="32" rx="6"/>
    <rect x="200" y="56" width="48" height="32" rx="6"/>
    <rect x="254" y="56" width="48" height="32" rx="6"/>

    <rect x="38"  y="92" width="48" height="32" rx="6"/>
    <rect x="92"  y="92" width="48" height="32" rx="6"/>
    <rect x="146" y="92" width="48" height="32" rx="6"/>
    <rect x="200" y="92" width="48" height="32" rx="6"/>
    <rect x="254" y="92" width="48" height="32" rx="6"/>

    <rect x="38"  y="128" width="48" height="32" rx="6"/>
    <rect x="92"  y="128" width="48" height="32" rx="6"/>
    <rect x="146" y="128" width="48" height="32" rx="6"/>
    <rect x="200" y="128" width="48" height="32" rx="6"/>
    <rect x="254" y="128" width="48" height="32" rx="6"/>

    <rect x="38"  y="164" width="48" height="22" rx="6"/>
    <rect x="92"  y="164" width="48" height="22" rx="6"/>
    <rect x="146" y="164" width="48" height="22" rx="6"/>
    <rect x="200" y="164" width="48" height="22" rx="6"/>
    <rect x="254" y="164" width="48" height="22" rx="6"/>
  </g>

  <!-- Goal cells with target numbers (blue) -->
  <g>
    <rect x="38"  y="20" width="48" height="32" rx="6" fill="rgba(108,162,248,0.18)" stroke="#6ca2f8" stroke-width="1.4"/>
    <text x="62" y="42" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#9cc1ff">3</text>

    <rect x="254" y="92" width="48" height="32" rx="6" fill="rgba(108,162,248,0.18)" stroke="#6ca2f8" stroke-width="1.4"/>
    <text x="278" y="114" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#9cc1ff">6</text>

    <!-- collected goal in green -->
    <rect x="146" y="164" width="48" height="22" rx="6" fill="rgba(86,207,122,0.28)" stroke="rgba(86,207,122,0.8)" stroke-width="1.4"/>
    <text x="170" y="181" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#fff">5 ✓</text>
  </g>

  <!-- glow behind die -->
  <circle cx="170" cy="108" r="46" fill="url(#zy-goal-glow)"/>

  <!-- The die: rounded square showing a 5 face -->
  <g>
    <rect x="148" y="94" width="44" height="44" rx="9" fill="url(#zy-die)" stroke="#c8b88c" stroke-width="1.2"/>
    <!-- five pips arranged 0,0 / 0,2 / 1,1 / 2,0 / 2,2 in a 3x3 sub-grid -->
    <g fill="#1a1d24">
      <circle cx="158" cy="104" r="3.2"/>
      <circle cx="182" cy="104" r="3.2"/>
      <circle cx="170" cy="116" r="3.2"/>
      <circle cx="158" cy="128" r="3.2"/>
      <circle cx="182" cy="128" r="3.2"/>
    </g>
  </g>

  <!-- subtle title -->
  <text x="160" y="14" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="10" letter-spacing="2" fill="#7a8198">ZAR YOLCUSU</text>
</svg>
