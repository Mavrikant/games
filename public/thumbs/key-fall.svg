<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <rect width="320" height="200" fill="#0a0b0e"/>
  <!-- Lane dividers -->
  <line x1="64" y1="0" x2="64" y2="200" stroke="#1a1e25" stroke-width="1"/>
  <line x1="128" y1="0" x2="128" y2="200" stroke="#1a1e25" stroke-width="1"/>
  <line x1="192" y1="0" x2="192" y2="200" stroke="#1a1e25" stroke-width="1"/>
  <line x1="256" y1="0" x2="256" y2="200" stroke="#1a1e25" stroke-width="1"/>
  <!-- Floor -->
  <line x1="0" y1="182" x2="320" y2="182" stroke="#1a1e25" stroke-width="2"/>
  <!-- Lane color strips -->
  <rect x="0" y="0" width="63" height="5" fill="#fb718533" rx="0"/>
  <rect x="65" y="0" width="62" height="5" fill="#f59e0b33" rx="0"/>
  <rect x="129" y="0" width="62" height="5" fill="#34d39933" rx="0"/>
  <rect x="193" y="0" width="62" height="5" fill="#60a5fa33" rx="0"/>
  <rect x="257" y="0" width="63" height="5" fill="#c084fc33" rx="0"/>
  <!-- Falling letters with glow -->
  <text x="32" y="60" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="36" fill="#fb7185" filter="url(#glow-r)">A</text>
  <text x="96" y="110" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="36" fill="#f59e0b" filter="url(#glow-y)">K</text>
  <text x="160" y="40" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="36" fill="#34d399" filter="url(#glow-g)">T</text>
  <text x="224" y="85" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="36" fill="#60a5fa" filter="url(#glow-b)">M</text>
  <text x="288" y="130" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="36" fill="#c084fc" filter="url(#glow-p)">Z</text>
  <!-- Second row -->
  <text x="32" y="140" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="28" fill="#fb7185" opacity="0.5">S</text>
  <text x="160" y="160" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="28" fill="#34d399" opacity="0.4">E</text>
  <!-- Defs for glow -->
  <defs>
    <filter id="glow-r"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-y"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-g"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-b"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-p"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
</svg>
