<svg width="320" height="200" viewBox="0 0 320 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" rx="24" fill="#0A0B0E"/>
  <rect x="1" y="1" width="318" height="198" rx="23" stroke="#171A21"/>
  <!-- Source on left -->
  <rect x="20" y="84" width="38" height="32" rx="6" fill="#38BDF8" stroke="#0EA5E9" stroke-width="2"/>
  <circle cx="34" cy="100" r="7" fill="#E0F2FE"/>
  <!-- Pipe segments forming a path: source → right, then up, right, down, right to end -->
  <!-- Horizontal pipe stub from source -->
  <rect x="58" y="92" width="34" height="16" fill="#475569"/>
  <rect x="58" y="96" width="34" height="8" fill="#38BDF8"/>
  <!-- Elbow at (92,92): goes right and up -->
  <rect x="92" y="92" width="48" height="16" fill="#475569"/>
  <rect x="124" y="44" width="16" height="64" fill="#475569"/>
  <rect x="92" y="96" width="48" height="8" fill="#38BDF8"/>
  <rect x="128" y="44" width="8" height="60" fill="#38BDF8"/>
  <!-- Top horizontal pipe -->
  <rect x="124" y="44" width="56" height="16" fill="#475569"/>
  <rect x="124" y="48" width="56" height="8" fill="#38BDF8"/>
  <!-- Right elbow going down at (164, 44) -->
  <rect x="164" y="44" width="16" height="64" fill="#475569"/>
  <rect x="168" y="44" width="8" height="60" fill="#38BDF8"/>
  <!-- Pipe to end -->
  <rect x="164" y="92" width="84" height="16" fill="#475569"/>
  <rect x="164" y="96" width="84" height="8" fill="#22D3EE"/>
  <!-- End target -->
  <circle cx="270" cy="100" r="22" fill="none" stroke="#22D3EE" stroke-width="6"/>
  <circle cx="270" cy="100" r="10" fill="#22D3EE"/>
  <!-- Decorative unrotated pipe in bottom area -->
  <rect x="44" y="148" width="40" height="16" fill="#2F3744" transform="rotate(45 64 156)"/>
  <rect x="220" y="150" width="40" height="12" fill="#2F3744"/>
  <!-- Title -->
  <text x="160" y="184" text-anchor="middle" fill="#7DD3FC" font-family="system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="0.05em">CONNECT THE FLOW</text>
</svg>
