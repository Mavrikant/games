<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Polarite Savunması">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10141c" />
      <stop offset="100%" stop-color="#070a0e" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)" />
  <g stroke="#818cf8" stroke-opacity="0.08" stroke-width="1">
    <line x1="80" y1="0" x2="80" y2="200" />
    <line x1="160" y1="0" x2="160" y2="200" />
    <line x1="240" y1="0" x2="240" y2="200" />
    <line x1="0" y1="66" x2="320" y2="66" />
    <line x1="0" y1="133" x2="320" y2="133" />
  </g>
  <!-- active-pole frame -->
  <rect x="3" y="3" width="314" height="194" fill="none" stroke="#f8717f" stroke-opacity="0.5" stroke-width="3" rx="6" />
  <!-- serpentine path -->
  <path d="M14 48 H252 V100 H68 V152 H292" fill="none" stroke="#171b24" stroke-width="26" stroke-linejoin="round" stroke-linecap="round" />
  <path d="M14 48 H252 V100 H68 V152 H292" fill="none" stroke="#818cf8" stroke-opacity="0.22" stroke-width="2" stroke-dasharray="6 10" />
  <!-- core -->
  <circle cx="292" cy="152" r="13" fill="#a78bfa" />
  <circle cx="292" cy="152" r="5" fill="#fff" />
  <!-- towers -->
  <g>
    <rect x="135" y="61" width="30" height="30" rx="6" fill="#2a3340" />
    <circle cx="150" cy="76" r="7" fill="#cbd5e1" />
    <circle cx="150" cy="76" r="3.5" fill="#f8717f" />
    <rect x="95" y="113" width="30" height="30" rx="6" fill="#2a3340" />
    <circle cx="110" cy="128" r="7" fill="#cbd5e1" />
    <circle cx="110" cy="128" r="3.5" fill="#f8717f" />
  </g>
  <!-- beam -->
  <line x1="150" y1="76" x2="205" y2="48" stroke="#f8717f" stroke-width="3" stroke-opacity="0.85" />
  <!-- red (circle) enemy, targeted -->
  <circle cx="205" cy="48" r="13" fill="#f8717f" stroke="#070a0e" stroke-width="2" />
  <!-- blue (diamond) enemy, shielded -->
  <g>
    <polygon points="120,87 133,100 120,113 107,100" fill="#60a5fa" stroke="#070a0e" stroke-width="2" />
    <circle cx="120" cy="100" r="17" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="3 3" />
  </g>
  <text x="16" y="186" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#f5f6f8">Polarite</text>
</svg>
