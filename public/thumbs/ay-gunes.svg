<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Ay-Güneş">
  <defs>
    <linearGradient id="ag-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1830" />
      <stop offset="100%" stop-color="#0a0a14" />
    </linearGradient>
    <radialGradient id="ag-sun" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#ffe07a" />
      <stop offset="100%" stop-color="#f6c453" />
    </radialGradient>
    <radialGradient id="ag-moon" cx="0.55" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#cfd8ff" />
      <stop offset="100%" stop-color="#9fb6ff" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ag-bg)" />
  <g font-family="ui-sans-serif, system-ui" font-weight="700">
    <text x="20" y="34" font-size="20" fill="#e4e4ed">Ay-Güneş</text>
    <text x="20" y="56" font-size="11" fill="#9aa0b4" letter-spacing="2">SUN &amp; MOON · 6×6</text>
  </g>
  <!-- 3x3 demo grid -->
  <g transform="translate(180, 30)">
    <g fill="#15172a" stroke="#2a2e4a" stroke-width="1">
      <rect x="0"  y="0"  width="36" height="36" rx="6" />
      <rect x="40" y="0"  width="36" height="36" rx="6" />
      <rect x="80" y="0"  width="36" height="36" rx="6" />
      <rect x="0"  y="40" width="36" height="36" rx="6" />
      <rect x="40" y="40" width="36" height="36" rx="6" />
      <rect x="80" y="40" width="36" height="36" rx="6" />
      <rect x="0"  y="80" width="36" height="36" rx="6" />
      <rect x="40" y="80" width="36" height="36" rx="6" />
      <rect x="80" y="80" width="36" height="36" rx="6" />
    </g>
    <!-- suns -->
    <circle cx="18"  cy="18"  r="11" fill="url(#ag-sun)" />
    <circle cx="98"  cy="18"  r="11" fill="url(#ag-sun)" />
    <circle cx="58"  cy="58"  r="11" fill="url(#ag-sun)" />
    <circle cx="98"  cy="98"  r="11" fill="url(#ag-sun)" />
    <!-- moons (crescents via mask) -->
    <g fill="url(#ag-moon)">
      <path d="M 58 7 a 11 11 0 1 0 0 22 a 8 8 0 1 1 0 -22 z" />
      <path d="M 18 47 a 11 11 0 1 0 0 22 a 8 8 0 1 1 0 -22 z" />
      <path d="M 98 47 a 11 11 0 1 0 0 22 a 8 8 0 1 1 0 -22 z" />
      <path d="M 18 87 a 11 11 0 1 0 0 22 a 8 8 0 1 1 0 -22 z" />
      <path d="M 58 87 a 11 11 0 1 0 0 22 a 8 8 0 1 1 0 -22 z" />
    </g>
    <!-- '=' constraint between (0,0) and (0,1) -->
    <circle cx="38" cy="18" r="6" fill="#2a2e4a" />
    <text x="38" y="22" font-size="10" fill="#cfd8ff" font-family="ui-sans-serif, system-ui" font-weight="700" text-anchor="middle">=</text>
    <!-- '×' constraint between (1,1) and (1,2) -->
    <circle cx="78" cy="58" r="6" fill="#3a2230" />
    <text x="78" y="61" font-size="10" fill="#f6a0a0" font-family="ui-sans-serif, system-ui" font-weight="700" text-anchor="middle">×</text>
  </g>
  <g font-family="ui-sans-serif, system-ui" font-size="11" fill="#9aa0b4">
    <text x="20" y="180">Üçlü yok · satır dengeli · = veya ×</text>
  </g>
</svg>
