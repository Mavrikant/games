<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d2940"/>
      <stop offset="0.65" stop-color="#2b3a55"/>
      <stop offset="1" stop-color="#3d4f73"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#46587a" stop-opacity="0"/>
      <stop offset="1" stop-color="#56688c"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#sky)"/>

  <!-- distant island -->
  <g opacity="0.55">
    <polygon points="36,84 96,84 88,108 62,116 44,104" fill="#4a423b"/>
    <polygon points="36,84 96,84 86,78 66,75 46,79" fill="#5d7a59"/>
  </g>

  <!-- main island (right) with anchored hook -->
  <polygon points="196,96 296,96 282,134 244,148 210,130" fill="#5d544c"/>
  <polygon points="196,96 296,96 280,86 240,82 212,88" fill="#6f8f6a"/>
  <polygon points="244,148 252,144 248,162" fill="#4a423b"/>

  <!-- mid island (left) under the craft -->
  <polygon points="20,128 116,128 104,162 60,172 30,154" fill="#5d544c"/>
  <polygon points="20,128 116,128 100,118 58,114 32,120" fill="#6f8f6a"/>

  <!-- energy orbs -->
  <circle cx="252" cy="76" r="5.5" fill="#f59e0b"/>
  <circle cx="252" cy="76" r="9" fill="#f59e0b" opacity="0.25"/>
  <circle cx="84" cy="106" r="4.5" fill="#f59e0b"/>
  <circle cx="84" cy="106" r="7.5" fill="#f59e0b" opacity="0.25"/>

  <!-- rope: craft → island anchor -->
  <path d="M86 96 Q 160 78 232 92" fill="none" stroke="#67e8f9" stroke-width="2.4" stroke-linecap="round"/>
  <circle cx="232" cy="92" r="3.4" fill="#67e8f9"/>

  <!-- hovercraft -->
  <g transform="translate(70 92) rotate(-8)">
    <ellipse cx="0" cy="9" rx="15" ry="4" fill="#67e8f9" opacity="0.5"/>
    <polygon points="-16,4 0,-7 16,4 0,9" fill="#3b82f6"/>
    <polygon points="-16,4 0,9 0,13 -12,8" fill="#1d4ed8"/>
    <polygon points="16,4 0,9 0,13 12,8" fill="#2563eb"/>
    <rect x="-4" y="-9" width="8" height="6" rx="1.6" fill="#1c2430"/>
  </g>

  <!-- void clouds -->
  <rect x="0" y="168" width="320" height="32" fill="url(#cloud)"/>
  <ellipse cx="60" cy="196" rx="90" ry="18" fill="#56688c" opacity="0.8"/>
  <ellipse cx="220" cy="200" rx="120" ry="22" fill="#4d5f84" opacity="0.9"/>

  <!-- title -->
  <text x="160" y="36" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="23" font-weight="800" fill="#e2e8f0" letter-spacing="1">AEROKANCA</text>
  <text x="160" y="52" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8" letter-spacing="2">KANCALA · SAVRUL · DÜŞÜR</text>
</svg>
