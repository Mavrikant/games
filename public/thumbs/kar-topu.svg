<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Kar Topu">
  <defs>
    <linearGradient id="ktp-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bcd8ef" />
      <stop offset="100%" stop-color="#7ea8cf" />
    </linearGradient>
    <radialGradient id="ktp-ball" cx="0.35" cy="0.32" r="0.75">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="65%" stop-color="#e8eef5" />
      <stop offset="100%" stop-color="#8aa3bf" />
    </radialGradient>
    <linearGradient id="ktp-tree" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a8a4b" />
      <stop offset="100%" stop-color="#1c5a2a" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#ktp-sky)" />
  <g fill="#ffffff" opacity="0.7">
    <circle cx="40" cy="30" r="2" />
    <circle cx="90" cy="55" r="1.5" />
    <circle cx="140" cy="22" r="1.8" />
    <circle cx="200" cy="48" r="1.4" />
    <circle cx="260" cy="28" r="1.7" />
    <circle cx="305" cy="60" r="1.6" />
    <circle cx="55" cy="105" r="1.4" />
    <circle cx="130" cy="160" r="1.8" />
    <circle cx="240" cy="135" r="1.5" />
    <circle cx="290" cy="170" r="1.6" />
  </g>
  <!-- Trees -->
  <g transform="translate(60 132)">
    <rect x="-4" y="0" width="8" height="14" fill="#5a3a1c" />
    <polygon points="0,-44 -22,-2 22,-2" fill="url(#ktp-tree)" />
    <polygon points="0,-58 -16,-22 16,-22" fill="url(#ktp-tree)" />
  </g>
  <g transform="translate(255 80)">
    <rect x="-3" y="0" width="6" height="11" fill="#5a3a1c" />
    <polygon points="0,-34 -18,-2 18,-2" fill="url(#ktp-tree)" />
    <polygon points="0,-46 -13,-18 13,-18" fill="url(#ktp-tree)" />
  </g>
  <g transform="translate(230 158)">
    <rect x="-4" y="0" width="8" height="14" fill="#5a3a1c" />
    <polygon points="0,-46 -22,-2 22,-2" fill="url(#ktp-tree)" />
    <polygon points="0,-60 -16,-24 16,-24" fill="url(#ktp-tree)" />
  </g>
  <!-- Snowball with cast shadow and motion trail -->
  <ellipse cx="160" cy="158" rx="48" ry="14" fill="rgba(40,60,90,0.28)" />
  <path d="M105 168 Q160 142 215 168" stroke="rgba(255,255,255,0.55)" stroke-width="6" fill="none" stroke-linecap="round" />
  <circle cx="160" cy="118" r="42" fill="url(#ktp-ball)" stroke="rgba(60,80,110,0.55)" stroke-width="1.5" />
  <path d="M132 102 a30 30 0 0 0 38 22" stroke="rgba(60,80,110,0.35)" stroke-width="2" fill="none" stroke-linecap="round" />
  <text x="20" y="34" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="700" fill="#0e1a2e">Kar Topu</text>
</svg>
