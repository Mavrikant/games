<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Mors Kodu">
  <defs>
    <linearGradient id="mk-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c2a" />
      <stop offset="100%" stop-color="#0a0a14" />
    </linearGradient>
    <radialGradient id="mk-lamp" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0%" stop-color="#fff7d8" />
      <stop offset="55%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#b86b00" />
    </radialGradient>
    <radialGradient id="mk-halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fbbf2455" />
      <stop offset="100%" stop-color="#fbbf2400" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#mk-bg)" />
  <!-- Lamp halo and lamp -->
  <circle cx="100" cy="110" r="76" fill="url(#mk-halo)" />
  <circle cx="100" cy="110" r="44" fill="url(#mk-lamp)" stroke="#fbbf24" stroke-width="2.5" />
  <!-- Morse signal trail to the right of the lamp -->
  <g transform="translate(170 95)">
    <circle cx="0" cy="15" r="6" fill="#fbbf24" />
    <rect x="20" y="9" width="36" height="12" rx="3" fill="#fbbf24" />
    <circle cx="76" cy="15" r="6" fill="#fbbf24" />
    <circle cx="96" cy="15" r="6" fill="#fbbf24" />
  </g>
  <!-- Decoded letter under the trail -->
  <text x="220" y="160" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="36" font-weight="800" fill="#e4e4ed">F</text>
  <text x="20" y="32" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e4e4ed">Mors Kodu</text>
  <text x="20" y="52" font-family="ui-sans-serif, system-ui" font-size="11" fill="#fbbf24" font-weight="600" letter-spacing="2">• — • •</text>
</svg>
