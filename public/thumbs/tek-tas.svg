<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Tek Tas">
  <defs>
    <linearGradient id="tt-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1308" />
      <stop offset="100%" stop-color="#0a0703" />
    </linearGradient>
    <radialGradient id="tt-peg" cx="0.35" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#f4dca2" />
      <stop offset="55%" stop-color="#c4a05c" />
      <stop offset="100%" stop-color="#5e4318" />
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#tt-bg)" />
  <g transform="translate(110 30)" stroke="#2a2418" stroke-width="1">
    <!-- 7x7 plus-shaped board; cell size 20, gap 2 -->
    <g fill="#1a1d24">
      <!-- helper: each cell is a circle. We list only valid (1) cells. -->
      <!-- Row 0 -->
      <circle cx="50" cy="10" r="9" /><circle cx="72" cy="10" r="9" /><circle cx="94" cy="10" r="9" />
      <!-- Row 1 -->
      <circle cx="50" cy="32" r="9" /><circle cx="72" cy="32" r="9" /><circle cx="94" cy="32" r="9" />
      <!-- Row 2 (full) -->
      <circle cx="6" cy="54" r="9" /><circle cx="28" cy="54" r="9" /><circle cx="50" cy="54" r="9" /><circle cx="72" cy="54" r="9" /><circle cx="94" cy="54" r="9" /><circle cx="116" cy="54" r="9" /><circle cx="138" cy="54" r="9" />
      <!-- Row 3 (full, center empty visual) -->
      <circle cx="6" cy="76" r="9" /><circle cx="28" cy="76" r="9" /><circle cx="50" cy="76" r="9" /><circle cx="72" cy="76" r="9" /><circle cx="94" cy="76" r="9" /><circle cx="116" cy="76" r="9" /><circle cx="138" cy="76" r="9" />
      <!-- Row 4 (full) -->
      <circle cx="6" cy="98" r="9" /><circle cx="28" cy="98" r="9" /><circle cx="50" cy="98" r="9" /><circle cx="72" cy="98" r="9" /><circle cx="94" cy="98" r="9" /><circle cx="116" cy="98" r="9" /><circle cx="138" cy="98" r="9" />
      <!-- Row 5 -->
      <circle cx="50" cy="120" r="9" /><circle cx="72" cy="120" r="9" /><circle cx="94" cy="120" r="9" />
      <!-- Row 6 -->
      <circle cx="50" cy="142" r="9" /><circle cx="72" cy="142" r="9" /><circle cx="94" cy="142" r="9" />
    </g>
    <!-- pegs (peg-colored over a sample of cells, leaving center empty + an arrow trail) -->
    <g fill="url(#tt-peg)">
      <circle cx="50" cy="10" r="8" /><circle cx="72" cy="10" r="8" /><circle cx="94" cy="10" r="8" />
      <circle cx="50" cy="32" r="8" /><circle cx="72" cy="32" r="8" /><circle cx="94" cy="32" r="8" />
      <circle cx="6" cy="54" r="8" /><circle cx="28" cy="54" r="8" /><circle cx="50" cy="54" r="8" /><circle cx="94" cy="54" r="8" /><circle cx="116" cy="54" r="8" /><circle cx="138" cy="54" r="8" />
      <circle cx="6" cy="76" r="8" /><circle cx="28" cy="76" r="8" /><circle cx="50" cy="76" r="8" /><circle cx="116" cy="76" r="8" /><circle cx="138" cy="76" r="8" />
      <circle cx="6" cy="98" r="8" /><circle cx="28" cy="98" r="8" /><circle cx="50" cy="98" r="8" /><circle cx="94" cy="98" r="8" /><circle cx="116" cy="98" r="8" /><circle cx="138" cy="98" r="8" />
      <circle cx="50" cy="120" r="8" /><circle cx="72" cy="120" r="8" /><circle cx="94" cy="120" r="8" />
      <circle cx="50" cy="142" r="8" /><circle cx="94" cy="142" r="8" />
    </g>
    <!-- highlight selected peg -->
    <circle cx="72" cy="142" r="9" fill="none" stroke="#60a5fa" stroke-width="2" />
    <!-- jump arrow -->
    <path d="M72 130 Q72 105 72 86" stroke="#4ade80" stroke-width="2" fill="none" stroke-dasharray="3 3" />
    <polygon points="68,82 72,72 76,82" fill="#4ade80" />
  </g>
  <text x="20" y="32" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="700" fill="#f0e0b0">Tek Tas</text>
</svg>
