<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Kaykay">
  <defs>
    <linearGradient id="kk-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f3a" />
      <stop offset="100%" stop-color="#ff8c5c" />
    </linearGradient>
    <linearGradient id="kk-deck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#92400e" />
    </linearGradient>
  </defs>

  <rect width="320" height="200" fill="url(#kk-sky)" />

  <!-- Distant mountains -->
  <path d="M0,150 L40,110 L80,150 L120,100 L160,150 L200,115 L240,150 L280,105 L320,150 Z"
        fill="rgba(20,20,40,0.55)" />

  <!-- Ground -->
  <rect x="0" y="150" width="320" height="50" fill="#2c2118" />
  <g fill="#3a2a1f">
    <rect x="10" y="160" width="14" height="3" />
    <rect x="44" y="160" width="14" height="3" />
    <rect x="78" y="160" width="14" height="3" />
    <rect x="112" y="160" width="14" height="3" />
    <rect x="146" y="160" width="14" height="3" />
    <rect x="180" y="160" width="14" height="3" />
    <rect x="214" y="160" width="14" height="3" />
    <rect x="248" y="160" width="14" height="3" />
    <rect x="282" y="160" width="14" height="3" />
  </g>

  <!-- Stars -->
  <g fill="rgba(255,255,255,0.6)">
    <rect x="40" y="20" width="2" height="2" />
    <rect x="92" y="40" width="2" height="2" />
    <rect x="150" y="18" width="2" height="2" />
    <rect x="210" y="44" width="2" height="2" />
    <rect x="270" y="22" width="2" height="2" />
  </g>

  <!-- Title -->
  <text x="20" y="32" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#fff7e6">Kaykay</text>
  <text x="20" y="50" font-family="ui-sans-serif, system-ui" font-size="10" fill="#fbbf24" font-weight="600" letter-spacing="2">KICKFLIP ZAMANI</text>

  <!-- Ramp (right) -->
  <polygon points="240,150 296,150 296,108" fill="#3b4a6b" stroke="#0c1226" stroke-width="2" />
  <g stroke="rgba(255,255,255,0.18)" stroke-width="1" fill="none">
    <line x1="284" y1="142" x2="296" y2="142" />
    <line x1="280" y1="134" x2="296" y2="134" />
    <line x1="274" y1="126" x2="296" y2="126" />
    <line x1="268" y1="118" x2="296" y2="118" />
  </g>

  <!-- Skater (airborne, mid-flip) -->
  <g transform="translate(140,100)">
    <!-- Body -->
    <rect x="-6" y="-12" width="12" height="26" fill="#1a1f30" />
    <!-- Arms wide (spinning pose) -->
    <line x1="-6" y1="-8" x2="-16" y2="-14" stroke="#1a1f30" stroke-width="4" stroke-linecap="round" />
    <line x1="6" y1="-8" x2="16" y2="-14" stroke="#1a1f30" stroke-width="4" stroke-linecap="round" />
    <!-- Legs -->
    <line x1="-3" y1="12" x2="-7" y2="22" stroke="#1a1f30" stroke-width="4" stroke-linecap="round" />
    <line x1="3" y1="12" x2="7" y2="22" stroke="#1a1f30" stroke-width="4" stroke-linecap="round" />
    <!-- Head -->
    <circle cx="0" cy="-20" r="8" fill="#f3d8b0" stroke="#0c1226" stroke-width="1.5" />
    <!-- Beanie -->
    <path d="M-8,-22 A8,8 0 0 1 8,-22 Z" fill="#dc2626" />

    <!-- Deck — drawn rotated about 50° to imply mid-flip -->
    <g transform="translate(0,28) rotate(50)">
      <rect x="-30" y="-4" width="60" height="7" fill="url(#kk-deck)" stroke="#5a2606" stroke-width="1.2" />
      <rect x="-22" y="4" width="4" height="6" fill="#9ca3af" />
      <rect x="18" y="4" width="4" height="6" fill="#9ca3af" />
      <circle cx="-20" cy="13" r="5" fill="#fef3c7" stroke="#1a1f30" stroke-width="1" />
      <circle cx="20" cy="13" r="5" fill="#fef3c7" stroke="#1a1f30" stroke-width="1" />
    </g>
  </g>

  <!-- Flip indicator -->
  <text x="140" y="62" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#5eead4">1 flip</text>
</svg>
