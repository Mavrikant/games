<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1219"/>
      <stop offset="1" stop-color="#1a2230"/>
    </linearGradient>
    <radialGradient id="flame" cx="50%" cy="100%" r="60%">
      <stop offset="0" stop-color="#fde047" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#fb923c" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#f87171" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="kettle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4153"/>
      <stop offset="1" stop-color="#1f2533"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)"/>

  <!-- subtle grid bands -->
  <line x1="0" y1="160" x2="320" y2="160" stroke="#23283b" stroke-width="1"/>

  <!-- flame under kettle -->
  <ellipse cx="110" cy="158" rx="46" ry="14" fill="url(#flame)"/>
  <ellipse cx="110" cy="158" rx="22" ry="6" fill="#fde047" opacity="0.6"/>

  <!-- kettle -->
  <g transform="translate(60,70)">
    <!-- handle -->
    <path d="M88,8 Q112,40 88,76" fill="none" stroke="#1f2330" stroke-width="6" stroke-linecap="round"/>
    <!-- body -->
    <rect x="10" y="6" width="86" height="78" rx="14" ry="20" fill="url(#kettle)" stroke="#23283b" stroke-width="2"/>
    <!-- tea visible -->
    <rect x="18" y="20" width="70" height="60" rx="10" ry="16" fill="url(#tea)" opacity="0.92"/>
    <!-- spout -->
    <path d="M10,28 L-6,18 L-6,30 L10,42 Z" fill="#2a2f3d" stroke="#23283b" stroke-width="2"/>
    <!-- lid -->
    <rect x="40" y="-8" width="26" height="12" rx="5" fill="#1f2330" stroke="#23283b" stroke-width="2"/>
    <circle cx="53" cy="-10" r="3" fill="#3a4153"/>
  </g>

  <!-- steam -->
  <g stroke="#e8edff" stroke-width="2" fill="none" opacity="0.45" stroke-linecap="round">
    <path d="M104,56 Q110,46 104,34 Q100,24 106,12"/>
    <path d="M118,56 Q124,46 118,34 Q114,24 120,12"/>
    <path d="M132,56 Q138,46 132,34 Q128,24 134,12"/>
  </g>

  <!-- thermometer -->
  <g transform="translate(210,40)">
    <rect x="0" y="0" width="22" height="120" rx="11" fill="#0f1218" stroke="#23283b" stroke-width="1"/>
    <rect x="6" y="40" width="10" height="74" rx="5" fill="#fb923c"/>
    <circle cx="11" cy="120" r="12" fill="#f87171" stroke="#7f1d1d" stroke-width="1.5"/>
  </g>

  <!-- 3 small cups -->
  <g transform="translate(244,52)">
    <g>
      <path d="M0,0 L30,0 L26,28 L4,28 Z" fill="#86efac" stroke="#23283b" stroke-width="1.5"/>
      <path d="M30,4 Q40,14 30,24" fill="none" stroke="#23283b" stroke-width="1.5"/>
    </g>
    <g transform="translate(0,40)">
      <path d="M0,0 L30,0 L26,28 L4,28 Z" fill="#a78bfa" stroke="#23283b" stroke-width="1.5"/>
      <path d="M30,4 Q40,14 30,24" fill="none" stroke="#23283b" stroke-width="1.5"/>
    </g>
    <g transform="translate(0,80)">
      <path d="M0,0 L30,0 L26,28 L4,28 Z" fill="#fde047" stroke="#23283b" stroke-width="1.5"/>
      <path d="M30,4 Q40,14 30,24" fill="none" stroke="#23283b" stroke-width="1.5"/>
    </g>
  </g>

  <!-- title -->
  <text x="20" y="32" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="20" fill="#e8edff">Çay Demleme</text>
  <text x="20" y="50" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="11" fill="#8a93b0" letter-spacing="1">SICAKLIK · SÜRE · SERVIS</text>
</svg>
