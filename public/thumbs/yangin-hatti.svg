<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Yangın Hattı">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16241a" />
      <stop offset="100%" stop-color="#0a0b0e" />
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)" />
  <!-- forest -->
  <g fill="#2f9e44">
    <rect x="24" y="40" width="20" height="20" rx="3" />
    <rect x="48" y="40" width="20" height="20" rx="3" />
    <rect x="24" y="64" width="20" height="20" rx="3" />
    <rect x="72" y="64" width="20" height="20" rx="3" />
    <rect x="48" y="88" width="20" height="20" rx="3" />
    <rect x="24" y="112" width="20" height="20" rx="3" />
    <rect x="72" y="112" width="20" height="20" rx="3" />
    <rect x="48" y="136" width="20" height="20" rx="3" />
  </g>
  <!-- firebreak line -->
  <g fill="#6b4423">
    <rect x="96" y="40" width="20" height="20" rx="3" />
    <rect x="96" y="64" width="20" height="20" rx="3" />
    <rect x="96" y="88" width="20" height="20" rx="3" />
    <rect x="96" y="112" width="20" height="20" rx="3" />
    <rect x="96" y="136" width="20" height="20" rx="3" />
  </g>
  <!-- fire -->
  <g fill="#ff5722">
    <rect x="132" y="64" width="20" height="20" rx="3" />
    <rect x="132" y="88" width="20" height="20" rx="3" />
    <rect x="156" y="88" width="20" height="20" rx="3" />
    <rect x="132" y="112" width="20" height="20" rx="3" />
  </g>
  <rect x="138" y="94" width="8" height="8" rx="2" fill="#ffd166" />
  <!-- village -->
  <g fill="#4dabf7">
    <rect x="256" y="136" width="18" height="18" rx="3" />
    <rect x="278" y="136" width="18" height="18" rx="3" />
    <rect x="256" y="158" width="18" height="18" rx="3" />
    <rect x="278" y="158" width="18" height="18" rx="3" />
  </g>
  <text x="20" y="28" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#f5f6f8">Yangın Hattı</text>
</svg>
