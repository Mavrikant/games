<!doctype html>
<html lang="tr-TR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0b0e" />
    <meta name="robots" content="noindex" />
    <title>Çevrimdışı · Oyunlar</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; padding: 2rem;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 1rem;
        text-align: center; background: #0a0b0e; color: #f5f6f8;
        font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      }
      .mark {
        width: 64px; height: 64px; border-radius: 16px; display: grid;
        place-items: center; font-size: 32px; font-weight: 700; color: #fff;
        background: linear-gradient(135deg, #6366f1, #818cf8);
      }
      h1 { margin: .5rem 0 0; font-size: 1.4rem; }
      p { margin: 0; max-width: 34ch; color: #98a0ad; line-height: 1.55; }
      a {
        margin-top: .5rem; padding: .55rem 1.1rem; font-weight: 600;
        color: #818cf8; text-decoration: none;
        border: 1px solid #2f3540; border-radius: 8px;
      }
      a:hover { background: rgba(129, 140, 248, .14); }
    </style>
  </head>
  <body>
    <div class="mark" aria-hidden="true">K</div>
    <h1>Çevrimdışısın</h1>
    <p>Daha önce açtığın oyunlar hâlâ oynanabilir. Listeye dönmek için yeniden bağlan.</p>
    <a href="/games/">Listeye dön</a>
  </body>
</html>
