name: PR check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - name: PITFALLS audit gate (no unsafe storage / module-level qS)
        run: node scripts/audit-games.mjs --ci

  smoke:
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify every game route built
        run: |
          set -euo pipefail
          missing=0
          for json in src/content/games/*.json; do
            slug=$(basename "$json" .json)
            if [ ! -f "dist/$slug/index.html" ]; then
              echo "::error file=$json::No dist/$slug/index.html generated for slug '$slug'"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "Missing $missing route(s)."
            exit 1
          fi
          echo "All game routes generated."

  playtest:
    needs: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: npm
      - run: npm ci
      - name: Cache Playwright browser
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install chromium for Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps (always)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - run: npm run build
      - name: Headless smoke (init + console errors + screenshot)
        run: npm run test:smoke
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playtest-screenshots
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
