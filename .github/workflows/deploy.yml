name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Astro PUBLIC_* env vars need to be present at build time so the
    # rendered HTML includes the analytics / AdSense / donation links.
    # Configure in: repo > Settings > Secrets and variables > Actions >
    # Variables tab. Leaving any unset just omits that piece of the page.
    env:
      PUBLIC_PLAUSIBLE_SCRIPT_ID: ${{ vars.PUBLIC_PLAUSIBLE_SCRIPT_ID }}
      PUBLIC_GA_MEASUREMENT_ID: ${{ vars.PUBLIC_GA_MEASUREMENT_ID || 'G-SS831K8J0P' }}
      PUBLIC_ADSENSE_CLIENT: ${{ vars.PUBLIC_ADSENSE_CLIENT }}
      PUBLIC_ADSENSE_SLOT_HOMEPAGE: ${{ vars.PUBLIC_ADSENSE_SLOT_HOMEPAGE }}
      PUBLIC_ADSENSE_SLOT_GAME: ${{ vars.PUBLIC_ADSENSE_SLOT_GAME }}
      PUBLIC_ADSENSE_SLOT_STICKY: ${{ vars.PUBLIC_ADSENSE_SLOT_STICKY }}
      PUBLIC_ADSENSE_SLOT_SIDEBAR: ${{ vars.PUBLIC_ADSENSE_SLOT_SIDEBAR }}
      PUBLIC_ADSENSE_SLOT_INGRID: ${{ vars.PUBLIC_ADSENSE_SLOT_INGRID }}
      PUBLIC_ADSENSE_SLOT_FOOTER: ${{ vars.PUBLIC_ADSENSE_SLOT_FOOTER }}
      PUBLIC_FUNDING_CHOICES_ID: ${{ vars.PUBLIC_FUNDING_CHOICES_ID }}
      PUBLIC_KOFI_URL: ${{ vars.PUBLIC_KOFI_URL }}
      PUBLIC_BMAC_URL: ${{ vars.PUBLIC_BMAC_URL }}
      PUBLIC_GH_SPONSORS_URL: ${{ vars.PUBLIC_GH_SPONSORS_URL }}
      PUBLIC_BUTTONDOWN_USER: ${{ vars.PUBLIC_BUTTONDOWN_USER }}
      PUBLIC_WEB3FORMS_KEY: ${{ vars.PUBLIC_WEB3FORMS_KEY }}
      PUBLIC_CONTACT_EMAIL: ${{ vars.PUBLIC_CONTACT_EMAIL }}
      PUBLIC_TIKTOK_URL: ${{ vars.PUBLIC_TIKTOK_URL }}
      PUBLIC_INSTAGRAM_URL: ${{ vars.PUBLIC_INSTAGRAM_URL }}
      PUBLIC_TWITTER_URL: ${{ vars.PUBLIC_TWITTER_URL }}
      PUBLIC_YOUTUBE_URL: ${{ vars.PUBLIC_YOUTUBE_URL }}
      PUBLIC_DISCORD_URL: ${{ vars.PUBLIC_DISCORD_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: PITFALLS audit gate (no unsafe storage / module-level qS)
        run: node scripts/audit-games.mjs --ci
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  playtest:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: npm
      - run: npm ci
      - name: Cache Playwright browser
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install chromium for Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps (always)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - run: npm run build
      - name: Headless smoke (init + console errors + screenshot)
        run: npm run test:smoke
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playtest-screenshots
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  deploy:
    needs: [build, playtest]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
